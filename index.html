<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>⚔️ Tibia Farm Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudf<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚔️ Tibia Farm Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #08080f; font-family: 'Inter', sans-serif; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #252540; border-radius: 99px; }

  input[type=month]::-webkit-calendar-picker-indicator,
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
  input[type=number]::-webkit-inner-spin-button { opacity: 0.3; }

  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(4,4,12,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 500; padding: 16px;
    backdrop-filter: blur(8px);
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes slideUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  .slide-up { animation: slideUp .2s ease; }

  .bar-cell  { display:flex; align-items:center; gap:6px; }
  .bar-track { flex:1; height:4px; background:#1a1a2e; border-radius:2px; overflow:hidden; }
  .bar-fill  { height:100%; border-radius:2px; transition: width .4s ease; }

  .row-hover:hover  { background: rgba(200,168,60,0.04) !important; }
  .card-hover       { transition: border-color .2s, box-shadow .2s; }
  .card-hover:hover { border-color: #c8a83c55 !important; box-shadow: 0 0 24px #c8a83c11; }

  .glow-gold  { text-shadow: 0 0 20px #c8a83c66; }
  .glow-green { text-shadow: 0 0 16px #4ade8066; }

  button:active { transform: scale(0.97); }

  /* Currency buttons */
  .cur-btn { transition: all .15s; }
  .cur-btn:hover { border-color: #c8a83c88 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const SK = "tibia_farm_v3";

const load = () => { try { return JSON.parse(localStorage.getItem(SK)); } catch { return null; } };
const save = d  => { try { localStorage.setItem(SK, JSON.stringify(d)); } catch {} };

// ── Moedas disponíveis ──────────────────────────────────────────────────────
const CURRENCIES = [
  { code:"BRL", sym:"R$",  name:"Real",              flag:"🇧🇷", defaultRate: 0.216  },
  { code:"USD", sym:"$",   name:"Dólar",             flag:"🇺🇸", defaultRate: 0.040  },
  { code:"EUR", sym:"€",   name:"Euro",              flag:"🇪🇺", defaultRate: 0.037  },
  { code:"GBP", sym:"£",   name:"Libra",             flag:"🇬🇧", defaultRate: 0.032  },
  { code:"CAD", sym:"CA$", name:"Dólar Canadense",   flag:"🇨🇦", defaultRate: 0.055  },
];

function initState() {
  return {
    playerName: "",
    gpPerTc:    41000,
    currency:   "BRL",
    rates: { BRL:0.216, USD:0.040, EUR:0.037, GBP:0.032, CAD:0.055 },
    days: {},
  };
}

const fmt        = n   => Math.round(n||0).toLocaleString("pt-BR");
const toTC       = (gp,r) => gp / r;
const toCur      = (tc,rate) => tc * rate;
const mmLabel    = ym  => { const [y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleString("pt-BR",{month:"long",year:"numeric"}); };
const nowYM      = ()  => { const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`; };
const daysInMonth= ym  => { const [y,m]=ym.split("-"); return new Date(+y,+m,0).getDate(); };
const addMonth   = (ym,n) => { const [y,m]=ym.split("-"); const d=new Date(+y,+m-1+n,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };

function getCur(state) {
  return CURRENCIES.find(c=>c.code===state.currency) || CURRENCIES[0];
}
function getRate(state) {
  return state.rates?.[state.currency] ?? getCur(state).defaultRate;
}
function fmtMoney(val, sym) {
  return `${sym}${Math.abs(val).toFixed(2)}`;
}

function useW() {
  const [w,sw]=useState(window.innerWidth);
  useEffect(()=>{ const h=()=>sw(window.innerWidth); window.addEventListener("resize",h); return()=>window.removeEventListener("resize",h); },[]);
  return w;
}

function parseClip(text) {
  if (!text) return null;
  const dM=text.match(/From (\d{4}-\d{2}-\d{2})/),sM=text.match(/Session:\s*([\d:]+h)/),
        lM=text.match(/^Loot:\s*([\d,]+)/m),spM=text.match(/^Supplies:\s*([\d,]+)/m),
        bM=text.match(/^Balance:\s*(-?[\d,]+)/m);
  if (!bM) return null;
  const n=s=>parseInt(s.replace(/,/g,""),10);
  const players=[]; const re=/^(.+?)\n\s+Loot:\s*([\d,]+)\n\s+Supplies:\s*([\d,]+)\n\s+Balance:\s*(-?[\d,]+)\n\s+Damage:\s*([\d,]+)\n\s+Healing:\s*([\d,]+)/gm;
  let m; while((m=re.exec(text))!==null) players.push({name:m[1].trim(),loot:n(m[2]),supplies:n(m[3]),balance:n(m[4]),damage:n(m[5]),healing:n(m[6])});
  return { date:dM?dM[1]:new Date().toISOString().slice(0,10), session:sM?sM[1]:"?", loot:lM?n(lM[1]):0, supplies:spM?n(spM[1]):0, balance:n(bM[1]), players };
}

// ── Paleta ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#08080f", bg2:"#0d0d18", card:"#0f0f1c", cardHi:"#13132a",
  border:"#1c1c30", borderHi:"#2a2a48",
  gold:"#c8a83c", goldLight:"#e8c96a", goldDim:"#8a7028",
  accent:"#5b7ee5", accentGlow:"#7090ff",
  green:"#3dd68c", greenDim:"#1a4a35",
  red:"#f06060", redDim:"#4a1a1a",
  purple:"#9b6dff",
  text:"#ddd9f0", textSub:"#9090b8", textFaint:"#52527a",
  muted:"#3a3a5a",
};

// ── Mini bar ─────────────────────────────────────────────────────────────────
function MiniBar({ value, max }) {
  const pct = max>0 ? Math.min(100,(Math.abs(value)/Math.abs(max))*100) : 0;
  return (
    <div className="bar-track">
      <div className="bar-fill" style={{ width:`${pct}%`, background: value>=0?C.green:C.red }}/>
    </div>
  );
}

// ── Modal Entrada Manual ─────────────────────────────────────────────────────
function ManualModal({ dateKey, dayNum, existingHunts, gpPerTc, curSym, curRate, onSave, onRemove, onClose }) {
  const [bal,setBal]=useState(""), [note,setNote]=useState(""), [editIdx,setEdit]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(),60); },[]);
  const num=Number(bal)||0, tc=toTC(num,gpPerTc), cur=toCur(tc,curRate);

  function startEdit(h,i){ setBal(String(h.balance)); setNote(h.note||""); setEdit(i); setTimeout(()=>ref.current?.focus(),30); }
  function clear(){ setBal(""); setNote(""); setEdit(null); }
  function handleSave(){ if(bal==="") return; onSave(dateKey,{balance:num,note,session:"manual",loot:0,supplies:0,players:[],manual:true,ts:Date.now()},editIdx); clear(); }
  function onKey(e){ if(e.key==="Enter") handleSave(); if(e.key==="Escape") onClose(); }

  const manuals=existingHunts.filter(h=>h.manual);
  const inp={ background:C.bg2, border:`1.5px solid ${editIdx!==null?C.accent:C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:15, width:"100%", outline:"none", fontFamily:"'Inter',sans-serif", transition:"border-color .2s" };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="slide-up" style={{ background:C.card, border:`1px solid ${C.borderHi}`, borderRadius:18, padding:24, width:"100%", maxWidth:440, boxShadow:`0 24px 80px #000d, 0 0 0 1px ${C.muted}22` }}
           onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1}}>ENTRADA MANUAL</div>
            <div style={{fontSize:12,color:C.textFaint,marginTop:3}}>Dia {dayNum} · {dateKey}</div>
          </div>
          <button style={{background:"none",border:"none",color:C.textFaint,cursor:"pointer",fontSize:22,lineHeight:1,padding:"0 2px"}} onClick={onClose}>×</button>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Profit / Balance (gp)</div>
          <input ref={ref} style={inp} type="number" placeholder="Ex: 5000000  (negativo = prejuízo)" value={bal} onChange={e=>setBal(e.target.value)} onKeyDown={onKey}/>
          {bal!==""&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {[[`~${Math.round(tc).toLocaleString()} TC`,C.goldLight],[`${fmtMoney(cur,curSym)}`,num>=0?C.green:C.red]].map(([v,col])=>(
                <div key={v} style={{flex:1,background:C.bg2,borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,color:col}}>{v}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Observação (opcional)</div>
          <input style={inp} type="text" placeholder="Ex: Rashid, Ferumbras, venda de items…" value={note} onChange={e=>setNote(e.target.value)} onKeyDown={onKey}/>
        </div>

        <div style={{display:"flex",gap:10,marginBottom:manuals.length>0?20:0}}>
          <button disabled={bal===""} onClick={handleSave}
            style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:bal===""?"not-allowed":"pointer",fontWeight:700,fontSize:14,opacity:bal===""?.4:1,letterSpacing:.5,
              background:editIdx!==null?`linear-gradient(135deg,${C.accent},#3a5aaa)`:`linear-gradient(135deg,${C.gold},${C.goldDim})`,color:editIdx!==null?"#fff":"#0a0804"}}>
            {editIdx!==null?"💾  ATUALIZAR":"✅  SALVAR ENTRADA"}
          </button>
          {editIdx!==null&&<button onClick={clear} style={{padding:"12px 16px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13}}>Cancelar</button>}
        </div>

        {manuals.length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Entradas manuais neste dia</div>
            {existingHunts.map((h,i)=>!h.manual?null:(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:editIdx===i?C.cardHi:C.bg2,border:`1px solid ${editIdx===i?C.accent:C.border}`,borderRadius:10,padding:"9px 12px",marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:15,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</div>
                  {h.note&&<div style={{fontSize:11,color:C.textSub,marginTop:1}}>{h.note}</div>}
                  <div style={{fontSize:10,color:C.textFaint,marginTop:2}}>~{Math.round(toTC(h.balance,gpPerTc)).toLocaleString()} TC · {fmtMoney(toCur(toTC(h.balance,gpPerTc),curRate),curSym)}</div>
                </div>
                <button title="Editar" style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onClick={()=>startEdit(h,i)}>✏️</button>
                <button title="Excluir" style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onClick={()=>{onRemove(dateKey,i);clear();}}>🗑</button>
              </div>
            ))}
          </div>
        )}

        {existingHunts.filter(h=>!h.manual).length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:manuals.length>0?14:0}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Hunts via copyboard</div>
            {existingHunts.map((h,i)=>h.manual?null:(
              <div key={i} style={{display:"flex",justifyContent:"space-between",background:C.bg2,borderRadius:8,padding:"6px 12px",marginBottom:4,fontSize:12}}>
                <span style={{color:C.textSub}}>Hunt {i+1} · {h.session}</span>
                <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Linha da tabela ──────────────────────────────────────────────────────────
function HuntRow({ d, gp, tc, cur, cumulative, hunts, hasData, maxGP, curSym, isMobile, onRemove, onEdit }) {
  const [open,setOpen]=useState(false);
  return (
    <>
      <tr className="row-hover" style={{background:open?"#0d0d22":"transparent",transition:"background .15s"}}>
        <td style={{padding:isMobile?"9px 8px":"9px 14px",borderBottom:`1px solid ${C.border}22`,color:hasData?C.text:C.textFaint,fontWeight:hasData?600:400,fontSize:13,cursor:hunts.length>0?"pointer":"default",whiteSpace:"nowrap"}}
            onClick={()=>hunts.length>0&&setOpen(v=>!v)}>
          <span style={{color:C.textFaint,marginRight:5,fontSize:11}}>{hunts.length>0?(open?"▾":"▸"):" "}</span>
          {isMobile?d:`Dia ${String(d).padStart(2," ")}`}
        </td>
        <td onClick={()=>hunts.length>0&&setOpen(v=>!v)} style={{padding:isMobile?"9px 6px":"9px 14px",textAlign:"right",borderBottom:`1px solid ${C.border}22`,cursor:hunts.length>0?"pointer":"default"}}>
          {hasData
            ? <div className="bar-cell">
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,color:gp>=0?C.green:C.red,minWidth:isMobile?60:90,textAlign:"right"}}>{fmt(gp)}</div>
                {!isMobile&&<MiniBar value={gp} max={maxGP}/>}
              </div>
            : <span style={{color:C.textFaint,fontSize:13}}>—</span>}
        </td>
        {!isMobile&&<td onClick={()=>hunts.length>0&&setOpen(v=>!v)} style={{padding:"9px 14px",textAlign:"right",borderBottom:`1px solid ${C.border}22`,fontFamily:"'Rajdhani',sans-serif",fontWeight:600,fontSize:14,color:hasData?C.goldLight:C.textFaint,cursor:"pointer"}}>{hasData?Math.round(tc).toLocaleString():"—"}</td>}
        <td onClick={()=>hunts.length>0&&setOpen(v=>!v)} style={{padding:isMobile?"9px 6px":"9px 14px",textAlign:"right",borderBottom:`1px solid ${C.border}22`,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,color:hasData?(cur>=0?C.green:C.red):C.textFaint,cursor:"pointer"}}>{hasData?fmtMoney(cur,curSym):"—"}</td>
        <td onClick={()=>hunts.length>0&&setOpen(v=>!v)} style={{padding:isMobile?"9px 6px":"9px 14px",textAlign:"right",borderBottom:`1px solid ${C.border}22`,fontFamily:"'Rajdhani',sans-serif",fontWeight:600,fontSize:13,color:hasData?C.accentGlow:C.textFaint,cursor:"pointer"}}>{hasData?fmtMoney(cumulative,curSym):"—"}</td>
        <td style={{padding:"6px 8px",textAlign:"center",borderBottom:`1px solid ${C.border}22`}}>
          <button title="Editar manualmente" onClick={()=>onEdit()}
            style={{background:"none",border:"none",color:C.gold,cursor:"pointer",fontSize:13,opacity:.6,padding:"3px 5px",borderRadius:6,transition:"opacity .15s"}}
            onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.6}>✏️</button>
        </td>
      </tr>
      {open&&hunts.map((h,i)=>(
        <tr key={i} style={{background:"#0a0a1e"}}>
          <td colSpan={isMobile?4:5} style={{padding:"7px 14px 7px 28px",borderBottom:`1px solid ${C.border}11`,fontSize:11}}>
            {h.manual?<span style={{color:C.accent,fontWeight:600}}>✏️ Manual{h.note&&` · ${h.note}`}</span>:<span style={{color:C.textSub}}>Hunt {i+1} · {h.session}</span>}
            <span style={{marginLeft:10,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</span>
            {!isMobile&&!h.manual&&<span style={{marginLeft:10,color:C.textFaint}}>Loot: {fmt(h.loot)} · Supplies: {fmt(h.supplies)}</span>}
          </td>
          <td style={{padding:"5px 8px",borderBottom:`1px solid ${C.border}11`,textAlign:"center"}}>
            <button style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:13}} onClick={e=>{e.stopPropagation();onRemove(i);}}>🗑</button>
          </td>
        </tr>
      ))}
    </>
  );
}

// ── Card do mês no Histórico ─────────────────────────────────────────────────
function MonthCard({ ym, days, gpPerTc, curSym, curRate, onClick, isCurrent }) {
  const prefix=ym+"-";
  const entries=Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const totalGP=entries.reduce((s,[,v])=>s+v.totalBalance,0);
  const totalCur=toCur(toTC(totalGP,gpPerTc),curRate);
  const daysOk=entries.length;
  const bestDay=entries.reduce((b,[k,v])=>v.totalBalance>b.val?{key:k,val:v.totalBalance}:b,{key:null,val:-Infinity});
  const maxGP=Math.max(...entries.map(([,v])=>Math.abs(v.totalBalance)),1);
  const total=daysInMonth(ym);
  const bars=Array.from({length:total},(_,i)=>{const key=`${ym}-${String(i+1).padStart(2,"0")}`; return days[key]?.totalBalance||0;});

  return (
    <div className="card-hover" onClick={onClick}
      style={{background:C.card,border:`1px solid ${isCurrent?C.gold+"55":C.border}`,borderRadius:16,padding:20,cursor:"pointer",boxShadow:isCurrent?`0 0 30px ${C.gold}18`:"none",transition:"all .2s"}}>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:700,color:isCurrent?C.gold:C.text,letterSpacing:.5,textTransform:"capitalize"}}>{mmLabel(ym)}</div>
          <div style={{fontSize:11,color:C.textFaint,marginTop:2}}>{daysOk} dia{daysOk!==1?"s":""} farmado{daysOk!==1?"s":""}</div>
        </div>
        {isCurrent&&<span style={{fontSize:10,background:`${C.gold}22`,color:C.gold,padding:"3px 8px",borderRadius:99,fontWeight:700,letterSpacing:.5}}>MÊS ATUAL</span>}
      </div>

      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:32,marginBottom:14}}>
        {bars.map((v,i)=>{
          const h=maxGP>0?Math.max(2,(Math.abs(v)/maxGP)*32):2;
          return <div key={i} style={{flex:1,height:`${h}px`,background:v>0?C.green:v<0?C.red:C.muted+"40",borderRadius:2,opacity:v!==0?1:.3}}/>;
        })}
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[
          ["Valor Total", totalCur>=0?fmtMoney(totalCur,curSym):"—", totalCur>=0?C.green:C.red],
          ["Média/Dia", daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—", C.goldLight],
          ["Gold Total", fmt(totalGP)+" gp", C.text],
          ["Melhor Dia", bestDay.key?fmtMoney(toCur(toTC(bestDay.val,gpPerTc),curRate),curSym):"—", C.purple],
        ].map(([label,val,color])=>(
          <div key={label} style={{background:C.bg2,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:C.textFaint,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:18,color}}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Seletor de Moeda (Config) ────────────────────────────────────────────────
function CurrencyConfig({ state, setState }) {
  const cur = getCur(state);
  const rate = getRate(state);
  const preview = toCur(toTC(1000000, state.gpPerTc), rate);

  function selectCurrency(code) {
    setState(p => ({ ...p, currency: code }));
  }

  function updateRate(val) {
    setState(p => ({ ...p, rates: { ...p.rates, [p.currency]: Number(val) } }));
  }

  return (
    <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:14,padding:20,marginBottom:16}}>
      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:16}}>💱 MOEDA DE EXIBIÇÃO</div>

      {/* Grade de moedas */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:18}}>
        {CURRENCIES.map(c=>{
          const active = state.currency === c.code;
          return (
            <button key={c.code} className="cur-btn" onClick={()=>selectCurrency(c.code)}
              style={{background: active?`${C.gold}14`:C.card, border:`1.5px solid ${active?C.gold:C.border}`, borderRadius:10, padding:"10px 8px", cursor:"pointer", textAlign:"center"}}>
              <div style={{fontSize:20,marginBottom:4}}>{c.flag}</div>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:16,color:active?C.goldLight:C.text}}>{c.sym}</div>
              <div style={{fontSize:10,color:active?C.gold:C.textFaint,marginTop:2}}>{c.name}</div>
              <div style={{fontSize:10,color:active?C.gold:C.textFaint}}>{c.code}</div>
            </button>
          );
        })}
      </div>

      {/* Taxa da moeda selecionada */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:11,color:C.textSub,marginBottom:8,letterSpacing:.5,textTransform:"uppercase"}}>
          {cur.flag} Valor do TC em {cur.name} ({cur.code})
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,color:C.gold}}>{cur.sym}</span>
          <input
            type="number" step="0.001" value={rate}
            onChange={e=>updateRate(e.target.value)}
            style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:15,outline:"none",fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}/>
          <span style={{fontSize:12,color:C.textFaint,whiteSpace:"nowrap"}}>por TC</span>
        </div>
      </div>

      {/* Prévia */}
      <div style={{background:"#0d1a0d",border:"1px solid #1a3a1a",borderRadius:10,padding:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:11,color:C.textFaint,marginBottom:3}}>PRÉVIA — 1.000.000 gp equivale a</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:22,color:C.green}}>{fmtMoney(preview, cur.sym)}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:C.textFaint,marginBottom:3}}>= TC</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:16,color:C.textSub}}>~{Math.round(toTC(1000000,state.gpPerTc)).toLocaleString()} TC</div>
        </div>
      </div>

      <div style={{fontSize:11,color:C.textFaint,marginTop:10,lineHeight:1.6}}>
        💡 Atualize o valor sempre que a cotação do TC mudar no mercado do Tibia. Cada moeda guarda sua própria taxa.
      </div>
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [state,setState] = useState(()=>{
    const d = load() || initState();
    // migração: se não tem currency/rates, adiciona
    if (!d.currency) d.currency = "BRL";
    if (!d.rates)    d.rates    = { BRL: d.brlPerTc||0.216, USD:0.040, EUR:0.037, GBP:0.032, CAD:0.055 };
    return d;
  });
  const [viewMonth,setViewMonth] = useState(nowYM());
  const [clip,setClip]    = useState("");
  const [parsed,setParsed]= useState(null);
  const [parseErr,setErr] = useState("");
  const [tab,setTab]      = useState("tracker");
  const [flash,setFlash]  = useState(null);
  const [modal,setModal]  = useState(null);
  const w = useW(); const mob = w<600;

  useEffect(()=>{ save(state); },[state]);

  const curObj  = getCur(state);
  const curRate = getRate(state);
  const curSym  = curObj.sym;

  function showFlash(msg){ setFlash(msg); setTimeout(()=>setFlash(null),3200); }

  function handlePaste(t){ setClip(t); const r=parseClip(t); r?(setErr(""),setParsed(r)):(setErr("Não consegui ler o Balance. Verifique se o texto está completo."),setParsed(null)); }

  function confirmHunt(){
    if(!parsed) return;
    const {date,balance,session,loot,supplies,players}=parsed;
    setState(p=>{ const days={...p.days}; if(!days[date]) days[date]={hunts:[],totalBalance:0}; days[date]={hunts:[...days[date].hunts,{balance,session,loot,supplies,players,ts:Date.now()}],totalBalance:days[date].totalBalance+balance}; return{...p,days}; });
    showFlash(`✅ Hunt de ${fmt(parsed.balance)} gp salva!`);
    setClip(""); setParsed(null); setErr(""); setTab("tracker");
    setViewMonth(parsed.date.slice(0,7));
  }

  function removeHunt(dateKey,idx){
    setState(p=>{ const days={...p.days},hunts=[...days[dateKey].hunts]; const rem=hunts.splice(idx,1)[0]; days[dateKey]={hunts,totalBalance:days[dateKey].totalBalance-rem.balance}; if(!hunts.length) delete days[dateKey]; return{...p,days}; });
  }

  function saveManual(dateKey,entry,editIdx){
    setState(p=>{ const days={...p.days}; if(!days[dateKey]) days[dateKey]={hunts:[],totalBalance:0}; let h=[...days[dateKey].hunts],t=days[dateKey].totalBalance; if(editIdx!==null){t-=h[editIdx].balance;h[editIdx]=entry;}else h.push(entry); t+=entry.balance; days[dateKey]={hunts:h,totalBalance:t}; return{...p,days}; });
    showFlash(editIdx!==null?"💾 Entrada atualizada!":` ✅ ${fmt(entry.balance)} gp salvo!`);
  }

  function clearMonth(){ if(!confirm(`Apagar todos os dados de ${mmLabel(viewMonth)}?`)) return; setState(p=>{ const days={...p.days}; Object.keys(days).filter(k=>k.startsWith(viewMonth+"-")).forEach(k=>delete days[k]); return{...p,days}; }); }

  const {playerName,gpPerTc,days}=state;

  const allMonths = useMemo(()=>{ const set=new Set(Object.keys(days).map(k=>k.slice(0,7))); set.add(nowYM()); return Array.from(set).sort().reverse(); },[days]);

  const total=daysInMonth(viewMonth);
  let cum=0;
  const rows=Array.from({length:total},(_,i)=>{
    const d=i+1, key=`${viewMonth}-${String(d).padStart(2,"0")}`, day=days[key];
    const gp=day?day.totalBalance:0, tc=toTC(gp,gpPerTc), cur=toCur(tc,curRate);
    cum+=day?cur:0;
    return {d,key,gp,tc,cur,cumulative:cum,hunts:day?.hunts||[],hasData:!!day};
  });

  const maxGP    = Math.max(...rows.map(r=>Math.abs(r.gp)),1);
  const totalGP  = rows.reduce((s,r)=>s+r.gp,0);
  const totalTC  = toTC(totalGP,gpPerTc);
  const totalCur = toCur(totalTC,curRate);
  const daysOk   = rows.filter(r=>r.hasData).length;

  const px=mob?12:24;
  const S={
    th:  { background:C.bg2, color:C.gold, padding:mob?"8px 8px":"10px 14px", textAlign:"right", fontFamily:"'Rajdhani',sans-serif", fontSize:mob?11:12, letterSpacing:1, textTransform:"uppercase", borderBottom:`1px solid ${C.border}` },
    inp: { background:C.bg2, border:`1px solid ${C.border}`, borderRadius:8, padding:"9px 12px", color:C.text, fontSize:13, width:"100%", outline:"none", fontFamily:"'Inter',sans-serif" },
    lbl: { fontSize:11, color:C.textSub, marginBottom:5, display:"block", letterSpacing:.5, textTransform:"uppercase" },
  };
  const btnPrimary = { padding:mob?"10px 18px":"11px 24px", borderRadius:10, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background:`linear-gradient(135deg,${C.gold},${C.goldDim})`, color:"#0a0804", letterSpacing:.5 };
  const btnGhost   = { padding:mob?"10px 18px":"11px 24px", borderRadius:10, border:`1px solid ${C.border}`, cursor:"pointer", fontWeight:600, background:"transparent", color:C.textSub, fontSize:13 };
  const btnDanger  = { padding:mob?"8px 12px":"9px 16px", borderRadius:8, border:`1px solid ${C.red}44`, cursor:"pointer", fontWeight:700, background:"transparent", color:C.red, fontSize:12 };

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,paddingBottom:60}}>

      {/* Flash */}
      {flash&&<div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#0d2e1a",border:`1px solid ${C.green}55`,color:C.green,padding:"12px 22px",borderRadius:12,fontWeight:700,zIndex:999,fontSize:14,boxShadow:"0 8px 32px #000c",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center",animation:"slideUp .2s ease"}}>{flash}</div>}

      {/* Modal Manual */}
      {modal&&<ManualModal dateKey={modal.dateKey} dayNum={modal.dayNum} existingHunts={days[modal.dateKey]?.hunts||[]} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} onSave={saveManual} onRemove={removeHunt} onClose={()=>setModal(null)}/>}

      {/* ── HEADER centralizado ── */}
      <div style={{background:`linear-gradient(180deg,#0d0d20,${C.bg})`,borderBottom:`1px solid ${C.border}`,padding:mob?"14px 16px 12px":"20px 28px 16px",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)"}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{fontSize:mob?24:32,lineHeight:1}}>⚔️</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:mob?18:24,fontWeight:700,color:C.goldLight,letterSpacing:mob?2:3,textTransform:"uppercase"}} className="glow-gold">Tibia Farm Tracker</div>
          <div style={{fontSize:11,color:C.textFaint,marginBottom:4}}>
            {playerName?`${playerName} · `:""}<span style={{textTransform:"capitalize"}}>{mmLabel(viewMonth)}</span> · {daysOk} dias · {curObj.flag} {curObj.code}
          </div>
          <button style={{...btnPrimary,fontSize:12,padding:mob?"7px 16px":"8px 20px"}} onClick={()=>setTab("paste")}>+ Hunt</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",justifyContent:"center",padding:`0 ${px}px`}}>
          {[["tracker","📊","Tracker"],["history","📅","Histórico"],["paste","📋","Colar Sessão"],["config","⚙️","Config"]].map(([id,icon,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:mob?"10px 14px":"11px 20px",cursor:"pointer",fontSize:mob?11:13,fontWeight:600,whiteSpace:"nowrap",background:"none",border:"none",borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===id?C.gold:C.textSub,flexShrink:0,letterSpacing:.3,transition:"color .15s"}}>
              {mob?icon:`${icon} ${label}`}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:mob?"12px":"20px 28px"}}>

        {/* ══ TRACKER ══ */}
        {tab==="tracker"&&<>
          <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?8:12,marginBottom:16}}>
            {[
              ["Gold Total",    fmt(totalGP)+" gp",                                    C.goldLight],
              ["Tibia Coins",   Math.round(totalTC).toLocaleString()+" TC",             C.goldLight],
              ["Valor "+curObj.code, fmtMoney(totalCur,curSym),                        C.green    ],
              ["Média/Dia",     daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—",         C.goldLight],
            ].map(([label,val,color])=>(
              <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:mob?"12px":"16px 18px"}}>
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:mob?18:24,color,lineHeight:1.1}} className={color===C.green?"glow-green":""}>{val}</div>
                <div style={{fontSize:mob?10:11,color:C.textFaint,marginTop:4,textTransform:"uppercase",letterSpacing:.7}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Navegação mês */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setViewMonth(m=>addMonth(m,-1))} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:C.textSub,fontSize:13,fontWeight:700}}>‹</button>
              <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.text,fontSize:14,textTransform:"capitalize",minWidth:140,textAlign:"center"}}>{mmLabel(viewMonth)}</span>
              <button onClick={()=>setViewMonth(m=>addMonth(m,1))} disabled={viewMonth>=nowYM()} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:viewMonth>=nowYM()?"not-allowed":"pointer",color:viewMonth>=nowYM()?C.muted:C.textSub,fontSize:13,fontWeight:700,opacity:viewMonth>=nowYM()?.4:1}}>›</button>
              {viewMonth!==nowYM()&&<button onClick={()=>setViewMonth(nowYM())} style={{fontSize:11,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",color:C.textSub}}>Hoje</button>}
            </div>
            <button style={btnDanger} onClick={clearMonth}>🗑 {mob?"":"Limpar mês"}</button>
          </div>

          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr>
                    <th style={{...S.th,textAlign:"left"}}>Dia</th>
                    <th style={{...S.th,textAlign:"left",paddingLeft:0}}>Gold Balance</th>
                    {!mob&&<th style={S.th}>TC</th>}
                    <th style={S.th}>{curSym} Valor</th>
                    <th style={S.th}>Acumulado</th>
                    <th style={{...S.th,width:36,padding:"10px 8px"}}></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(r=><HuntRow key={r.key} {...r} maxGP={maxGP} curSym={curSym} isMobile={mob} onRemove={idx=>removeHunt(r.key,idx)} onEdit={()=>setModal({dateKey:r.key,dayNum:r.d})}/>)}
                </tbody>
                <tfoot>
                  <tr style={{background:C.bg2}}>
                    <td style={{padding:mob?"10px 8px":"10px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.gold,fontSize:13,letterSpacing:1}}>TOTAL</td>
                    <td style={{padding:mob?"10px 6px":"10px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:totalGP>=0?C.green:C.red,fontSize:15}}>{fmt(totalGP)} gp</td>
                    {!mob&&<td style={{padding:"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.goldLight}}>{Math.round(totalTC).toLocaleString()}</td>}
                    <td style={{padding:mob?"10px 6px":"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:totalCur>=0?C.green:C.red}}>{fmtMoney(totalCur,curSym)}</td>
                    <td style={{padding:mob?"10px 6px":"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:600,color:C.accentGlow}}>{fmtMoney(totalCur,curSym)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div style={{padding:"10px 16px",fontSize:11,color:C.textFaint,borderTop:`1px solid ${C.border}22`}}>💡 Clique em ✏️ para adicionar ou editar valores manualmente.</div>
          </div>
        </>}

        {/* ══ HISTÓRICO ══ */}
        {tab==="history"&&<>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1,marginBottom:4}}>📅 HISTÓRICO DE MESES</div>
            <div style={{fontSize:13,color:C.textSub}}>Clique em um mês para ver o detalhe no Tracker.</div>
          </div>
          {allMonths.length===0
            ? <div style={{textAlign:"center",padding:60,color:C.textFaint}}>Nenhum dado registrado ainda.</div>
            : <div style={{display:"grid",gridTemplateColumns:mob?"1fr":w<800?"1fr 1fr":"repeat(3,1fr)",gap:14}}>
                {allMonths.map(ym=>(
                  <MonthCard key={ym} ym={ym} days={days} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} isCurrent={ym===nowYM()}
                    onClick={()=>{setViewMonth(ym);setTab("tracker");}}/>
                ))}
              </div>
          }
        </>}

        {/* ══ COLAR SESSÃO ══ */}
        {tab==="paste"&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:4}}>📋 COLAR COPYBOARD</div>
            <div style={{fontSize:12,color:C.textSub,marginBottom:14}}>No Tibia: ícone de sessão → "Copy to Clipboard" → cole abaixo.</div>
            <textarea style={{width:"100%",minHeight:mob?160:200,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,color:C.text,fontSize:mob?12:13,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5}}
              placeholder={"Session data: From 2026-05-01, 19:36:27 to ...\nSession: 01:37h\nLoot: 8,784,927\nSupplies: 3,319,100\nBalance: 5,465,827\n..."}
              value={clip} onChange={e=>handlePaste(e.target.value)}/>
            {parseErr&&<div style={{color:C.red,background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 14px",fontSize:13,marginTop:10}}>⚠️ {parseErr}</div>}
            {parsed&&(
              <div style={{background:"#0b1a0b",border:"1px solid #2a4a2a",borderRadius:14,padding:mob?14:20,marginTop:14}}>
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.green,fontSize:15,marginBottom:14}}>✅ SESSÃO DETECTADA</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
                  {[["📅 Data",parsed.date],["⏱ Duração",parsed.session],["📦 Loot",fmt(parsed.loot)+" gp"],["💊 Supplies",fmt(parsed.supplies)+" gp"],["💰 Balance",fmt(parsed.balance)+" gp"],["💎 Em TC",`~${Math.round(toTC(parsed.balance,gpPerTc)).toLocaleString()} TC`]].map(([k,v])=>(
                    <div key={k} style={{background:"#0a160a",borderRadius:8,padding:"9px 12px"}}>
                      <div style={{fontSize:10,color:C.textFaint}}>{k}</div>
                      <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:mob?13:15,color:k.includes("Balance")?(parsed.balance>=0?C.green:C.red):C.text}}>{v}</div>
                    </div>
                  ))}
                </div>
                {parsed.players.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,color:C.textFaint,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Jogadores</div>
                    {parsed.players.map(p=>(
                      <div key={p.name} style={{display:"flex",justifyContent:"space-between",background:"#0a160a",borderRadius:8,padding:"7px 12px",fontSize:13,marginBottom:4}}>
                        <span style={{color:C.text,fontWeight:600}}>{p.name}</span>
                        <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:p.balance>=0?C.green:C.red}}>{p.balance>=0?"+":""}{fmt(p.balance)} gp</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{display:"flex",gap:10}}>
                  <button style={btnPrimary} onClick={confirmHunt}>✅ Salvar Hunt</button>
                  <button style={btnGhost} onClick={()=>{setClip("");setParsed(null);setErr("");}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="config"&&(
          <div>
            {/* Seletor de moeda */}
            <CurrencyConfig state={state} setState={setState}/>

            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:16}}>⚙️ DADOS DO JOGADOR</div>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14,marginBottom:20}}>
                {[["Seu nome no Tibia","text","playerName","Ex: Czar Malta"],["GP por TC","number","gpPerTc","Ex: 41000"]].map(([label,type,key,ph])=>(
                  <div key={key}>
                    <label style={S.lbl}>{label}</label>
                    <input style={S.inp} type={type} value={state[key]} placeholder={ph}
                      onChange={e=>setState(p=>({...p,[key]:type==="number"?Number(e.target.value):e.target.value}))}/>
                  </div>
                ))}
              </div>

              <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontSize:12,color:C.textSub,lineHeight:1.8,marginBottom:16}}>
                ℹ️ Os dados são salvos <strong style={{color:C.text}}>automaticamente</strong> no navegador (localStorage).<br/>
                Use o backup abaixo para não perder dados ao trocar de dispositivo ou limpar o navegador.
              </div>

              <div style={{marginBottom:14}}>
                <label style={S.lbl}>Backup (copie e guarde em lugar seguro)</label>
                <textarea style={{...S.inp,minHeight:70,fontSize:11,resize:"vertical"}} readOnly value={JSON.stringify(state)}/>
              </div>
              <div>
                <label style={S.lbl}>Restaurar backup</label>
                <div style={{display:"flex",gap:8}}>
                  <textarea id="rb" style={{...S.inp,minHeight:60,fontSize:11,flex:1,resize:"vertical"}} placeholder="Cole o backup aqui..."/>
                  <button style={{...btnPrimary,alignSelf:"flex-end",whiteSpace:"nowrap"}}
                    onClick={()=>{try{const d=JSON.parse(document.getElementById("rb").value);setState(d);showFlash("✅ Backup restaurado!");}catch{alert("Dados inválidos.");}}}>
                    Restaurar
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
