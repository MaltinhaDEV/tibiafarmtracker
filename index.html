<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚔️ Tibia Farm Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=MedievalSharp&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:#08080f; font-family:'Inter',sans-serif; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#252540; border-radius:99px; }

input[type=month]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator  { filter:invert(0.4); cursor:pointer; }
input[type=number]::-webkit-inner-spin-button        { opacity:0.3; }

/* ── Animações ── */
@keyframes fadeIn   { from{opacity:0}           to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes rashidBob{ 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-4px)} }
@keyframes rashidBlink{ 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
@keyframes torchFlicker { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.7;transform:scaleY(.9)} 75%{opacity:.9;transform:scaleY(1.05)} }
@keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes starPulse{ 0%,100%{opacity:.2} 50%{opacity:.8} }
@keyframes borderGlow{ 0%,100%{box-shadow:0 0 10px #c8a83c22} 50%{box-shadow:0 0 28px #c8a83c55} }

.modal-overlay { position:fixed;inset:0;background:rgba(4,4,12,.85);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .15s ease; }
.slide-up      { animation:slideUp .2s ease; }
.bar-cell      { display:flex;align-items:center;gap:6px; }
.bar-track     { flex:1;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden; }
.bar-fill      { height:100%;border-radius:2px;transition:width .4s ease; }
.row-hover:hover   { background:rgba(200,168,60,.04)!important; }
.card-hover        { transition:border-color .2s,box-shadow .2s; }
.card-hover:hover  { border-color:#c8a83c55!important;box-shadow:0 0 24px #c8a83c11; }
.cur-btn           { transition:all .15s; }
.cur-btn:hover     { border-color:#c8a83c88!important; }
button:active      { transform:scale(.97); }

/* ── Stars no hero ── */
.star { position:absolute;border-radius:50%;background:#e8c96a;animation:starPulse 3s ease-in-out infinite; }

/* ── Título com shimmer ── */
.hero-title {
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  background:linear-gradient(90deg,#8a7028,#e8c96a,#c8a83c,#f5e090,#c8a83c,#8a7028);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite;
}

/* ── Rashid sprite ── */
.rashid-sprite { animation:rashidBob 1.6s ease-in-out infinite; image-rendering:pixelated; }
.rashid-eyes   { animation:rashidBlink 4s ease-in-out infinite; transform-origin:center; }

/* ── Footer ── */
.footer-link { color:#52527a;text-decoration:none;transition:color .2s; }
.footer-link:hover { color:#c8a83c; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;
const SK = "tibia_farm_v3";
const load = () => { try{return JSON.parse(localStorage.getItem(SK));}catch{return null;} };
const save = d  => { try{localStorage.setItem(SK,JSON.stringify(d));}catch{} };

const CURRENCIES = [
  {code:"BRL",sym:"R$", name:"Real",           flag:"🇧🇷",defaultRate:0.216},
  {code:"USD",sym:"$",  name:"Dólar",          flag:"🇺🇸",defaultRate:0.040},
  {code:"EUR",sym:"€",  name:"Euro",           flag:"🇪🇺",defaultRate:0.037},
  {code:"GBP",sym:"£",  name:"Libra",          flag:"🇬🇧",defaultRate:0.032},
  {code:"CAD",sym:"CA$",name:"Dólar Canadense",flag:"🇨🇦",defaultRate:0.055},
];

// Rashid locations (Sunday=0 … Saturday=6)
const RASHID = [
  {city:"Carlin",    coords:"(Depot)",         region:"Tibia Central", tip:"Próximo ao depot da cidade"},
  {city:"Svargrond", coords:"(Depot)",         region:"Tibia Norte",   tip:"Dentro do depot de Svargrond"},
  {city:"Liberty Bay",coords:"(Depot)",        region:"Tibia Sul",     tip:"No depot de Liberty Bay"},
  {city:"Port Hope",  coords:"(Depot)",        region:"Tibia Sul",     tip:"No depot de Port Hope"},
  {city:"Ankrahmun",  coords:"(Depot)",        region:"Tibia Leste",   tip:"No depot de Ankrahmun"},
  {city:"Darashia",   coords:"(Depot)",        region:"Tibia Leste",   tip:"No depot de Darashia"},
  {city:"Edron",      coords:"(Depot)",        region:"Tibia Central", tip:"No depot de Edron"},
];

function initState() {
  return { playerName:"", gpPerTc:41000, currency:"BRL", rates:{BRL:0.216,USD:0.040,EUR:0.037,GBP:0.032,CAD:0.055}, days:{} };
}
const fmt         = n   => Math.round(n||0).toLocaleString("pt-BR");
const toTC        = (gp,r)  => gp/r;
const toCur       = (tc,r)  => tc*r;
const mmLabel     = ym  => { const [y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleString("pt-BR",{month:"long",year:"numeric"}); };
const nowYM       = ()  => { const t=new Date(); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}`; };
const daysInMonth = ym  => { const [y,m]=ym.split("-"); return new Date(+y,+m,0).getDate(); };
const addMonth    = (ym,n) => { const [y,m]=ym.split("-"); const d=new Date(+y,+m-1+n,1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`; };
const getCur      = st  => CURRENCIES.find(c=>c.code===st.currency)||CURRENCIES[0];
const getRate     = st  => st.rates?.[st.currency]??getCur(st).defaultRate;
const fmtMoney    = (v,sym) => `${sym}${Math.abs(v).toFixed(2)}`;

function useW() {
  const [w,sw]=useState(window.innerWidth);
  useEffect(()=>{ const h=()=>sw(window.innerWidth); window.addEventListener("resize",h); return()=>window.removeEventListener("resize",h); },[]);
  return w;
}

function parseClip(text) {
  if(!text) return null;
  const dM=text.match(/From (\d{4}-\d{2}-\d{2})/),sM=text.match(/Session:\s*([\d:]+h)/),
        lM=text.match(/^Loot:\s*([\d,]+)/m),spM=text.match(/^Supplies:\s*([\d,]+)/m),
        bM=text.match(/^Balance:\s*(-?[\d,]+)/m);
  if(!bM) return null;
  const n=s=>parseInt(s.replace(/,/g,""),10);
  const players=[]; const re=/^(.+?)\n\s+Loot:\s*([\d,]+)\n\s+Supplies:\s*([\d,]+)\n\s+Balance:\s*(-?[\d,]+)\n\s+Damage:\s*([\d,]+)\n\s+Healing:\s*([\d,]+)/gm;
  let m; while((m=re.exec(text))!==null) players.push({name:m[1].trim(),loot:n(m[2]),supplies:n(m[3]),balance:n(m[4]),damage:n(m[5]),healing:n(m[6])});
  return { date:dM?dM[1]:new Date().toISOString().slice(0,10), session:sM?sM[1]:"?", loot:lM?n(lM[1]):0, supplies:spM?n(spM[1]):0, balance:n(bM[1]), players };
}

const C = {
  bg:"#08080f", bg2:"#0d0d18", card:"#0f0f1c", cardHi:"#13132a",
  border:"#1c1c30", borderHi:"#2a2a48",
  gold:"#c8a83c", goldLight:"#e8c96a", goldDim:"#8a7028",
  accent:"#5b7ee5", accentGlow:"#7090ff",
  green:"#3dd68c", greenDim:"#1a4a35",
  red:"#f06060", redDim:"#4a1a1a",
  purple:"#9b6dff",
  text:"#ddd9f0", textSub:"#9090b8", textFaint:"#52527a",
  muted:"#3a3a5a",
};

/* ══ RASHID IMAGEM REAL ══════════════════════════════════════════════════════ */
const RASHID_IMG = "https://tibia.fandom.com/wiki/Special:FilePath/Rashid.gif";

function RashidSprite({ size=64 }) {
  const [err, setErr] = useState(false);
  if (err) return <div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.55,animation:"rashidBob 1.6s ease-in-out infinite"}}>🧙</div>;
  return <img src={RASHID_IMG} alt="Rashid NPC" width={size} height={size} onError={()=>setErr(true)} style={{imageRendering:"pixelated",animation:"rashidBob 1.6s ease-in-out infinite",objectFit:"contain",display:"block"}}/>;
}

/* ══ PAINEL DE INFO (Rashid + Boosted + Boss + Busca) ═══════════════════════ */
function InfoPanel({ mob }) {
  const today = new Date();
  const dow   = today.getDay();
  const rashid= RASHID[dow];
  const dias  = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  const diasFull = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];

  const [creature,  setCreature]  = useState(null);
  const [boss,      setBoss]      = useState(null);
  const [charName,  setCharName]  = useState("");
  const [charResult,setCharResult]= useState(null);
  const [charLoad,  setCharLoad]  = useState(false);
  const [charErr,   setCharErr]   = useState("");

  // Fetch boosted creature + boss simultaneamente
  useEffect(()=>{
    const tryFetch = async (paths) => {
      for(const path of paths){
        const urls=[`https://api.tibiadata.com/v4/${path}`,`https://corsproxy.io/?https://api.tibiadata.com/v4/${path}`];
        for(const url of urls){
          try{ const r=await fetch(url,{signal:AbortSignal.timeout(6000)}); return await r.json(); }catch{}
        }
      }
      return null;
    };
    tryFetch(["creatures/boosted"]).then(d=>{ if(d?.boosted_creature) setCreature(d.boosted_creature); });
    tryFetch(["boostablebosses"]).then(d=>{ if(d?.boostable_bosses?.boosted) setBoss(d.boostable_bosses.boosted); });
  },[]);

  async function searchChar(){
    if(!charName.trim()) return;
    setCharLoad(true); setCharResult(null); setCharErr("");
    const enc=encodeURIComponent(charName.trim());
    const urls=[`https://api.tibiadata.com/v4/character/${enc}`,`https://corsproxy.io/?https://api.tibiadata.com/v4/character/${enc}`];
    let data=null;
    for(const url of urls){ try{ const r=await fetch(url,{signal:AbortSignal.timeout(6000)}); const d=await r.json(); if(d?.character?.character?.name){data=d.character.character;break;} }catch{} }
    if(data) setCharResult(data); else setCharErr("Personagem não encontrado.");
    setCharLoad(false);
  }

  const cardBase = { background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px" };

  // Mini card para criatura/boss
  function BoostCard({ data, label, color, borderColor, icon }) {
    if(!data) return (
      <div style={{...cardBase,border:`1px solid ${borderColor}22`,display:"flex",alignItems:"center",gap:10,flex:1}}>
        <div style={{width:40,height:40,background:C.bg2,borderRadius:8,flexShrink:0,animation:"starPulse 1.5s ease-in-out infinite"}}/>
        <div style={{fontSize:11,color:C.textFaint}}>Carregando...</div>
      </div>
    );
    const img = data.image_url || `https://tibia.fandom.com/wiki/Special:FilePath/${(data.name||"").replace(/ /g,"_")}.gif`;
    return (
      <div style={{...cardBase,border:`1px solid ${borderColor}44`,background:`linear-gradient(135deg,${borderColor}10,${C.card})`,display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
        <div style={{position:"relative",flexShrink:0}}>
          <img src={img} alt={data.name} width={44} height={44} style={{imageRendering:"pixelated",objectFit:"contain",display:"block"}} onError={e=>e.target.style.display="none"}/>
          <div style={{position:"absolute",top:-5,right:-5,background:borderColor,borderRadius:99,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>{icon}</div>
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontSize:9,color,letterSpacing:.8,textTransform:"uppercase",marginBottom:2}}>{label}</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:15,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.name}</div>
        </div>
      </div>
    );
  }

  if(mob) return (
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
      {/* Rashid mobile */}
      <div style={{...cardBase,border:"1px solid #1e3a1e",background:"linear-gradient(135deg,#0d1a0d,#0a120a)",display:"flex",alignItems:"center",gap:12}}>
        <RashidSprite size={48}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Rashid Hoje · {diasFull[dow]}</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:20,color:C.green}}>{rashid.city}</div>
          <div style={{fontSize:10,color:C.textFaint}}>📍 {rashid.tip}</div>
        </div>
      </div>
      {/* Boosted mobile */}
      <div style={{display:"flex",gap:8}}>
        <BoostCard data={creature} label="Criatura Boostada" color="#9b6dff" borderColor="#7b3aed" icon="★"/>
        <BoostCard data={boss} label="Boss Boostado" color="#f06060" borderColor="#c03030" icon="☠"/>
      </div>
      {/* Char search mobile */}
      <CharSearch charName={charName} setCharName={setCharName} charResult={charResult} charLoad={charLoad} charErr={charErr} onSearch={searchChar} mob={mob}/>
    </div>
  );

  return (
    <div style={{marginBottom:16}}>
      {/* Grid 4 colunas: Rashid | Criatura | Boss | Busca */}
      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr 1.4fr",gap:10}}>

        {/* COL 1 — RASHID */}
        <div style={{...cardBase,border:"1px solid #1e3a1e",background:"linear-gradient(135deg,#0d1a0d,#0a120a)",animation:"borderGlow 3s ease-in-out infinite",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:-8,bottom:-8,fontSize:52,opacity:.05,userSelect:"none"}}>🗺️</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <RashidSprite size={52}/>
            <div>
              <div style={{fontSize:9,color:C.gold,letterSpacing:1,textTransform:"uppercase"}}>Rashid — Hoje</div>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:22,color:C.green,lineHeight:1.1}}>{rashid.city}</div>
              <div style={{fontSize:10,color:C.textFaint,marginTop:1}}>📍 {rashid.tip}</div>
            </div>
          </div>
          {/* Calendário semanal */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {RASHID.map((r,i)=>(
              <div key={i} title={`${diasFull[i]}: ${r.city}`}
                style={{padding:"3px 2px",borderRadius:5,background:i===dow?"#1a3a1a":"#0d0d18",border:`1px solid ${i===dow?"#2a5a2a":C.border}`,textAlign:"center"}}>
                <div style={{fontSize:7,color:i===dow?C.green:C.textFaint,fontWeight:i===dow?700:400}}>{dias[i]}</div>
                <div style={{fontSize:7,color:i===dow?C.goldLight:C.textFaint,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.city.split(" ")[0]}</div>
              </div>
            ))}
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:8,background:"#1a3a1a",border:"1px solid #2a5a2a",borderRadius:99,padding:"2px 10px"}}>
            <span style={{fontSize:10,color:C.green,fontWeight:700}}>{diasFull[dow]}</span>
          </div>
        </div>

        {/* COL 2 — CRIATURA BOOSTADA */}
        <BoostCard data={creature} label="⭐ Criatura Boostada" color="#9b6dff" borderColor="#7b3aed" icon="★"/>

        {/* COL 3 — BOSS BOOSTADO */}
        <BoostCard data={boss} label="☠️ Boss Boostado" color="#f06060" borderColor="#c03030" icon="☠"/>

        {/* COL 4 — BUSCA DE PERSONAGEM */}
        <CharSearch charName={charName} setCharName={setCharName} charResult={charResult} charLoad={charLoad} charErr={charErr} onSearch={searchChar} mob={mob}/>
      </div>
    </div>
  );
}

function CharSearch({ charName, setCharName, charResult, charLoad, charErr, onSearch, mob }) {
  const cardBase = { background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px" };
  return (
    <div style={{...cardBase,border:`1px solid ${C.accent}33`,background:`linear-gradient(135deg,${C.accent}08,${C.card})`}}>
      <div style={{fontSize:9,color:C.accent,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>🔍 Buscar Personagem</div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <input value={charName} onChange={e=>setCharName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&onSearch()}
          placeholder="Nome do char..."
          style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",fontFamily:"'Inter',sans-serif"}}/>
        <button onClick={onSearch} disabled={charLoad}
          style={{background:`linear-gradient(135deg,${C.accent},#3a5aaa)`,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:700,whiteSpace:"nowrap",opacity:charLoad?.6:1}}>
          {charLoad?"⏳":"Buscar"}
        </button>
      </div>
      {charErr && <div style={{fontSize:10,color:C.red,marginBottom:6}}>{charErr}</div>}
      {charResult ? (
        <div style={{background:C.bg2,borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:16,color:C.gold,marginBottom:4}}>{charResult.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px",fontSize:11}}>
            <div><span style={{color:C.textFaint}}>Nível</span> <span style={{color:C.text,fontWeight:600}}>{charResult.level}</span></div>
            <div><span style={{color:charResult.online?C.green:C.textFaint}}>{charResult.online?"● Online":"○ Offline"}</span></div>
            <div style={{gridColumn:"1/-1",color:C.textSub}}>{charResult.vocation}</div>
            {charResult.guild?.name && <div style={{gridColumn:"1/-1",color:C.purple}}>🏰 {charResult.guild.name}</div>}
            <div style={{gridColumn:"1/-1",color:C.textFaint}}>🌍 {charResult.world}</div>
          </div>
        </div>
      ) : !charLoad && !charErr && (
        <div style={{textAlign:"center",padding:"12px 0",color:C.textFaint,fontSize:11}}>
          Digite o nome de um personagem<br/>e pressione Enter ou Buscar
        </div>
      )}
    </div>
  );
}

/* ══ MINI BAR ═══════════════════════════════════════════════════════════════ */
function MiniBar({ value, max }) {
  const pct=max>0?Math.min(100,(Math.abs(value)/Math.abs(max))*100):0;
  return <div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:value>=0?C.green:C.red}}/></div>;
}

/* ══ MODAL ENTRADA MANUAL ═══════════════════════════════════════════════════ */
function ManualModal({ dateKey, dayNum, existingHunts, gpPerTc, curSym, curRate, onSave, onRemove, onClose }) {
  const [bal,setBal]=useState(""), [note,setNote]=useState(""), [editIdx,setEdit]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(),60); },[]);
  const num=Number(bal)||0, tc=toTC(num,gpPerTc), cur=toCur(tc,curRate);
  function startEdit(h,i){ setBal(String(h.balance)); setNote(h.note||""); setEdit(i); setTimeout(()=>ref.current?.focus(),30); }
  function clear(){ setBal(""); setNote(""); setEdit(null); }
  function handleSave(){ if(bal==="") return; onSave(dateKey,{balance:num,note,session:"manual",loot:0,supplies:0,players:[],manual:true,ts:Date.now()},editIdx); clear(); }
  function onKey(e){ if(e.key==="Enter") handleSave(); if(e.key==="Escape") onClose(); }
  const manuals=existingHunts.filter(h=>h.manual);
  const inp={ background:C.bg2, border:`1.5px solid ${editIdx!==null?C.accent:C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:15, width:"100%", outline:"none", fontFamily:"'Inter',sans-serif", transition:"border-color .2s" };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="slide-up" style={{background:C.card,border:`1px solid ${C.borderHi}`,borderRadius:18,padding:24,width:"100%",maxWidth:440,boxShadow:`0 24px 80px #000d`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1}}>ENTRADA MANUAL</div>
            <div style={{fontSize:12,color:C.textFaint,marginTop:3}}>Dia {dayNum} · {dateKey}</div>
          </div>
          <button style={{background:"none",border:"none",color:C.textFaint,cursor:"pointer",fontSize:22,lineHeight:1}} onClick={onClose}>×</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Profit / Balance (gp)</div>

/* ══ MONTH CARD ══════════════════════════════════════════════════════════════ */
function MonthCard({ ym, days, gpPerTc, curSym, curRate, onClick, isCurrent }) {
  const prefix=ym+"-";
  const entries=Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const totalGP=entries.reduce((s,[,v])=>s+v.totalBalance,0);
  const totalCur=toCur(toTC(totalGP,gpPerTc),curRate);
  const daysOk=entries.length;
  const bestDay=entries.reduce((b,[k,v])=>v.totalBalance>b.val?{key:k,val:v.totalBalance}:b,{key:null,val:-Infinity});
  const maxGP=Math.max(...entries.map(([,v])=>Math.abs(v.totalBalance)),1);
  const total=daysInMonth(ym);
  const bars=Array.from({length:total},(_,i)=>{const key=`${ym}-${String(i+1).padStart(2,"0")}`; return days[key]?.totalBalance||0;});
  return (
    <div className="card-hover" onClick={onClick} style={{background:C.card,border:`1px solid ${isCurrent?C.gold+"55":C.border}`,borderRadius:16,padding:20,cursor:"pointer",boxShadow:isCurrent?`0 0 30px ${C.gold}18`:"none",transition:"all .2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:700,color:isCurrent?C.gold:C.text,letterSpacing:.5,textTransform:"capitalize"}}>{mmLabel(ym)}</div>
          <div style={{fontSize:11,color:C.textFaint,marginTop:2}}>{daysOk} dia{daysOk!==1?"s":""} farmado{daysOk!==1?"s":""}</div>
        </div>
        {isCurrent&&<span style={{fontSize:10,background:`${C.gold}22`,color:C.gold,padding:"3px 8px",borderRadius:99,fontWeight:700}}>MÊS ATUAL</span>}
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:32,marginBottom:14}}>
        {bars.map((v,i)=>{ const h=maxGP>0?Math.max(2,(Math.abs(v)/maxGP)*32):2; return <div key={i} style={{flex:1,height:`${h}px`,background:v>0?C.green:v<0?C.red:C.muted+"40",borderRadius:2,opacity:v!==0?1:.3}}/>; })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[["Valor Total",totalCur>=0?fmtMoney(totalCur,curSym):"—",totalCur>=0?C.green:C.red],["Média/Dia",daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—",C.goldLight],["Gold Total",fmt(totalGP)+" gp",C.text],["Melhor Dia",bestDay.key?fmtMoney(toCur(toTC(bestDay.val,gpPerTc),curRate),curSym):"—",C.purple]].map(([label,val,color])=>(
          <div key={label} style={{background:C.bg2,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:C.textFaint,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:18,color}}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══ APP ══════════════════════════════════════════════════════════════════════ */
function App() {
  const [state,setState] = useState(()=>{
    const d=load()||initState();
    if(!d.currency) d.currency="BRL";
    if(!d.rates)    d.rates={BRL:d.brlPerTc||0.216,USD:0.040,EUR:0.037,GBP:0.032,CAD:0.055};
    return d;
  });
  const [viewMonth,setViewMonth]=useState(nowYM());
  const [clip,setClip]=useState("");
  const [parsed,setParsed]=useState(null);
  const [parseErr,setErr]=useState("");
  const [tab,setTab]=useState("tracker");
  const [flash,setFlash]=useState(null);
  const [modal,setModal]=useState(null);
  const w=useW(); const mob=w<600;

  useEffect(()=>{ save(state); },[state]);

  const curObj=getCur(state), curRate=getRate(state), curSym=curObj.sym;

  function showFlash(msg){ setFlash(msg); setTimeout(()=>setFlash(null),3200); }
  function handlePaste(t){ setClip(t); const r=parseClip(t); r?(setErr(""),setParsed(r)):(setErr("Não consegui ler o Balance. Verifique se o texto está completo."),setParsed(null)); }

  function confirmHunt(){
    if(!parsed) return;
    const {date,balance,session,loot,supplies,players}=parsed;
    setState(p=>{ const days={...p.days}; if(!days[date]) days[date]={hunts:[],totalBalance:0}; days[date]={hunts:[...days[date].hunts,{balance,session,loot,supplies,players,ts:Date.now()}],totalBalance:days[date].totalBalance+balance}; return{...p,days}; });
    showFlash(`✅ Hunt de ${fmt(parsed.balance)} gp salva!`);
    setClip(""); setParsed(null); setErr(""); setTab("tracker");
    setViewMonth(parsed.date.slice(0,7));
  }

  function removeHunt(dateKey,idx){
    setState(p=>{ const days={...p.days},hunts=[...days[dateKey].hunts]; const rem=hunts.splice(idx,1)[0]; days[dateKey]={hunts,totalBalance:days[dateKey].totalBalance-rem.balance}; if(!hunts.length) delete days[dateKey]; return{...p,days}; });
  }

  function saveManual(dateKey,entry,editIdx){
    setState(p=>{ const days={...p.days}; if(!days[dateKey]) days[dateKey]={hunts:[],totalBalance:0}; let h=[...days[dateKey].hunts],t=days[dateKey].totalBalance; if(editIdx!==null){t-=h[editIdx].balance;h[editIdx]=entry;}else h.push(entry); t+=entry.balance; days[dateKey]={hunts:h,totalBalance:t}; return{...p,days}; });
    showFlash(editIdx!==null?"💾 Entrada atualizada!":`✅ ${fmt(entry.balance)} gp salvo!`);
  }

  function clearMonth(){ if(!confirm(`Apagar todos os dados de ${mmLabel(viewMonth)}?`)) return; setState(p=>{ const days={...p.days}; Object.keys(days).filter(k=>k.startsWith(viewMonth+"-")).forEach(k=>delete days[k]); return{...p,days}; }); }

  const {playerName,gpPerTc,days}=state;
  const allMonths=useMemo(()=>{ const s=new Set(Object.keys(days).map(k=>k.slice(0,7))); s.add(nowYM()); return Array.from(s).sort().reverse(); },[days]);

  const total=daysInMonth(viewMonth);
  let cum=0;
  const rows=Array.from({length:total},(_,i)=>{
    const d=i+1,key=`${viewMonth}-${String(d).padStart(2,"0")}`,day=days[key];
    const gp=day?day.totalBalance:0,tc=toTC(gp,gpPerTc),cur=toCur(tc,curRate);
    cum+=day?cur:0;
    return {d,key,gp,tc,cur,cumulative:cum,hunts:day?.hunts||[],hasData:!!day};
  });

  const maxGP=Math.max(...rows.map(r=>Math.abs(r.gp)),1);
  const totalGP=rows.reduce((s,r)=>s+r.gp,0);
  const totalTC=toTC(totalGP,gpPerTc);
  const totalCur=toCur(totalTC,curRate);
  const daysOk=rows.filter(r=>r.hasData).length;

  const px=mob?12:24;
  const S={
    th:  {background:C.bg2,color:C.gold,padding:mob?"8px 8px":"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontSize:mob?11:12,letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`},
    inp: {background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,width:"100%",outline:"none",fontFamily:"'Inter',sans-serif"},
    lbl: {fontSize:11,color:C.textSub,marginBottom:5,display:"block",letterSpacing:.5,textTransform:"uppercase"},
  };
  const btnPrimary={padding:mob?"10px 18px":"11px 24px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:`linear-gradient(135deg,${C.gold},${C.goldDim})`,color:"#0a0804",letterSpacing:.5};
  const btnGhost={padding:mob?"10px 18px":"11px 24px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13};
  const btnDanger={padding:mob?"8px 12px":"9px 16px",borderRadius:8,border:`1px solid ${C.red}44`,cursor:"pointer",fontWeight:700,background:"transparent",color:C.red,fontSize:12};

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>

      {/* Flash */}
      {flash&&<div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:"#0d2e1a",border:`1px solid ${C.green}55`,color:C.green,padding:"12px 22px",borderRadius:12,fontWeight:700,zIndex:999,fontSize:14,boxShadow:"0 8px 32px #000c",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center",animation:"slideUp .2s ease"}}>{flash}</div>}

      {/* Modal */}
      {modal&&<ManualModal dateKey={modal.dateKey} dayNum={modal.dayNum} existingHunts={days[modal.dateKey]?.hunts||[]} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} onSave={saveManual} onRemove={removeHunt} onClose={()=>setModal(null)}/>}

      {/* ══ HERO HEADER ══ */}
      <div style={{position:"relative",overflow:"hidden",background:"linear-gradient(180deg,#0a0a1a 0%,#0d0d20 60%,#08080f 100%)",borderBottom:`1px solid ${C.border}`,padding:mob?"24px 16px 20px":"36px 28px 28px",textAlign:"center",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(16px)"}}>
        {/* Decoração: estrelas */}
        {[{x:"8%",y:"20%",s:2,d:0},{x:"92%",y:"30%",s:3,d:1},{x:"15%",y:"70%",s:2,d:2},{x:"85%",y:"65%",s:2,d:.5},{x:"50%",y:"10%",s:2,d:1.5},{x:"30%",y:"15%",s:3,d:2.5},{x:"70%",y:"20%",s:2,d:.8}].map((s,i)=>(
          <div key={i} className="star" style={{left:s.x,top:s.y,width:s.s,height:s.s,animationDelay:`${s.d}s`,animationDuration:`${2+i*.3}s`}}/>
        ))}

        {/* Linha decorativa superior */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:mob?8:12}}>
          <div style={{height:1,width:mob?30:60,background:`linear-gradient(90deg,transparent,${C.gold})`}}/>
          <span style={{fontSize:mob?10:11,color:C.goldDim,letterSpacing:3,textTransform:"uppercase"}}>Farm Tracker</span>
          <div style={{height:1,width:mob?30:60,background:`linear-gradient(270deg,transparent,${C.gold})`}}/>
        </div>

        {/* Ícone + Título */}
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:mob?6:10}}>
          <div style={{fontSize:mob?32:44,lineHeight:1,filter:"drop-shadow(0 0 16px #c8a83c88)"}}>⚔️</div>
          <h1 className="hero-title" style={{fontSize:mob?26:42,letterSpacing:mob?3:6,lineHeight:1,margin:0}}>
            TIBIA FARM TRACKER
          </h1>
          <div style={{fontSize:mob?11:13,color:C.textFaint,letterSpacing:1}}>
            {playerName?<><span style={{color:C.textSub,fontWeight:600}}>{playerName}</span> · </>:""}
            <span style={{textTransform:"capitalize"}}>{mmLabel(viewMonth)}</span>
            {" · "}<span style={{color:C.green,fontWeight:600}}>{daysOk}</span> dias farmados
            {" · "}<span style={{color:C.gold}}>{curObj.flag} {curObj.code}</span>
          </div>
        </div>

        {/* Botão + Hunt */}
        <div style={{marginTop:mob?12:16}}>
          <button style={{...btnPrimary,fontSize:13,padding:mob?"9px 20px":"10px 28px",letterSpacing:1,boxShadow:`0 4px 20px ${C.gold}44`}} onClick={()=>setTab("paste")}>
            ⚔️ + NOVA HUNT
          </button>
        </div>

        {/* Linha decorativa inferior */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginTop:mob?12:16}}>
          <div style={{height:1,flex:1,background:`linear-gradient(90deg,transparent,${C.border})`}}/>
          <div style={{width:6,height:6,background:C.gold,borderRadius:1,transform:"rotate(45deg)",opacity:.6}}/>
          <div style={{height:1,flex:1,background:`linear-gradient(270deg,transparent,${C.border})`}}/>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{maxWidth:960,margin:"0 auto",display:"flex",justifyContent:"center",padding:`0 ${px}px`}}>
          {[["tracker","📊","Tracker"],["history","📅","Histórico"],["paste","📋","Colar Sessão"],["config","⚙️","Config"]].map(([id,icon,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:mob?"10px 14px":"11px 20px",cursor:"pointer",fontSize:mob?11:13,fontWeight:600,whiteSpace:"nowrap",background:"none",border:"none",borderBottom:tab===id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===id?C.gold:C.textSub,flexShrink:0,letterSpacing:.3,transition:"color .15s"}}>
              {mob?icon:`${icon} ${label}`}
            </button>
          ))}
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:mob?"12px":"20px 28px"}}>

        {/* ══ TRACKER ══ */}
        {tab==="tracker"&&<>
          {/* Widget Rashid */}
          <InfoPanel mob={mob}/>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?8:12,marginBottom:16}}>
            {[["Gold Total",fmt(totalGP)+" gp",C.goldLight],["Tibia Coins",Math.round(totalTC).toLocaleString()+" TC",C.goldLight],["Valor "+curObj.code,fmtMoney(totalCur,curSym),C.green],["Média/Dia",daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—",C.goldLight]].map(([label,val,color])=>(
              <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:mob?"12px":"16px 18px"}}>
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:mob?18:24,color,lineHeight:1.1}}>{val}</div>
                <div style={{fontSize:mob?10:11,color:C.textFaint,marginTop:4,textTransform:"uppercase",letterSpacing:.7}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Navegação mês */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setViewMonth(m=>addMonth(m,-1))} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:"pointer",color:C.textSub,fontSize:13,fontWeight:700}}>‹</button>
              <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.text,fontSize:14,textTransform:"capitalize",minWidth:140,textAlign:"center"}}>{mmLabel(viewMonth)}</span>
              <button onClick={()=>setViewMonth(m=>addMonth(m,1))} disabled={viewMonth>=nowYM()} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",cursor:viewMonth>=nowYM()?"not-allowed":"pointer",color:viewMonth>=nowYM()?C.muted:C.textSub,fontSize:13,fontWeight:700,opacity:viewMonth>=nowYM()?.4:1}}>›</button>
              {viewMonth!==nowYM()&&<button onClick={()=>setViewMonth(nowYM())} style={{fontSize:11,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",color:C.textSub}}>Hoje</button>}
            </div>
            <button style={btnDanger} onClick={clearMonth}>🗑 {mob?"":"Limpar mês"}</button>
          </div>

          {/* Tabela */}
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr>
                    <th style={{...S.th,textAlign:"left"}}>Dia</th>
                    <th style={{...S.th,textAlign:"left",paddingLeft:0}}>Gold Balance</th>
                    {!mob&&<th style={S.th}>TC</th>}
                    <th style={S.th}>{curSym} Valor</th>
                    <th style={S.th}>Acumulado</th>
                    <th style={{...S.th,width:36,padding:"10px 8px"}}></th>
                  </tr>
                </thead>
                <tbody>
                  {rows.map(r=><HuntRow key={r.key} {...r} maxGP={maxGP} curSym={curSym} isMobile={mob} onRemove={idx=>removeHunt(r.key,idx)} onEdit={()=>setModal({dateKey:r.key,dayNum:r.d})}/>)}
                </tbody>
                <tfoot>
                  <tr style={{background:C.bg2}}>
                    <td style={{padding:mob?"10px 8px":"10px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.gold,fontSize:13,letterSpacing:1}}>TOTAL</td>
                    <td style={{padding:mob?"10px 6px":"10px 14px",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:totalGP>=0?C.green:C.red,fontSize:15}}>{fmt(totalGP)} gp</td>
                    {!mob&&<td style={{padding:"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.goldLight}}>{Math.round(totalTC).toLocaleString()}</td>}
                    <td style={{padding:mob?"10px 6px":"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:totalCur>=0?C.green:C.red}}>{fmtMoney(totalCur,curSym)}</td>
                    <td style={{padding:mob?"10px 6px":"10px 14px",textAlign:"right",fontFamily:"'Rajdhani',sans-serif",fontWeight:600,color:C.accentGlow}}>{fmtMoney(totalCur,curSym)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            <div style={{padding:"10px 16px",fontSize:11,color:C.textFaint,borderTop:`1px solid ${C.border}22`}}>💡 Clique em ✏️ para adicionar ou editar valores manualmente.</div>
          </div>
        </>}

        {/* ══ HISTÓRICO ══ */}
        {tab==="history"&&<>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1,marginBottom:4}}>📅 HISTÓRICO DE MESES</div>
            <div style={{fontSize:13,color:C.textSub}}>Clique em um mês para ver o detalhe no Tracker.</div>
          </div>
          {allMonths.length===0?<div style={{textAlign:"center",padding:60,color:C.textFaint}}>Nenhum dado registrado ainda.</div>
            :<div style={{display:"grid",gridTemplateColumns:mob?"1fr":w<800?"1fr 1fr":"repeat(3,1fr)",gap:14}}>
              {allMonths.map(ym=><MonthCard key={ym} ym={ym} days={days} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} isCurrent={ym===nowYM()} onClick={()=>{setViewMonth(ym);setTab("tracker");}}/>)}
            </div>}
        </>}

        {/* ══ COLAR SESSÃO ══ */}
        {tab==="paste"&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:17,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:4}}>📋 COLAR COPYBOARD</div>
            <div style={{fontSize:12,color:C.textSub,marginBottom:14}}>No Tibia: ícone de sessão → "Copy to Clipboard" → cole abaixo.</div>
            <textarea style={{width:"100%",minHeight:mob?160:200,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,color:C.text,fontSize:mob?12:13,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5}}
              placeholder={"Session data: From 2026-05-01, 19:36:27 to ...\nSession: 01:37h\nLoot: 8,784,927\nSupplies: 3,319,100\nBalance: 5,465,827\n..."}
              value={clip} onChange={e=>handlePaste(e.target.value)}/>
            {parseErr&&<div style={{color:C.red,background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 14px",fontSize:13,marginTop:10}}>⚠️ {parseErr}</div>}
            {parsed&&(
              <div style={{background:"#0b1a0b",border:"1px solid #2a4a2a",borderRadius:14,padding:mob?14:20,marginTop:14}}>
                <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.green,fontSize:15,marginBottom:14}}>✅ SESSÃO DETECTADA</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
                  {[["📅 Data",parsed.date],["⏱ Duração",parsed.session],["📦 Loot",fmt(parsed.loot)+" gp"],["💊 Supplies",fmt(parsed.supplies)+" gp"],["💰 Balance",fmt(parsed.balance)+" gp"],["💎 Em TC",`~${Math.round(toTC(parsed.balance,gpPerTc)).toLocaleString()} TC`]].map(([k,v])=>(
                    <div key={k} style={{background:"#0a160a",borderRadius:8,padding:"9px 12px"}}>
                      <div style={{fontSize:10,color:C.textFaint}}>{k}</div>
                      <div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:mob?13:15,color:k.includes("Balance")?(parsed.balance>=0?C.green:C.red):C.text}}>{v}</div>
                    </div>
                  ))}
                </div>
                {parsed.players.length>0&&(<div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:C.textFaint,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Jogadores</div>
                  {parsed.players.map(p=>(
                    <div key={p.name} style={{display:"flex",justifyContent:"space-between",background:"#0a160a",borderRadius:8,padding:"7px 12px",fontSize:13,marginBottom:4}}>
                      <span style={{color:C.text,fontWeight:600}}>{p.name}</span>
                      <span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:p.balance>=0?C.green:C.red}}>{p.balance>=0?"+":""}{fmt(p.balance)} gp</span>
                    </div>
                  ))}
                </div>)}
                <div style={{display:"flex",gap:10}}>
                  <button style={btnPrimary} onClick={confirmHunt}>✅ Salvar Hunt</button>
                  <button style={btnGhost} onClick={()=>{setClip("");setParsed(null);setErr("");}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="config"&&(
          <div>
            <CurrencyConfig state={state} setState={setState}/>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:16}}>⚙️ DADOS DO JOGADOR</div>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14,marginBottom:20}}>
                {[["Seu nome no Tibia","text","playerName","Ex: Czar Malta"],["GP por TC","number","gpPerTc","Ex: 41000"]].map(([label,type,key,ph])=>(
                  <div key={key}>
                    <label style={S.lbl}>{label}</label>
                    <input style={S.inp} type={type} value={state[key]} placeholder={ph}
                      onChange={e=>setState(p=>({...p,[key]:type==="number"?Number(e.target.value):e.target.value}))}/>
                  </div>
                ))}
              </div>
              <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontSize:12,color:C.textSub,lineHeight:1.8,marginBottom:16}}>
                ℹ️ Os dados são salvos <strong style={{color:C.text}}>automaticamente</strong> no navegador (localStorage).<br/>
                Use o backup abaixo para não perder dados ao trocar de dispositivo ou limpar o navegador.
              </div>
              <div style={{marginBottom:14}}>
                <label style={S.lbl}>Backup (copie e guarde em lugar seguro)</label>
                <textarea style={{...S.inp,minHeight:70,fontSize:11,resize:"vertical"}} readOnly value={JSON.stringify(state)}/>
              </div>
              <div>
                <label style={S.lbl}>Restaurar backup</label>
                <div style={{display:"flex",gap:8}}>
                  <textarea id="rb" style={{...S.inp,minHeight:60,fontSize:11,flex:1,resize:"vertical"}} placeholder="Cole o backup aqui..."/>
                  <button style={{...btnPrimary,alignSelf:"flex-end",whiteSpace:"nowrap"}}
                    onClick={()=>{try{const d=JSON.parse(document.getElementById("rb").value);setState(d);showFlash("✅ Backup restaurado!");}catch{alert("Dados inválidos.");}}}>
                    Restaurar
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ══ FOOTER ══ */}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
