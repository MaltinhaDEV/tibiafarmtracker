<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:#17140f; font-family:'Fira Code',monospace; }
html { background:#17140f; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#5a4828; border-radius:99px; opacity:.6; }

input[type=month]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator  { filter:invert(0.7) sepia(0.3) hue-rotate(10deg); cursor:pointer; }
input[type=number]::-webkit-inner-spin-button        { opacity:0.3; }

/* ── Animações ── */
@keyframes fadeIn   { from{opacity:0}           to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes rashidBob{ 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-4px)} }
@keyframes rashidBlink{ 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
@keyframes torchFlicker { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.7;transform:scaleY(.9)} 75%{opacity:.9;transform:scaleY(1.05)} }
@keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes starPulse{ 0%,100%{opacity:.2} 50%{opacity:.8} }
@keyframes borderGlow{ 0%,100%{box-shadow:0 0 10px #d4780a22} 50%{box-shadow:0 0 28px #d4780a55} }

.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .15s ease; }
.slide-up      { animation:slideUp .2s ease; }
.bar-cell      { display:flex;align-items:center;gap:6px; }
.bar-track     { flex:1;height:4px;background:#2a2418;border-radius:2px;overflow:hidden; }
.bar-fill      { height:100%;border-radius:2px;transition:width .4s ease; }
.row-hover:hover   { background:rgba(200,140,20,.08)!important; }
.card-hover        { transition:border-color .2s,box-shadow .2s; }
.card-hover:hover  { border-color:#d4780a55!important;box-shadow:0 2px 12px rgba(200,140,20,.15); }
.cur-btn           { transition:all .15s; }
.cur-btn:hover     { border-color:#d4780a55!important; }
button:active      { transform:scale(.97); }

/* ── Dark panel effects ── */
body {
  background-color:#17140f !important;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(80,60,20,.04) 2px,
      rgba(80,60,20,.04) 4px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 24px,
      rgba(80,60,20,.02) 24px,
      rgba(80,60,20,.02) 25px
    );
}

/* Raised panel */
.panel-raised {
  background: linear-gradient(180deg, #221e17 0%, #1e1b14 60%, #17140f 100%) !important;
  border: 1px solid #3d3020 !important;
  border-top: 2px solid #5a4828 !important;
  border-bottom: 2px solid #2a2018 !important;
  box-shadow:
    0 1px 0 #3a3020 inset,
    0 -1px 0 #1a1410 inset,
    2px 0 0 #3a3020 inset,
    -2px 0 0 #3a3020 inset,
    0 4px 12px rgba(0,0,0,.40),
    0 8px 24px rgba(0,0,0,.30),
    0 2px 4px rgba(0,0,0,.20) !important;
  border-radius:8px !important;
}

/* Panel header — keep gold */
.panel-header {
  background: linear-gradient(180deg, #d4a850 0%, #c89840 40%, #a87830 100%) !important;
  border-bottom: 1px solid #8a6020 !important;
  border-top: 1px solid #e8c860 !important;
  box-shadow: 0 2px 4px rgba(0,0,0,.4), 0 1px 0 rgba(255,200,60,.3) inset !important;
  color: #f0e0c0 !important;
  text-shadow: 0 1px 2px rgba(0,0,0,.7) !important;
}

/* Ornamental divider */
.ornament-divider {
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4780a, #e8960a, #d4780a, transparent);
  margin: 0;
  box-shadow: 0 1px 6px rgba(200,120,10,.4);
}

/* Table 3D */
.table-3d {
  box-shadow:
    0 4px 16px rgba(0,0,0,.40),
    0 8px 32px rgba(0,0,0,.30),
    0 1px 0 #3a3020 inset,
    0 -1px 0 #1a1410 inset !important;
}

/* KPI card */
.kpi-3d {
  background: linear-gradient(180deg, #221e17 0%, #1a1712 100%) !important;
  border: 1px solid #3d3020 !important;
  border-top: 2px solid #5a4828 !important;
  border-bottom: 2px solid #2a2018 !important;
  box-shadow:
    0 1px 0 rgba(80,60,20,.8) inset,
    0 4px 10px rgba(0,0,0,.35),
    0 2px 4px rgba(0,0,0,.20) !important;
}

/* Stars */
.star { position:absolute;border-radius:50%;background:#d4780a;animation:starPulse 3s ease-in-out infinite;box-shadow:none; }

/* Shimmer title */
.hero-title {
  font-family:'Cinzel',serif;
  font-weight:700;
  background:linear-gradient(90deg,#a05808,#e8960a,#d4780a,#f0b030,#d4780a,#e8960a,#a05808);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite;
}

/* Rashid sprite */
.rashid-sprite { animation:rashidBob 1.6s ease-in-out infinite; image-rendering:pixelated; }
.rashid-eyes   { animation:rashidBlink 4s ease-in-out infinite; transform-origin:center; }

/* Footer */
.footer-link { color:#a09070;text-decoration:none;transition:color .2s;font-weight:600; }
.footer-link:hover { color:#d4780a; }

/* Dark inputs */
input, textarea, select {
  color-scheme: dark;
}

</style>

// ── Lang state ───────────────────────────────────────────────────────────
function detectLang(){
  const saved = localStorage.getItem("tft_lang");
  if(saved && TR[saved]) return saved;
  const nav = (navigator.language||"pt").slice(0,2).toLowerCase();
  return TR[nav] ? nav : "pt";
}

// _lang é global lido por t() durante render
let _lang = detectLang();

// t() lê _lang no momento do render — sempre atualizado
function t(k){ return (TR[_lang]||TR["pt"])[k] ?? (TR["pt"])[k] ?? k; }

// Setter global — atualiza _lang E o estado React do App
let _setAppLang = null;
function setGlobalLang(code){
  if(!TR[code]) return;
  _lang = code;
  localStorage.setItem("tft_lang", code);
  document.documentElement.lang = code==="pt"?"pt-BR":code;
  if(_setAppLang) _setAppLang(code);   // força re-render do App
}

// ── useLang hook ─────────────────────────────────────────────────────────
function useLang(){
  const [lang, setLang] = useState(_lang);
  useEffect(()=>{
    // Registra este setter como o responsável por re-renderizar o App
    _setAppLang = setLang;
    return ()=>{ if(_setAppLang===setLang) _setAppLang=null; };
  },[]);
  return lang;
}

function parseClip(text) {
  if(!text) return null;
  const dM=text.match(/From (\d{4}-\d{2}-\d{2})/),sM=text.match(/Session:\s*([\d:]+h)/),
        lM=text.match(/^Loot:\s*([\d,]+)/m),spM=text.match(/^Supplies:\s*([\d,]+)/m),
        bM=text.match(/^Balance:\s*(-?[\d,]+)/m);
  if(!bM) return null;
  const n=s=>parseInt(s.replace(/,/g,""),10);
  const players=[]; const re=/^(.+?)\n\s+Loot:\s*([\d,]+)\n\s+Supplies:\s*([\d,]+)\n\s+Balance:\s*(-?[\d,]+)\n\s+Damage:\s*([\d,]+)\n\s+Healing:\s*([\d,]+)/gm;
  let m; while((m=re.exec(text))!==null) players.push({name:m[1].trim(),loot:n(m[2]),supplies:n(m[3]),balance:n(m[4]),damage:n(m[5]),healing:n(m[6])});
  return { date:dM?dM[1]:new Date().toISOString().slice(0,10), session:sM?sM[1]:"?", loot:lM?n(lM[1]):0, supplies:spM?n(spM[1]):0, balance:n(bM[1]), players };
}

/* ══ HOOK: busca Boosted Creature + Boss ═════════════════════════════════════ */
function useBoosted() {
  const [creature, setCreature] = useState(null);
  const [boss,     setBoss]     = useState(null);

  useEffect(()=>{
    const tryFetch = async (path) => {
      const bases = [
        "https://api.tibiadata.com/v4/",
        "https://corsproxy.io/?https://api.tibiadata.com/v4/",
      ];
      for(const base of bases){
        try{
          const r = await fetch(base+path, {signal:AbortSignal.timeout(7000)});
          if(!r.ok) continue;
          return await r.json();
        }catch{}
      }
      return null;
    };

    // Endpoint correto: /v4/creatures — estrutura: { creatures: { boosted: { name, race, image_url } } }
    tryFetch("creatures").then(d=>{
      const c = d?.creatures?.boosted;
      if(c?.name) setCreature(c);
    });

    // Boss boostado: /v4/boostablebosses — estrutura: { boostable_bosses: { boosted: { name, race, image_url } } }
    tryFetch("boostablebosses").then(d=>{
      const b = d?.boostable_bosses?.boosted;
      if(b?.name) setBoss(b);
    });
  },[]);

  return {creature, boss};
}

function useCharSearch() {

  const [loading,setLoading]= useState(false);
  const [err,    setErr]    = useState("");
  async function search() {
    if(!name.trim()) return;
    setLoading(true); setResult(null); setErr("");
    const enc=encodeURIComponent(name.trim());
    const urls=[`https://api.tibiadata.com/v4/character/${enc}`,`https://corsproxy.io/?https://api.tibiadata.com/v4/character/${enc}`];
    let data=null;
    for(const url of urls){ try{ const r=await fetch(url,{signal:AbortSignal.timeout(6000)}); const d=await r.json(); if(d?.character?.character?.name){data=d.character.character;break;} }catch{} }
    if(data) setResult(data); else setErr("Personagem não encontrado.");
    setLoading(false);
  }
  return {name, setName, result, loading, err, search};
}

function getRashidDay() {
  // Rashid muda às 10h AM horário da Alemanha (Server Save do Tibia)
  // CET = UTC+1 (inverno), CEST = UTC+2 (verão) — Intl API lida automaticamente
  const germanyTime = new Date(new Date().toLocaleString("en-US", {timeZone:"Europe/Berlin"}));
  const hour = germanyTime.getHours();
  const day  = germanyTime.getDay();
  // Antes das 10h AM (hora alemã), o Rashid ainda é do dia anterior
  return hour < 10 ? (day + 6) % 7 : day;
}

                  <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:"rgba(255,240,180,.7)",marginTop:2}}>Tibia.com · Community</div>

            {items.map((item, idx) => (
              <div key={item.id}>

                                ["◈","Vocação",charData.vocation,"#ff9944"],
                                ["◉","Mundo",charData.world,"#f5dfa0"],
                              ].map(([ic,lb,val,col])=>(
                                <div key={lb} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${C.border}22`}}>
                                  <span style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textFaint,letterSpacing:.3}}>{ic} {lb}</span>
                                  <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:col}}>{val||"—"}</span>

                                  <span style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textFaint}}>⬡ Guild</span>
                                  <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:"#bb88ff"}}>{charData.guild.name}</span>
                                </div>
                              )}
                            </div>
                            {/* Link Tibia.com */}
                            <a href={`https://www.tibia.com/community/?subtopic=characters&name=${encodeURIComponent(charData.name)}`} target="_blank" rel="noopener noreferrer"
                              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"10px",
                                background:"linear-gradient(90deg,#3a1200,#221000)",borderTop:`1px solid ${C.border}`,
                                color:"#ff9944",textDecoration:"none",fontFamily:"'Cinzel',serif",fontSize:11,
                                letterSpacing:2,fontWeight:700}}>
                              ⚔ VER NO TIBIA.COM
                            </a>
                          </div>
                        )}
                        {!charData&&!charErr&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textFaint,textAlign:"center",padding:"10px 0"}}>
                          <div style={{fontSize:22,marginBottom:5,opacity:.3}}>⚔</div>
                          Digite o nome e pressione Enter
                        </div>}
                      </div>
                    )}

                    {/* WORLDS */}
                    {item.id==="worlds"&&(
                      <div>
                        {worldLoad&&<div style={{textAlign:"center",padding:"12px",fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint}}>Carregando mundos...</div>}
                        {worldData&&(
                          <div style={{maxHeight:180,overflowY:"auto"}}>
                            {worldData.map(w=>(
                              <div key={w.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 2px",borderBottom:`1px solid ${C.border}22`}}>
                                <div>
                                  <span style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,color:C.text}}>{w.name}</span>
                                  <span style={{fontFamily:"'Fira Code',monospace",fontSize:8,color:C.textFaint,marginLeft:5}}>{w.location}</span>
                                </div>
                                <div style={{display:"flex",alignItems:"center",gap:4}}>
                                  <span style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.green,fontWeight:600}}>{w.players_online??"-"}</span>
                                  {w.battleye&&<span style={{fontSize:7,padding:"1px 3px",borderRadius:2,background:"#0a2018",color:C.green,fontFamily:"'Fira Code',monospace"}}>BE</span>}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {/* HIGHSCORES */}
                    {item.id==="hs"&&(
                      <div>
                        {/* Seletor de servidor */}
                        <div style={{display:"flex",gap:6,marginBottom:10}}>
                          <input
                            value={hsInput}
                            onChange={e=>setHsInput(e.target.value)}
                            onKeyDown={e=>{if(e.key==="Enter"){setHsWorld(hsInput);loadHighscores(hsInput);}}}
                            placeholder="Servidor (ex: Antica)"
                            style={{...inpS,flex:1,fontSize:12}}
                          />
                          <button onClick={()=>{setHsWorld(hsInput);loadHighscores(hsInput);}} disabled={hsLoad}
                            style={btnS}>{hsLoad?"⏳":"→"}</button>
                        </div>
                        {/* Label do mundo atual */}
                        <div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint,marginBottom:6,display:"flex",alignItems:"center",gap:4}}>
                          <span>🌍</span>
                          <span>Top 15 · <strong style={{color:C.gold}}>{hsWorld}</strong> · Experiência</span>
                        </div>
                        {/* Lista */}
                        {hsLoad&&<div style={{textAlign:"center",padding:"14px",fontFamily:"'Fira Code',monospace",fontSize:11,color:C.textFaint}}>Carregando...</div>}
                        {hsData&&(
                          <div style={{maxHeight:220,overflowY:"auto"}}>
                            {hsData.length>0?hsData.map((p,i)=>(
                              <div key={p.name} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:`1px solid ${C.border}22`}}>
                                <span style={{
                                  fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,
                                  color:i===0?"#FFD700":i===1?"#C0C0C0":i===2?"#CD7F32":C.textFaint,
                                  width:22,textAlign:"right",flexShrink:0
                                }}>{p.rank}</span>
                                <span style={{
                                  fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,
                                  color:C.text,flex:1,
                                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"
                                }}>{p.name}</span>
                                <span style={{
                                  fontFamily:"'Fira Code',monospace",fontSize:11,
                                  color:C.textSub,flexShrink:0,fontWeight:500
                                }}>Lv {p.level}</span>
                              </div>
                            )):(
                              <div style={{textAlign:"center",padding:"14px",fontFamily:"'Fira Code',monospace",fontSize:11,color:C.textFaint}}>
                                Nenhum resultado para <strong>{hsWorld}</strong>
                              </div>
                            )}
                          </div>
                        )}
                        {!hsData&&!hsLoad&&(
                          <div style={{textAlign:"center",padding:"10px 0",fontFamily:"'Fira Code',monospace",fontSize:11,color:C.textFaint}}>
                            <div style={{fontSize:18,marginBottom:4,opacity:.3}}>🏆</div>
                            Digite o servidor e pressione →
                          </div>
                        )}
                      </div>
                    )}

                    {/* GUILDS */}
                    {item.id==="guilds"&&(
                      <div>
                        <div style={{display:"flex",gap:6,marginBottom:8}}>
                          <input value={guildName} onChange={e=>setGuildName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchGuild()} placeholder="Nome da guild..." style={inpS}/>
                          <button onClick={searchGuild} disabled={guildLoad} style={btnS}>{guildLoad?"⏳":"→"}</button>
                        </div>
                        {guildErr&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.red,marginBottom:4}}>✗ {guildErr}</div>}
                        {guildData&&(
                          <div style={{background:C.card,border:`1px solid ${C.border}33`,borderRadius:8,padding:"10px 11px"}}>
                            <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,marginBottom:4}}>{guildData.name}</div>
                            <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textFaint,marginBottom:4}}>🌍 {guildData.world}</div>
                            {guildData.description&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textSub,marginBottom:5,lineHeight:1.5,maxHeight:40,overflow:"hidden"}}>{guildData.description}</div>}
                            <div style={{display:"flex",gap:10}}>
                              <span style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint}}>👥 <span style={{color:C.text,fontWeight:700}}>{guildData.members_total||"—"}</span></span>
                              <span style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint}}>🟢 <span style={{color:C.green,fontWeight:700}}>{guildData.members_online||0}</span> online</span>
                            </div>
                          </div>
                        )}
                        {!guildData&&!guildErr&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint,textAlign:"center",padding:"8px 0"}}>Digite o nome e pressione Enter</div>}
                      </div>
                    )}

                  </div>
                )}
              </div>
            ))}

            {/* Footer */}
            <div style={{padding:"7px 14px",display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:C.bg2}}>
              <span style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textFaint,letterSpacing:1}}>🔱 Abre no Tibia.com ↗</span>
            </div>

          </div>
        );
      })()}
    </div>
  );
}

/* ══ SIDEBAR DIREITA: Criatura Boostada + Boss ═══════════════════════════════ */
function RightSidebar({ creature, boss, mob }) {
  if(mob) return null;

  function BigBoostCard({ data, label, color, border, icon }) {
    const [imgOk, setImgOk] = useState(true);
    const imgSrc = data?.image_url || creatureImgUrl(data?.name, data?.race);
    return (
      <div style={{background:"linear-gradient(180deg,#221e17,#1a1712)",
        border:"1px solid #c8a050",borderTop:"2px solid #e8c870",borderBottom:"2px solid #9a7030",
        borderRadius:10,overflow:"hidden",
        boxShadow:"0 1px 0 rgba(80,60,20,.8) inset,0 4px 14px rgba(100,60,0,.15)"}}>
        {/* Golden header */}
        <div style={{background:"linear-gradient(180deg,#c8a040,#a87830)",
          padding:"9px 14px",borderBottom:"2px solid #8a6020",
          boxShadow:"0 2px 4px rgba(0,0,0,.15),0 1px 0 rgba(255,220,80,.4) inset",
          display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:13}}>{icon}</span>
          <span style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:"#f0e0c0",
            letterSpacing:1.5,textTransform:"uppercase",fontWeight:600,
            textShadow:"0 1px 2px rgba(0,0,0,.5)"}}>{label}</span>
        </div>
        <div style={{padding:16}}>
        {!data ? (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,padding:"12px 0"}}>
            <div style={{width:80,height:80,background:C.bg2,borderRadius:12,animation:"starPulse 1.5s ease-in-out infinite"}}/>
            <div style={{fontSize:11,color:C.textFaint}}>{t("loading")}</div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
            <div style={{position:"relative"}}>
              {imgOk
                ? <img src={imgSrc} alt={data.name} width={90} height={90}
                    style={{imageRendering:"pixelated",objectFit:"contain",display:"block",filter:`drop-shadow(0 0 16px ${border}88)`}}
                    onError={()=>setImgOk(false)}/>
                : <div style={{width:90,height:90,background:`${border}22`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>{icon}</div>
              }
              <div style={{position:"absolute",top:-6,right:-6,background:border,borderRadius:99,width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#221e17",fontWeight:700,boxShadow:`0 0 8px ${border}`}}>{icon}</div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:C.text,lineHeight:1.3,wordBreak:"break-word"}}>{data.name}</div>
            </div>
          </div>
        )}
        </div>{/* end padding */}
      </div>
    );
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12,width:220,flexShrink:0}}>
      <BigBoostCard data={creature} label={t("boosted_c")} color="#9b6dff" border="#7b3aed" icon="⭐"/>
      <BigBoostCard data={boss} label={t("boosted_b")} color="#f06060" border="#c03030" icon="☠️"/>
    </div>
  );
}

/* ══ PAINEL INFO MOBILE ═════════════════════════════════════════════════════ */
function InfoPanel({ mob, creature, boss }) {
  const today = new Date();
  const dow   = today.getDay();
  const rashid= RASHID[dow];
  const dias  = t("ds");
  const diasFull = t("df");

  const cardBase = { background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px" };

  // Mini card para criatura/boss
  function BoostCard({ data, label, color, borderColor, icon }) {
    if(!data) return (
      <div style={{...cardBase,border:`1px solid ${borderColor}22`,display:"flex",alignItems:"center",gap:10,flex:1}}>
        <div style={{width:40,height:40,background:C.bg2,borderRadius:8,flexShrink:0,animation:"starPulse 1.5s ease-in-out infinite"}}/>
        <div style={{fontSize:11,color:C.textFaint}}>Carregando...</div>
      </div>
    );
    const img = data.image_url || creatureImgUrl(data.name, data.race);
    return (
      <div style={{...cardBase,border:`1px solid ${borderColor}44`,background:`linear-gradient(135deg,${borderColor}10,${C.card})`,display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
        <div style={{position:"relative",flexShrink:0}}>
          <img src={img} alt={data.name} width={44} height={44} style={{imageRendering:"pixelated",objectFit:"contain",display:"block"}} onError={e=>e.target.style.display="none"}/>
          <div style={{position:"absolute",top:-5,right:-5,background:borderColor,borderRadius:99,width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#221e17",fontWeight:700}}>{icon}</div>
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontSize:9,color,letterSpacing:.8,textTransform:"uppercase",marginBottom:2}}>{label}</div>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.name}</div>
        </div>
      </div>
    );
  }

  if(mob) return (
    <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
      {/* Rashid mobile */}
      <div style={{...cardBase,border:"1px solid #3a1a0044",background:"linear-gradient(135deg,#0d1a0d,#0a120a)",display:"flex",alignItems:"center",gap:12}}>
        <RashidSprite size={48}/>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{t("rashid_today")} · {diasFull[dow]}</div>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20,color:C.green}}>{rashid.city}</div>
          <div style={{fontSize:10,color:C.textFaint}}>📍 {t("rashid_tip_"+dow)}</div>
        </div>
      </div>
      {/* Boosted mobile */}
      <div style={{display:"flex",gap:8}}>
        <BoostCard data={creature} label={t("boosted_c")} color="#9b6dff" borderColor="#7b3aed" icon="★"/>
        <BoostCard data={boss} label={t("boosted_b")} color="#f06060" borderColor="#c03030" icon="☠"/>
      </div>
    </div>
  );

  return (
    <div style={{marginBottom:16}}>
      {/* Grid 4 colunas: Rashid | Criatura | Boss | Busca */}
      <div style={{display:"grid",gridTemplateColumns:"1.4fr 1fr 1fr",gap:10}}>

        {/* COL 1 — RASHID */}
        <div style={{...cardBase,border:"1px solid #3a1a0044",background:"linear-gradient(135deg,#0d1a0d,#0a120a)",animation:"borderGlow 3s ease-in-out infinite",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",right:-8,bottom:-8,fontSize:52,opacity:.05,userSelect:"none"}}>🗺️</div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <RashidSprite size={52}/>
            <div>
              <div style={{fontSize:9,color:C.gold,letterSpacing:1,textTransform:"uppercase"}}>{t("rashid_today")}</div>
              <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:22,color:C.green,lineHeight:1.1}}>{rashid.city}</div>
              <div style={{fontSize:10,color:C.textFaint,marginTop:1}}>📍 {t("rashid_tip_"+dow)}</div>
            </div>
          </div>
          {/* Calendário semanal */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {RASHID.map((r,i)=>(
              <div key={i} title={`${diasFull[i]}: ${r.city}`}
                style={{padding:"3px 2px",borderRadius:5,background:i===dow?"#1a3a1a":"#0d0d18",border:`1px solid ${i===dow?"#2a5a2a":C.border}`,textAlign:"center"}}>
                <div style={{fontSize:7,color:i===dow?C.green:C.textFaint,fontWeight:i===dow?700:400}}>{dias[i]}</div>
                <div style={{fontSize:7,color:i===dow?C.goldLight:C.textFaint,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.city.split(" ")[0]}</div>
              </div>
            ))}
          </div>
          <div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:8,background:"#1a3a1a",border:"1px solid #2a5a2a",borderRadius:99,padding:"2px 10px"}}>
            <span style={{fontSize:10,color:C.green,fontWeight:700}}>{diasFull[dow]}</span>
          </div>
        </div>

        {/* COL 2 — CRIATURA BOOSTADA */}
        <BoostCard data={creature} label="⭐ Criatura Boostada" color="#9b6dff" borderColor="#7b3aed" icon="★"/>

        {/* COL 3 — BOSS BOOSTADO */}
        <BoostCard data={boss} label="☠️ Boss Boostado" color="#f06060" borderColor="#c03030" icon="☠"/>


      </div>
    </div>
  );
}

function CharSearch({ charName, setCharName, charResult, charLoad, charErr, onSearch, mob }) {
  const cardBase = { background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:"14px 16px" };
  return (

          placeholder="Nome do char..."
          style={{flex:1,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",fontFamily:"'Cinzel',serif"}}/>
        <button onClick={onSearch} disabled={charLoad}
          style={{background:`linear-gradient(135deg,${C.accent},#3a5aaa)`,border:"none",borderRadius:8,padding:"8px 12px",cursor:"pointer",color:"#221e17",fontSize:12,fontWeight:700,whiteSpace:"nowrap",opacity:charLoad?.6:1}}>
          {charLoad?t("searching"):t("search_btn")}
        </button>
      </div>
      {charErr && <div style={{fontSize:10,color:C.red,marginBottom:6}}>{charErr}</div>}
      {charResult ? (
        <div style={{background:C.bg2,borderRadius:10,padding:"10px 12px"}}>
          <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:16,color:C.gold,marginBottom:4}}>{charResult.name}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"3px 8px",fontSize:11}}>

            <div><span style={{color:charResult.online?C.green:C.textFaint}}>{charResult.online?"● Online":"○ Offline"}</span></div>
            <div style={{gridColumn:"1/-1",color:C.textSub}}>{charResult.vocation}</div>
            {charResult.guild?.name && <div style={{gridColumn:"1/-1",color:C.purple}}>🏰 {charResult.guild.name}</div>}
            <div style={{gridColumn:"1/-1",color:C.textFaint}}>🌍 {charResult.world}</div>

        </div>
      ) : !charLoad && !charErr && (
        <div style={{textAlign:"center",padding:"12px 0",color:C.textFaint,fontSize:11}}>
          {t("char_hint")}
        </div>
      )}
    </div>
  );
}

/* ══ MINI BAR ═══════════════════════════════════════════════════════════════ */
function MiniBar({ value, max }) {
  const pct=max>0?Math.min(100,(Math.abs(value)/Math.abs(max))*100):0;
  return <div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:value>=0?C.green:C.red}}/></div>;
}

/* ══ MODAL ENTRADA MANUAL ═══════════════════════════════════════════════════ */
function ManualModal({ dateKey, dayNum, existingHunts, gpPerTc, curSym, curRate, onSave, onRemove, onClose }) {
  const [bal,setBal]=useState(""), [note,setNote]=useState(""), [editIdx,setEdit]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(),60); },[]);
  const num=Number(bal)||0, tc=toTC(num,gpPerTc), cur=toCur(tc,curRate);
  function startEdit(h,i){ setBal(String(h.balance)); setNote(h.note||""); setEdit(i); setTimeout(()=>ref.current?.focus(),30); }
  function clear(){ setBal(""); setNote(""); setEdit(null); }
  function handleSave(){ if(bal==="") return; onSave(dateKey,{balance:num,note,session:"manual",loot:0,supplies:0,players:[],manual:true,ts:Date.now()},editIdx); clear(); }
  function onKey(e){ if(e.key==="Enter") handleSave(); if(e.key==="Escape") onClose(); }
  const manuals=existingHunts.filter(h=>h.manual);
  const inp={ background:C.bg2, border:`1.5px solid ${editIdx!==null?C.accent:C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:15, width:"100%", outline:"none", fontFamily:"'Cinzel',serif", transition:"border-color .2s" };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="slide-up" style={{background:C.card,border:`1px solid ${C.borderHi}`,borderRadius:18,padding:24,width:"100%",maxWidth:440,boxShadow:`0 24px 80px #000d`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1}}>{t("manual_title")}</div>
            <div style={{fontSize:12,color:C.textFaint,marginTop:3}}>{t("day")} {dayNum} · {dateKey}</div>
          </div>
          <button style={{background:"none",border:"none",color:C.textFaint,cursor:"pointer",fontSize:22,lineHeight:1}} onClick={onClose}>×</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Profit / Balance (gp)</div>
          <input ref={ref} style={inp} type="number" placeholder={t("manual_gp_ph")} value={bal} onChange={e=>setBal(e.target.value)} onKeyDown={onKey}/>
          {bal!==""&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {[[`~${Math.round(tc).toLocaleString()} TC`,C.goldLight],[fmtMoney(cur,curSym),num>=0?C.green:C.red]].map(([v,col])=>(
                <div key={v} style={{flex:1,background:C.bg2,borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,color:col}}>{v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Observação (opcional)</div>
          <input style={inp} type="text" placeholder={t("manual_note_ph")} value={note} onChange={e=>setNote(e.target.value)} onKeyDown={onKey}/>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:manuals.length>0?20:0}}>
          <button disabled={bal===""} onClick={handleSave}
            style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:bal===""?"not-allowed":"pointer",fontWeight:700,fontSize:14,opacity:bal===""?.4:1,
              background:editIdx!==null?`linear-gradient(135deg,${C.accent},#3a5aaa)`:`linear-gradient(135deg,${C.gold},${C.goldDim})`,color:editIdx!==null?"#221e17":"#17140f"}}>
            {editIdx!==null?t("manual_upd"):t("manual_save")}
          </button>
          {editIdx!==null&&<button onClick={clear} style={{padding:"12px 16px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13}}>Cancelar</button>}
        </div>
        {manuals.length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>{t("manual_entries")}</div>
            {existingHunts.map((h,i)=>!h.manual?null:(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:editIdx===i?C.cardHi:C.bg2,border:`1px solid ${editIdx===i?C.accent:C.border}`,borderRadius:10,padding:"9px 12px",marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</div>

                <button style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onClick={()=>startEdit(h,i)}>✏️</button>

              </div>

        {existingHunts.filter(h=>!h.manual).length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:manuals.length>0?14:0}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>{t("manual_copy")}</div>

                <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</span>
              </div>
            ))}

        )}
      </div>
    </div>
  );

/* ══ MONTH CARD ══════════════════════════════════════════════════════════════ */
function MonthCard({ ym, days, gpPerTc, curSym, curRate, onClick, isCurrent }) {
  const prefix=ym+"-";
  const entries=Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const totalGP=entries.reduce((s,[,v])=>s+v.totalBalance,0);
  const totalCur=toCur(toTC(totalGP,gpPerTc),curRate);
  const daysOk=entries.length;
  const bestDay=entries.reduce((b,[k,v])=>v.totalBalance>b.val?{key:k,val:v.totalBalance}:b,{key:null,val:-Infinity});
  const maxGP=Math.max(...entries.map(([,v])=>Math.abs(v.totalBalance)),1);
  const total=daysInMonth(ym);
  const bars=Array.from({length:total},(_,i)=>{const key=`${ym}-${String(i+1).padStart(2,"0")}`; return days[key]?.totalBalance||0;});
  return (
    <div className="card-hover" onClick={onClick} style={{background:C.card,border:`1px solid ${isCurrent?C.gold+"55":C.border}`,borderRadius:16,padding:20,cursor:"pointer",boxShadow:isCurrent?`0 0 30px ${C.gold}18`:"none",transition:"all .2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:isCurrent?C.gold:C.text,letterSpacing:.5,textTransform:"capitalize"}}>{mmLabel(ym)}</div>
          <div style={{fontSize:11,color:C.textFaint,marginTop:2}}>{daysOk} {t("d_farmed")}</div>
        </div>
        {isCurrent&&<span style={{fontSize:10,background:`${C.gold}22`,color:C.gold,padding:"3px 8px",borderRadius:99,fontWeight:700}}>{t("cur_month")}</span>}
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:2,height:32,marginBottom:14}}>
        {bars.map((v,i)=>{ const h=maxGP>0?Math.max(2,(Math.abs(v)/maxGP)*32):2; return <div key={i} style={{flex:1,height:`${h}px`,background:v>0?C.green:v<0?C.red:C.muted+"40",borderRadius:2,opacity:v!==0?1:.3}}/>; })}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[[t("value")+" Total",totalCur>=0?fmtMoney(totalCur,curSym):"—",totalCur>=0?C.green:C.red],[t("daily_avg"),daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—",C.goldLight],[t("gold_total"),fmt(totalGP)+" gp",C.text],[t("best_day"),bestDay.key?fmtMoney(toCur(toTC(bestDay.val,gpPerTc),curRate),curSym):"—",C.purple]].map(([label,val,color])=>(
          <div key={label} style={{background:C.bg2,borderRadius:10,padding:"10px 12px"}}>
            <div style={{fontSize:10,color:C.textFaint,marginBottom:3,textTransform:"uppercase",letterSpacing:.5}}>{label}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color}}>{val}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

const SK_DJINN = "tibia_djinn_v2";
const loadDjinn = () => { try{ const d=JSON.parse(localStorage.getItem(SK_DJINN)); return d&&typeof d==="object"?d:{}; }catch{ return {}; } };
const saveDjinn = d => { try{ localStorage.setItem(SK_DJINN,JSON.stringify(d)); }catch{} };

/* ══ DJINN TAB ═══════════════════════════════════════════════════════════════ */
function DjinnTab({ mob }) {
  const [djinnType, setDjinnType] = useState("blue");
  const [lists, setLists]         = useState(()=>{ const d=loadDjinn(); return {blue:d.blue||[],green:d.green||[]}; });
  const [search, setSearch]       = useState("");
  const [qty, setQty]             = useState("");
  const [suggestions, setSugg]    = useState([]);
  const [selected, setSelected]   = useState(null); // {name, price}
  const [editIdx, setEditIdx]     = useState(null);
  const searchRef = useRef(null);
  const qtyRef    = useRef(null);

  useEffect(()=>{ saveDjinn(lists); },[lists]);

  const djinn = DJINN_ITEMS[djinnType];
  const list  = lists[djinnType]||[];

  function handleSearchChange(val) {
    setSearch(val); setSelected(null);
    if(val.length<1){ setSugg([]); return; }
    const q=val.toLowerCase();
    const matches=Object.entries(djinn.items)
      .filter(([name])=>name.toLowerCase().includes(q))
      .sort(([a],[b])=>a.toLowerCase().startsWith(q)?-1:b.toLowerCase().startsWith(q)?1:0)
      .slice(0,8);
    setSugg(matches);
  }

  function selectItem(name, price) {
    setSearch(name); setSelected({name,price}); setSugg([]);
    setTimeout(()=>qtyRef.current?.focus(),30);
  }

  function addItem() {
    if(!selected || !qty || parseInt(qty)<=0) return;
    const num = parseInt(qty);
    if(editIdx!==null){
      setLists(p=>{ const l=[...p[djinnType]]; l[editIdx]={...l[editIdx],qty:num,total:num*selected.price}; return{...p,[djinnType]:l}; });
      setEditIdx(null);
    } else {
      // merge if item already exists
      setLists(p=>{
        const l=[...p[djinnType]];
        const existing=l.findIndex(i=>i.name===selected.name);
        if(existing>=0){ l[existing]={...l[existing],qty:l[existing].qty+num,total:(l[existing].qty+num)*selected.price}; }
        else l.push({name:selected.name,price:selected.price,qty:num,total:num*selected.price});
        return{...p,[djinnType]:l};
      });
    }
    setSearch(""); setQty(""); setSelected(null);
    setTimeout(()=>searchRef.current?.focus(),30);
  }

  function removeItem(idx) {
    setLists(p=>{ const l=[...p[djinnType]]; l.splice(idx,1); return{...p,[djinnType]:l}; });
  }

  function startEdit(idx) {
    const item=list[idx];
    setSearch(item.name); setSelected({name:item.name,price:item.price}); setQty(String(item.qty));
    setEditIdx(idx); setSugg([]);
    setTimeout(()=>qtyRef.current?.focus(),30);
  }

  function clearList() {
    if(!confirm(`t("djinn_clear")+" " ${djinn.name}?`)) return;
    setLists(p=>({...p,[djinnType]:[]}));
  }

  function onKey(e) {
    if(e.key==="Enter") addItem();
    if(e.key==="Escape"){ setSugg([]); setSearch(""); setSelected(null); setQty(""); setEditIdx(null); }
    if(e.key==="ArrowDown"&&suggestions.length>0){ e.preventDefault(); document.querySelector(".sugg-item")?.focus(); }
  }

  const totalGP    = list.reduce((s,i)=>s+i.total,0);
  const blueTotal  = (lists.blue||[]).reduce((s,i)=>s+i.total,0);
  const greenTotal = (lists.green||[]).reduce((s,i)=>s+i.total,0);
  const grand      = blueTotal+greenTotal;

  const inp={background:C.bg2,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Cinzel',serif",width:"100%",transition:"border-color .2s"};

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>

      {/* Totais superiores */}
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:10,marginBottom:18}}>
        {[
          {key:"blue",  d:DJINN_ITEMS.blue,  val:blueTotal },
          {key:"green", d:DJINN_ITEMS.green, val:greenTotal},
          {key:"grand", d:{name:"Total Geral",color:C.goldLight,icon:"💰"}, val:grand},
        ].map(({key,d,val})=>(
          <div key={key} onClick={()=>key!=="grand"&&setDjinnType(key)}
            style={{background:C.card,border:`1px solid ${key===djinnType||key==="grand"?d.color+"44":C.border}`,borderRadius:14,padding:"20px 22px",
              cursor:key!=="grand"?"pointer":"default",transition:"all .2s",boxShadow:key===djinnType||key==="grand"?`0 0 20px ${d.color}22`:"none"}}>
            <div style={{fontSize:10,color:d.color,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{d.icon} {d.name}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:mob?20:26,color:val>0?d.color:C.textFaint}}>{fmt(val)} gp</div>
            {key!=="grand"&&<div style={{fontSize:10,color:C.textFaint,marginTop:2}}>{(lists[key]||[]).length} itens na lista</div>}
          </div>
        ))}
      </div>

      {/* Seletor Blue / Green */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {["blue","green"].map(k=>{
          const d=DJINN_ITEMS[k];
          return(
            <button key={k} onClick={()=>{ setDjinnType(k); setSearch(""); setQty(""); setSelected(null); setSugg([]); setEditIdx(null); }}
              style={{padding:"9px 22px",borderRadius:10,border:`1.5px solid ${djinnType===k?d.color:C.border}`,cursor:"pointer",fontWeight:700,fontSize:13,
                background:djinnType===k?`${d.border}33`:"transparent",color:djinnType===k?d.color:C.textSub,transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"flex-start",gap:2}}>
              <span>{d.icon} {d.name}</span>
              <span style={{fontSize:9,color:djinnType===k?d.color+"99":C.textFaint,fontWeight:400}}>{d.npcs} · {d.local}</span>
            </button>
          );
        })}
      </div>

      {/* Card principal */}
      <div style={{background:C.card,border:`1px solid ${djinn.border}44`,borderRadius:18,overflow:"hidden",boxShadow:`0 0 30px ${djinn.border}22`}}>

        {/* Header */}
        <div style={{background:djinn.bg,padding:"16px 20px",borderBottom:`1px solid ${djinn.border}44`,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:36}}>{djinn.icon}</div>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:djinn.color,letterSpacing:1}}>{djinn.name.toUpperCase()}</div>
            <div style={{fontSize:11,color:C.textFaint}}>NPC {djinn.npc} · {djinn.local}</div>
          </div>
        </div>

        {/* Input de adicionar */}
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${djinn.border}22`,background:`${djinn.border}08`}}>
          <div style={{fontSize:10,color:djinn.color,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>
            {editIdx!==null?"✏️ Editando item":"➕ Adicionar item"}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:mob?"wrap":"nowrap"}}>
            {/* Busca com autocomplete */}
            <div style={{position:"relative",flex:2,minWidth:mob?"100%":180}}>
              <input ref={searchRef} value={search} onChange={e=>handleSearchChange(e.target.value)} onKeyDown={onKey}
                placeholder={`Buscar item do ${djinn.name}...`}
                style={{...inp,borderColor:selected?djinn.color:search.length>0?djinn.border:C.border,paddingRight:selected?36:14}}/>
              {selected&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:djinn.color,fontSize:16}}>✓</div>}
              {/* Suggestions */}
              {suggestions.length>0&&(
                <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.cardHi,border:`1px solid ${djinn.border}66`,borderRadius:10,zIndex:50,overflow:"hidden",boxShadow:"0 8px 24px #000a"}}>
                  {suggestions.map(([name,price])=>(
                    <button key={name} className="sugg-item" onClick={()=>selectItem(name,price)}
                      style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:"none",border:"none",cursor:"pointer",color:C.text,fontSize:13,textAlign:"left",borderBottom:`1px solid ${C.border}33`,transition:"background .1s"}}
                      onMouseEnter={e=>e.currentTarget.style.background=`${djinn.border}22`}
                      onMouseLeave={e=>e.currentTarget.style.background="none"}>
                      <span>{name}</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:djinn.color,fontSize:13}}>{fmt(price)} gp</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Quantidade */}
            <input ref={qtyRef} type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} onKeyDown={onKey}
              placeholder="Qtd" style={{...inp,width:mob?"100%":90,textAlign:"center",fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,borderColor:qty?djinn.border:C.border}}/>

            {/* Preview do total */}
            {selected&&qty&&parseInt(qty)>0&&(
              <div style={{display:"flex",alignItems:"center",background:`${djinn.border}22`,border:`1px solid ${djinn.border}44`,borderRadius:10,padding:"0 14px",whiteSpace:"nowrap",minWidth:120}}>
                <div>
                  <div style={{fontSize:9,color:djinn.color,letterSpacing:.5}}>{t("total")}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:C.text}}>{fmt(parseInt(qty)*selected.price)} gp</div>
                </div>
              </div>
            )}

            {/* Botão adicionar */}
            <button onClick={addItem} disabled={!selected||!qty||parseInt(qty)<=0}
              style={{padding:"10px 20px",borderRadius:10,border:"none",cursor:(!selected||!qty)?"not-allowed":"pointer",fontWeight:700,fontSize:14,whiteSpace:"nowrap",
                background:editIdx!==null?`linear-gradient(135deg,${C.accent},#3a5aaa)`:`linear-gradient(135deg,${djinn.color},${djinn.border})`,
                color:"#0a0a0a",opacity:(!selected||!qty||parseInt(qty)<=0)?.4:1,transition:"opacity .2s"}}>
              {editIdx!==null?"💾 Atualizar":"➕ Adicionar"}
            </button>
            {editIdx!==null&&(
              <button onClick={()=>{setSearch("");setQty("");setSelected(null);setEditIdx(null);setSugg([]);}}
                style={{padding:"10px 14px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13}}>
                Cancelar
              </button>
            )}
          </div>
        </div>

        {/* Lista de itens adicionados */}
        {list.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.textFaint}}>
            <div style={{fontSize:36,marginBottom:8}}>📦</div>
            <div style={{fontSize:13}}>Nenhum item adicionado ainda.<br/>Use o campo acima para começar.</div>
          </div>
        ):(
          <>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:C.bg2}}>
                    {["Item","Qtd","Valor Unit.","Total",""].map((h,i)=>(
                      <th key={i} style={{padding:"9px "+(i===0?"20px":"14px"),textAlign:i===0?"left":"right",color:djinn.color,fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1,textTransform:"uppercase",borderBottom:`1px solid ${djinn.border}33`,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {list.map((item,i)=>(
                    <tr key={i} className="row-hover" style={{background:editIdx===i?`${djinn.border}18`:"transparent",borderBottom:`1px solid ${djinn.border}18`,transition:"background .15s"}}>
                      <td style={{padding:"10px 20px",color:C.text,fontWeight:600}}>{item.name}</td>
                      <td style={{padding:"10px 14px",textAlign:"right",fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:djinn.color}}>{item.qty.toLocaleString("pt-BR")}</td>

                      <td style={{padding:"10px 14px",textAlign:"right",fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:djinn.color}}>{fmt(item.total)} gp</td>
                      <td style={{padding:"10px 14px",textAlign:"right",whiteSpace:"nowrap"}}>
                        <button title="Editar" onClick={()=>startEdit(i)} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,padding:"2px 5px"}}>✏️</button>
                        <button title="Remover" onClick={()=>removeItem(i)} style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:14,padding:"2px 5px"}}>🗑</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{background:C.bg2,borderTop:`2px solid ${djinn.border}44`}}>
                    <td style={{padding:"13px 20px",fontFamily:"'Cinzel',serif",fontWeight:700,color:djinn.color,fontSize:13,letterSpacing:1}}>TOTAL {djinn.name.toUpperCase()}</td>

}


/* ══ META DIÁRIA ════════════════════════════════════════════════════════════ */
const SK_META = "tibia_meta_v1";
function loadMeta(){ try{ return JSON.parse(localStorage.getItem(SK_META)||"null"); }catch{return null;} }
function saveMeta(d){ try{ localStorage.setItem(SK_META,JSON.stringify(d)); }catch{} }

function MetaTab({ days, gpPerTc, viewMonth }) {
  const [meta, setMeta] = useState(()=>loadMeta()||{goal:5000000, name:"Meta Diária"});
  const [inputGoal, setInputGoal] = useState(String(meta.goal));
  const [inputName, setInputName] = useState(meta.name);
  const [saved, setSaved] = useState(false);

  function saveGoal(){
    const g = parseInt(inputGoal.replace(/[^0-9]/g,""),10);
    if(!g||g<=0) return;
    const m = {goal:g, name:inputName||"Meta Diária"};
    setMeta(m); saveMeta(m); setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  const prefix = viewMonth+"-";
  const entries = Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const total = new Date(+viewMonth.split("-")[0], +viewMonth.split("-")[1], 0).getDate();

  const dayMap = {};
  entries.forEach(([k,v])=>{ const d=+k.split("-")[2]; dayMap[d]=v.totalBalance; });

  const today = new Date();
  const isCurrentMonth = viewMonth === nowYM();
  const todayDay = isCurrentMonth ? today.getDate() : null;
  const todayGP = todayDay ? (dayMap[todayDay]||0) : 0;
  const todayPct = Math.min(200, Math.round((todayGP/meta.goal)*100));
  const todayHit = todayGP >= meta.goal;

  const farmDays = Object.values(dayMap).filter(v=>v>0);
  const hitDays = farmDays.filter(v=>v>=meta.goal).length;
  const missDays = farmDays.filter(v=>v>0&&v<meta.goal).length;
  const successRate = farmDays.length>0 ? Math.round((hitDays/farmDays.length)*100) : 0;

  const cardBase = {
    background:"linear-gradient(160deg,#1e1b18 0%,#17140f 100%)",
    border:"1px solid #3d3020",
    borderTop:"2px solid #5a4828",
    borderRadius:16,padding:"22px 24px",marginBottom:16,
    boxShadow:"0 4px 24px rgba(0,0,0,.45),0 1px 0 #3a3020 inset"

  const secTitle = {display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingBottom:14,borderBottom:"1px solid #3d302044"};
  const gem = {width:7,height:7,background:C.gold,transform:"rotate(45deg)",flexShrink:0,boxShadow:`0 0 8px ${C.gold}88`};
  const lbl = {fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textFaint,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6,display:"block",fontWeight:600};

  return (
    <div style={{maxWidth:880,margin:"0 auto"}}>

      {/* DEFINIR META */}
      <div style={cardBase}>
        <div style={secTitle}>
          <div style={gem}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.gold,letterSpacing:3,fontWeight:700,textTransform:"uppercase",textShadow:`0 0 10px ${C.gold}66`}}>{t("meta_goal_lbl")}</span>
        </div>

        <div style={{display:"flex",gap:14,alignItems:"flex-end",marginBottom:18,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}>
            <label style={lbl}>{t("meta_goal_lbl")}</label>
            <input value={inputGoal} onChange={e=>setInputGoal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()}
              placeholder="Ex: 5000000" type="number"
              style={{background:"#221e17",border:"1px solid #5a4828",borderRadius:10,padding:"11px 14px",color:C.text,fontSize:16,width:"100%",outline:"none",fontFamily:"'Fira Code',monospace",fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,.3) inset"}}/>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label style={lbl}>{t("meta_name_lbl")}</label>
            <input value={inputName} onChange={e=>setInputName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()}
              placeholder="Ex: Meta Rashid"
              style={{background:"#221e17",border:"1px solid #5a4828",borderRadius:10,padding:"11px 14px",color:C.text,fontSize:14,width:"100%",outline:"none",fontFamily:"'Fira Code',monospace",boxShadow:"0 2px 8px rgba(0,0,0,.3) inset"}}/>
          </div>
          <button onClick={saveGoal}
            style={{padding:"13px 24px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:11,letterSpacing:2,whiteSpace:"nowrap",flexShrink:0,
              color:saved?"#e8f8ee":"#221e17",fontFamily:"'Cinzel',serif",
              background:saved?"linear-gradient(135deg,#1a6a3a,#0d4a27)":"linear-gradient(135deg,#d4780a,#a05808)",
              boxShadow:saved?"0 0 16px #1a6a3a66":"0 0 16px #d4780a66,0 4px 12px rgba(0,0,0,.4)"}}>
            {saved?t("meta_saved"):t("meta_save")}
          </button>
        </div>

        {isCurrentMonth&&(
          <>
            <label style={lbl}>{t("meta_progress")} — Dia {todayDay}</label>
            <div style={{background:"#1a1712",borderRadius:12,padding:"16px 18px",marginBottom:16,border:"1px solid #3d302033",boxShadow:"0 2px 8px rgba(0,0,0,.3) inset"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:todayHit?C.green:todayGP>0?C.red:C.textFaint,textShadow:todayHit?"0 0 12px #2a8a3a88":todayGP>0?"0 0 12px #cc442288":"none"}}>{fmt(todayGP)} gp</span>
                <span style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textSub,alignSelf:"flex-end"}}>Meta: {fmt(meta.goal)} gp</span>

                  background:todayHit?"linear-gradient(90deg,#1a6a3a,#4ade80)":"linear-gradient(90deg,#cc2200,#ff6644)",
                  boxShadow:todayHit?"0 0 8px #2a8a3a":"0 0 8px #cc4422",

              </div>
              <div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:todayHit?C.green:C.textFaint,textAlign:"right",fontWeight:600}}>{todayPct}% {todayPct>=100?"✅ Meta atingida!":"da meta"}</div>
            </div>

            <div style={{display:"flex",gap:12}}>
              <div style={{flex:1,
                background:todayHit?"linear-gradient(160deg,#0d2a18,#0a1e12)":"linear-gradient(160deg,#2a0e0e,#1a0808)",
                border:`1px solid ${todayHit?"#2a8a3a66":"#cc442266"}`,borderRadius:12,
                padding:"16px 20px",display:"flex",alignItems:"center",gap:14,
                boxShadow:todayHit?"0 0 20px rgba(42,138,58,.2)":"0 0 20px rgba(204,68,34,.2)"}}>
                <span style={{fontSize:28}}>{todayHit?"🟢":"🔴"}</span>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:todayHit?C.green:C.red,textShadow:todayHit?"0 0 10px #2a8a3a88":"0 0 10px #cc442288"}}>
                    {todayHit?t("meta_hit"):todayGP>0?t("meta_miss"):t("meta_no_data")}
                  </div>
                  {todayGP>0&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:todayHit?"#4ab85a":"#e05535",marginTop:4}}>
                    {todayHit?`+${fmt(todayGP-meta.goal)} ${t("meta_above")}`:`${t("meta_left")} ${fmt(meta.goal-todayGP)} gp`}
                  </div>}
                </div>
              </div>
              <div style={{background:"#1a1712",border:"1px solid #3d302044",borderRadius:12,padding:"16px 20px",textAlign:"center",minWidth:100,
                boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
                <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textFaint,marginBottom:6,letterSpacing:1,textTransform:"uppercase"}}>{t("meta_days_hit")}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:26,fontWeight:700,color:C.green,textShadow:"0 0 12px #2a8a3a88"}}>{hitDays}/{farmDays.length}</div>
              </div>
            </div>
          </>
        )}
      </div>

      {/* CALENDÁRIO */}
      <div style={cardBase}>
        <div style={secTitle}>
          <div style={gem}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.gold,letterSpacing:3,fontWeight:700,textTransform:"uppercase",textShadow:`0 0 10px ${C.gold}66`}}>📅 {mmLabel(viewMonth)} — Visão Geral</span>
        </div>

        {/* Legenda */}
        <div style={{display:"flex",gap:18,marginBottom:16,flexWrap:"wrap"}}>
          {[["linear-gradient(160deg,#0d2a18,#0a1e12)","#2a8a3a","✅ Meta atingida"],
            ["linear-gradient(160deg,#2a0e0e,#1a0808)","#cc4422","❌ Abaixo da meta"],

          {Array.from({length:total},(_,i)=>{

            {icon:"✅",lbl:t("meta_hit_days"),  val:`${hitDays} dias`,  color:"#4ab85a", glow:"#2a8a3a", bg:"linear-gradient(160deg,#0d2a18,#0a1e12)", border:"#2a8a3a55"},
            {icon:"❌",lbl:t("meta_miss_days"), val:`${missDays} dias`, color:"#e05535", glow:"#cc4422", bg:"linear-gradient(160deg,#2a0e0e,#1a0808)", border:"#cc442244"},
            {icon:"🎯",lbl:t("meta_rate"),      val:`${successRate}%`,  color:"#f0a020", glow:"#d4780a", bg:"linear-gradient(160deg,#201808,#17120a)", border:"#d4780a55"},

            <div key={lbl} style={{background:bg,border:`1px solid ${border}`,borderTop:`2px solid ${border}`,

              <div style={{fontFamily:"'Cinzel',serif",fontSize:28,fontWeight:700,color,textShadow:`0 0 14px ${glow}aa`,lineHeight:1}}>{val}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

      </div>

      {/* FOOTER */}
      <div style={{padding:"13px 22px",background:"#221e17",borderTop:"1px solid #c8a05033",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} onClick={()=>goStep(i)} style={{
              height:7,borderRadius:99,cursor:"pointer",transition:"all .2s",
              background:step===i?"#d4780a":"#d4780a44",
              width:step===i?20:7,
            }}/>
          ))}
        </div>
        <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:"#c8a870"}}>aparece 1× por dia</div>
        <div style={{display:"flex",gap:8}}>
          {step>0&&<button onClick={prev} style={{background:"none",border:"1px solid #c8a05055",borderRadius:8,padding:"10px 16px",color:"#706050",fontFamily:"'Fira Code',monospace",fontSize:11,cursor:"pointer"}}>← Anterior</button>}
          <button onClick={next} style={{background:"linear-gradient(135deg,#b35a00,#8a4400)",border:"none",borderRadius:8,padding:"10px 22px",color:"#fff",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1.5,fontWeight:700,cursor:"pointer"}}>
            {step===total-1?"✅ Entrar no site":"Próximo →"}
          </button>
        </div>
      </div>

    </div>
    </div>
  );
}

/* ══ APP ══════════════════════════════════════════════════════════════════════ */
function App() {
  const [state,setState] = useState(()=>{
    const d=load()||initState();
    if(!d.currency) d.currency="BRL";
    if(!d.rates)    d.rates={BRL:d.brlPerTc||0.216,USD:0.040,EUR:0.037,GBP:0.032,CAD:0.055};
    return d;
  });
  const _appLang = useLang(); // lang reativo — força re-render do App inteiro
  const [viewMonth,setViewMonth]=useState(nowYM());
  const [clip,setClip]=useState("");
  const [parsed,setParsed]=useState(null);
  const [parseErr,setErr]=useState("");
  const [tab,setTab]=useState("tracker");
  const [flash,setFlash]=useState(null);
  const [showPopup,setShowPopup]=useState(()=>{
    const last = localStorage.getItem("tibia_popup_v1");
    if(!last) return true;
    // Mostra 1× por dia — compara apenas a data, não a hora
    const lastDate = new Date(parseInt(last,10)).toDateString();
    const today    = new Date().toDateString();
    return lastDate !== today;
  });
  const [modal,setModal]=useState(null);
  const w=useW(); const mob=w<600;
  const boostedData = useBoosted();

  useEffect(()=>{ save(state); },[state]);

  const curObj=getCur(state), curRate=getRate(state), curSym=curObj.sym;

  function showFlash(msg){ setFlash(msg); setTimeout(()=>setFlash(null),3200); }
  function handlePaste(t){ setClip(t); const r=parseClip(t); r?(setErr(""),setParsed(r)):(setErr(t("paste_err")),setParsed(null)); }

  function confirmHunt(){
    if(!parsed) return;
    const {date,balance,session,loot,supplies,players}=parsed;
    setState(p=>{ const days={...p.days}; if(!days[date]) days[date]={hunts:[],totalBalance:0}; days[date]={hunts:[...days[date].hunts,{balance,session,loot,supplies,players,ts:Date.now()}],totalBalance:days[date].totalBalance+balance}; return{...p,days}; });
    showFlash(`✅ Hunt de ${fmt(parsed.balance)} gp salva!`);
    setClip(""); setParsed(null); setErr(""); setTab("tracker");
    setViewMonth(parsed.date.slice(0,7));
  }

  function removeHunt(dateKey,idx){
    setState(p=>{ const days={...p.days},hunts=[...days[dateKey].hunts]; const rem=hunts.splice(idx,1)[0]; days[dateKey]={hunts,totalBalance:days[dateKey].totalBalance-rem.balance}; if(!hunts.length) delete days[dateKey]; return{...p,days}; });
  }

  function saveManual(dateKey,entry,editIdx){
    setState(p=>{ const days={...p.days}; if(!days[dateKey]) days[dateKey]={hunts:[],totalBalance:0}; let h=[...days[dateKey].hunts],t=days[dateKey].totalBalance; if(editIdx!==null){t-=h[editIdx].balance;h[editIdx]=entry;}else h.push(entry); t+=entry.balance; days[dateKey]={hunts:h,totalBalance:t}; return{...p,days}; });
    showFlash(editIdx!==null?"💾 Entrada atualizada!":`✅ ${fmt(entry.balance)} gp salvo!`);
  }

  function clearMonth(){ if(!confirm(`Apagar todos os dados de ${mmLabel(viewMonth)}?`)) return; setState(p=>{ const days={...p.days}; Object.keys(days).filter(k=>k.startsWith(viewMonth+"-")).forEach(k=>delete days[k]); return{...p,days}; }); }

  const {playerName,gpPerTc,days}=state;
  const allMonths=useMemo(()=>{ const s=new Set(Object.keys(days).map(k=>k.slice(0,7))); s.add(nowYM()); return Array.from(s).sort().reverse(); },[days]);

  const total=daysInMonth(viewMonth);
  const rows=Array.from({length:total},(_,i)=>{
    const d=i+1,key=`${viewMonth}-${String(d).padStart(2,"0")}`,day=days[key];
    const gp=day?day.totalBalance:0,tc=toTC(gp,gpPerTc),cur=toCur(tc,curRate);
    return {d,key,gp,tc,cur,hunts:day?.hunts||[],hasData:!!day};
  });

  const maxGP=Math.max(...rows.map(r=>Math.abs(r.gp)),1);
  const totalGP=rows.reduce((s,r)=>s+r.gp,0);
  const totalTC=toTC(totalGP,gpPerTc);
  const totalCur=toCur(totalTC,curRate);
  const daysOk=rows.filter(r=>r.hasData).length;

  const px=mob?12:24;
  const S={
    th:  {background:"linear-gradient(180deg,#c8a040,#a87830)",color:"#f0e0c0",textShadow:"0 1px 2px rgba(0,0,0,.4)",padding:mob?"8px 8px":"11px 14px",textAlign:"right",fontFamily:"'Cinzel',serif",fontSize:mob?11:14,letterSpacing:1.2,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,fontWeight:700},
    inp: {background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,width:"100%",outline:"none",fontFamily:"'Cinzel',serif"},
    lbl: {fontSize:11,color:C.textSub,marginBottom:5,display:"block",letterSpacing:.5,textTransform:"uppercase"},
  };
  const btnPrimary={padding:mob?"10px 18px":"11px 24px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:13,background:`linear-gradient(135deg,${C.gold},${C.goldDim})`,color:"#17140f",letterSpacing:.5};
  const btnGhost={padding:mob?"10px 18px":"11px 24px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13};
  const btnDanger={padding:mob?"8px 12px":"9px 16px",borderRadius:8,border:`1px solid ${C.red}44`,cursor:"pointer",fontWeight:700,background:"transparent",color:C.red,fontSize:12};

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,position:"relative"}}>
      {showPopup&&<WelcomePopup onClose={()=>setShowPopup(false)}/>}

      {/* Inferno vignette */}

      {/* Modal */}
      {modal&&<ManualModal dateKey={modal.dateKey} dayNum={modal.dayNum} existingHunts={days[modal.dateKey]?.hunts||[]} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} onSave={saveManual} onRemove={removeHunt} onClose={()=>setModal(null)}/>}

                <polygon points="299,96 293,96 296,78" fill="#e0e0e0"/>
                <rect x="272" y="258" width="54" height="11" rx="5" fill="url(#hxGG)"/>

                <circle cx="326" cy="263" r="5" fill="#fde68a"/>

              </g>
              <g transform="rotate(38, 380, 220)">
                <rect x="375" y="96" width="12" height="168" rx="3" fill="url(#hxSR)"/>
                <rect x="377" y="98" width="3.5" height="164" rx="1" fill="white" opacity="0.3"/>
                <polygon points="381,96 375,96 378,78" fill="#e0e0e0"/>
                <rect x="354" y="258" width="54" height="11" rx="5" fill="url(#hxGG)"/>
                <circle cx="354" cy="263" r="5" fill="#fde68a"/>
                <circle cx="408" cy="263" r="5" fill="#fde68a"/>
                <rect x="374" y="269" width="14" height="44" rx="4" fill="#5a2a08"/>
                <ellipse cx="381" cy="318" rx="10" ry="8" fill="url(#hxGG)"/>
              </g>

          {/* BLOCO CENTRAL: título + subtítulo + botão */}

            <div style={{position:"relative"}}>
              <div style={{position:"absolute",inset:0,filter:"blur(22px)",opacity:.5,
                background:"linear-gradient(90deg,#8040ff,#d4780a,#8040ff)",
                backgroundSize:"200% auto",animation:"shimmer 4s linear infinite"}}/>
              <h1 className="hero-title" style={{
                fontSize:mob?22:46,letterSpacing:mob?3:8,lineHeight:1,margin:0,
                position:"relative",
                background:"linear-gradient(90deg,#7040cc,#d4780a,#e8960a,#f0b030,#d4780a,#9060e0,#7040cc)",
                backgroundSize:"200% auto",
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
                backgroundClip:"text",animation:"shimmer 5s linear infinite",
                fontFamily:"'Cinzel',serif",fontWeight:700}}>
                TIBIA FARM TRACKER
              </h1>
            </div>

            {/* Tagline */}
            <div style={{fontSize:mob?11:14,letterSpacing:mob?1.5:2.5,
              display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"center",
              fontFamily:"'Cinzel',serif",fontWeight:600}}>
              <span style={{color:"#c0b0e8"}}>{t("hero_tag1")}</span>
              <span style={{opacity:.5,color:"#7060c8"}}>·</span>
              <span style={{color:"#d4780a",textShadow:"0 0 10px #d4780a66"}}>{t("hero_tag2")}</span>

              }} onClick={()=>setTab("paste")}
                onMouseEnter={e=>{e.currentTarget.style.boxShadow="0 0 28px #8050ee66,0 3px 14px rgba(0,0,0,.6),inset 0 1px 0 rgba(200,140,255,.3)";e.currentTarget.style.borderColor="#9060ee";}}

                {t("new_hunt")}

            </div>
          </div>
        </div>
      </div>

      {/* ══ TABS PREMIUM ══ */}
      <div style={{background:"linear-gradient(180deg,#0e0c10,#0c0a0e)",borderBottom:"1px solid #1e1e3a",overflowX:"auto",WebkitOverflowScrolling:"touch",boxShadow:"0 4px 20px #00000044"}}>
        <div style={{maxWidth:1400,margin:"0 auto",display:"flex",justifyContent:"center",padding:`0 ${px}px`,gap:2}}>
          {[
            {id:"tracker", icon:"⚔️",  label:t("t_tracker"), desc:t("t_tracker_d"), color:C.gold   },
            {id:"history", icon:"📅",  label:t("t_history"), desc:t("t_history_d"), color:"#7090ff"},
            {id:"djinn",   icon:"🧞",  label:"Djinn", desc:"Venda de itens",   color:"#3dd68c"},
            {id:"paste",   icon:"📋",  label:"Colar Sessão", desc:"Importar hunt",   color:"#f0a030"},
            {id:"meta",    icon:"🎯",  label:t("meta_tab_lbl"), desc:t("meta_tab_desc"), color:"#e84040"},
            {id:"config",  icon:"⚙️",  label:"Configurações", desc:"Ajustes do app",  color:"#9b6dff"},
            {id:"about",   icon:"📜",  label:"About",         desc:"Sobre o projeto",  color:"#c8a030"},
          ].map(({id,icon,label,desc,color})=>{
            const active = tab===id;
            return (
              <button key={id} onClick={()=>setTab(id)}
                style={{
                  position:"relative", cursor:"pointer", background:"none", border:"none", outline:"none",
                  padding: mob?"12px 14px":"14px 22px",
                  flexShrink:0, display:"flex", flexDirection:"column", alignItems:"center", gap:3,
                  transition:"all .2s",
                  borderBottom: active?`3px solid ${color}`:"3px solid transparent",
                  marginBottom:active?0:0,
                }}>
                {/* Glow de fundo quando ativo */}
                {false && null}
                {/* Ícone com glow */}
                <div style={{
                  fontSize: mob?20:22,
                  lineHeight:1,
                  filter: active?`drop-shadow(0 0 8px ${color}aa)`:"none",
                  transform: active?"scale(1.15)":"scale(1)",
                  transition:"all .2s",
                }}>
                  {icon}
                </div>
                {/* Label */}
                {!mob && (
                  <div style={{
                    fontFamily:"'Cinzel',serif",
                    fontWeight:700,
                    fontSize:13,
                    letterSpacing:1.5,
                    textTransform:"uppercase",
                    color: active?color:"#e8d0a8",
                    transition:"color .2s",
                    lineHeight:1,
                    textShadow: active?`0 0 12px ${color}88`:"none",
                  }}>
                    {label}
                  </div>
                )}
                {/* Desc (só desktop) */}
                {!mob && (
                  <div style={{
                    fontFamily:"'Fira Code',monospace",
                    fontSize:10,
                    color: active?color+"cc":"#c8a870",
                    letterSpacing:.3,
                    transition:"all .2s",
                    lineHeight:1,
                    opacity: active?1:.75,
                    fontWeight: active?500:400,

                    {desc}
                  </div>

              </button>
            );

        </div>
      </div>

      {/* ══ LAYOUT 3 COLUNAS (só desktop) ══ */}
      <div style={{maxWidth:1400,margin:"0 auto",padding:mob?"12px":"20px 28px"}}>
        <div style={{display:mob||tab!=="tracker"?"block":"flex",gap:16,alignItems:"flex-start"}}>

          {/* SIDEBAR ESQUERDA */}
          {tab==="tracker"&&!mob&&<LeftSidebar mob={mob}/>}

          {/* CONTEÚDO CENTRAL */}
          <div style={{flex:1,minWidth:0}}>

        {/* ══ TRACKER ══ */}
        {tab==="tracker"&&<>
          {/* Mobile: InfoPanel inline */}
          {mob&&<InfoPanel mob={mob} creature={boostedData.creature} boss={boostedData.boss}/>}

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:mob?8:12,marginBottom:16}}>
            {[[t("gold_total"),fmt(totalGP)+" gp",C.goldLight],[t("tibia_coins"),Math.round(totalTC).toLocaleString()+" TC",C.goldLight],[t("value")+" "+curObj.code,fmtMoney(totalCur,curSym),C.green],[t("daily_avg"),daysOk>0?fmtMoney(totalCur/daysOk,curSym):"—",C.goldLight]].map(([label,val,color])=>(
              <div key={label} style={{background:"linear-gradient(180deg,#221e17,#1a1712)",border:"1px solid #c8a050",borderTop:"2px solid #e8c870",borderBottom:"2px solid #9a7030",borderRadius:10,padding:mob?"12px":"16px 18px",boxShadow:"0 1px 0 rgba(80,60,20,.8) inset,0 4px 10px rgba(100,60,0,.15),0 2px 4px rgba(0,0,0,.10)"}}>

                <div style={{fontSize:mob?10:11,color:C.textFaint,marginTop:4,textTransform:"uppercase",letterSpacing:.7}}>{label}</div>
              </div>

              <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:C.text,fontSize:14,textTransform:"capitalize",minWidth:140,textAlign:"center"}}>{mmLabel(viewMonth)}</span>

              {viewMonth!==nowYM()&&<button onClick={()=>setViewMonth(nowYM())} style={{fontSize:11,background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",cursor:"pointer",color:C.textSub}}>{t("today")}</button>}

            <button style={btnDanger} onClick={clearMonth}>🗑 {mob?"":t("clear_month")}</button>
          </div>

          {/* Tabela com scroll fixo */}
          <div style={{background:"linear-gradient(180deg,#fdfaf4,#faf6ee)",border:"1px solid #c8a050",borderTop:"2px solid #e8c870",borderBottom:"2px solid #9a7030",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 0 rgba(80,60,20,.8) inset,0 4px 16px rgba(100,60,0,.18),0 8px 32px rgba(100,60,0,.08)"}}>

            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr>
                    <th style={{...S.th,textAlign:"left"}}>{t("day")}</th>
                    <th style={{...S.th,textAlign:"left",paddingLeft:0}}>{t("gold_bal")}</th>
                    {!mob&&<th style={S.th}>TC</th>}
                    <th style={S.th}>{curSym} {t("value")}</th>

                    <th style={{...S.th,width:36,padding:"10px 8px"}}></th>
                  </tr>
                </thead>
              </table>
            </div>

            {/* Corpo com scroll fixo */}
            <div style={{overflowY:"auto",overflowX:"auto",maxHeight:320}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <tbody>
                  {rows.map(r=><HuntRow key={r.key} {...r} maxGP={maxGP} curSym={curSym} isMobile={mob} onRemove={idx=>removeHunt(r.key,idx)} onEdit={()=>setModal({dateKey:r.key,dayNum:r.d})}/>)}

              </table>

            <div style={{padding:"8px 16px",fontSize:11,color:C.textFaint,borderTop:`1px solid ${C.border}22`}}>{t("table_tip")}</div>
