          {/* Painel de análise — métricas únicas */}
          {daysOk>0&&(()=>{
            const farmDays = rows.filter(r=>r.hasData);
            const bestDay  = farmDays.reduce((b,r)=>r.gp>b.gp?r:b, farmDays[0]);
            const worstDay = farmDays.reduce((b,r)=>r.gp<b.gp?r:b, farmDays[0]);
            const avgGP    = totalGP/daysOk;
            const daysAbove= farmDays.filter(r=>r.gp>=avgGP).length;
            const streak   = farmDays.reduce((max,_,i,a)=>{
              let s=0; for(let j=i;j<a.length&&a[j].hasData;j++) s++; return Math.max(max,s);
            },0);
            return (
              <div style={{
                background:"linear-gradient(180deg,#221e17,#1a1712)",
                border:"1px solid #c8a050",
                borderTop:"2px solid #e8c870",
                borderBottom:"2px solid #9a7030",
                borderRadius:12,
                padding:"14px 18px",
                boxShadow:"0 1px 0 rgba(80,60,20,.8) inset,0 4px 14px rgba(100,60,0,.15)",
                marginTop:10
              }}>
                {/* Header dourado */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,paddingBottom:10,borderBottom:"1px solid #c8a05044"}}>
                  <div style={{width:6,height:6,background:C.gold,transform:"rotate(45deg)",flexShrink:0,boxShadow:`0 0 6px ${C.gold}88`}}/>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:13,color:C.gold,letterSpacing:3,textTransform:"uppercase",fontWeight:700,textShadow:`0 0 10px ${C.gold}88`}}>{t("analysis")} · {mmLabel(viewMonth)}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:14}}>

                  {/* Melhor Dia */}
                  <div style={{
                    background:"linear-gradient(160deg,#1a2a1a 0%,#0f1a0f 100%)",
                    borderRadius:12,padding:"20px 18px",
                    border:"1px solid #2a8a3a55",
                    borderTop:"2px solid #2a8a3a99",
                    borderLeft:"1px solid #2a8a3a33",
                    boxShadow:"0 0 18px rgba(42,138,58,.18),0 4px 16px rgba(0,0,0,.40),0 1px 0 #2a8a3a22 inset"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:"#4ab85a",marginBottom:8,fontWeight:700,letterSpacing:1,textTransform:"uppercase",textShadow:"0 0 8px #2a8a3a88"}}>{t("best_day")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,color:"#4ab85a",lineHeight:1,textShadow:"0 0 12px #2a8a3aaa",marginBottom:8}}>Dia {bestDay.d}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:14,color:"#2a8a3a",fontWeight:600,textShadow:"0 0 6px #2a8a3a66"}}>{fmt(bestDay.gp)} gp</div>
                  </div>

                  {/* Pior Dia */}
                  <div style={{
                    background:worstDay.gp<0?"linear-gradient(160deg,#2a1010 0%,#1a0808 100%)":"linear-gradient(160deg,#1e1a14 0%,#17140f 100%)",
                    borderRadius:12,padding:"20px 18px",
                    border:`1px solid ${worstDay.gp<0?"#cc442255":"#5a483022"}`,
                    borderTop:`2px solid ${worstDay.gp<0?"#cc442299":"#5a483055"}`,
                    borderLeft:`1px solid ${worstDay.gp<0?"#cc442233":"#5a483018"}`,
                    boxShadow:`0 0 18px ${worstDay.gp<0?"rgba(204,68,34,.18)":"rgba(0,0,0,.2)"},0 4px 16px rgba(0,0,0,.40)`}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:worstDay.gp<0?"#e05535":C.textSub,marginBottom:8,fontWeight:700,letterSpacing:1,textTransform:"uppercase",textShadow:worstDay.gp<0?"0 0 8px #cc442288":"none"}}>{t("worst_day")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,color:worstDay.gp<0?"#e05535":"#c0a878",lineHeight:1,textShadow:worstDay.gp<0?"0 0 12px #cc4422aa":"none",marginBottom:8}}>Dia {worstDay.d}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:14,color:worstDay.gp<0?"#cc4422":"#a09070",fontWeight:600}}>{fmt(worstDay.gp)} gp</div>
                  </div>

                  {/* Dias Acima da Média */}
                  <div style={{
                    background:"linear-gradient(160deg,#201808 0%,#17120a 100%)",
                    borderRadius:12,padding:"20px 18px",
                    border:"1px solid #d4780a55",
                    borderTop:"2px solid #d4780a99",
                    borderLeft:"1px solid #d4780a33",
                    boxShadow:"0 0 18px rgba(212,120,10,.20),0 4px 16px rgba(0,0,0,.40),0 1px 0 #d4780a22 inset"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:"#e8960a",marginBottom:8,fontWeight:700,letterSpacing:1,textTransform:"uppercase",textShadow:"0 0 8px #d4780a88"}}>{t("above_avg")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,color:"#f0a020",lineHeight:1,textShadow:"0 0 12px #d4780aaa",marginBottom:8}}>{daysAbove} de {daysOk}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:14,color:"#a07828",fontWeight:600}}>{fmt(Math.round(avgGP))} gp/dia</div>
                  </div>

                  {/* Maior Sequência */}
                  <div style={{
                    background:"linear-gradient(160deg,#201a08 0%,#17140a 100%)",
                    borderRadius:12,padding:"20px 18px",
                    border:"1px solid #d4780a44",
                    borderTop:"2px solid #e8960a88",
                    borderLeft:"1px solid #d4780a22",
                    boxShadow:"0 0 14px rgba(212,120,10,.15),0 4px 16px rgba(0,0,0,.40)"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:"#d4780a",marginBottom:8,fontWeight:700,letterSpacing:1,textTransform:"uppercase",textShadow:"0 0 8px #d4780a66"}}>{t("streak")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:26,color:"#e8960a",lineHeight:1,textShadow:"0 0 10px #d4780a88",marginBottom:8}}>{streak} {streak===1?"dia":"dias"}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:14,color:"#a07828",fontWeight:600}}>{t("days_streak")}</div>
                  </div>

                </div>
              </div>
            );
          })()}
        </>}

          </div>{/* fim conteudo central */}

          {/* SIDEBAR DIREITA */}
          {tab==="tracker"&&!mob&&<RightSidebar creature={boostedData.creature} boss={boostedData.boss} mob={mob}/>}

        </div>{/* fim flex 3col */}

        {/* ══ HISTÓRICO ══ */}
        {tab==="history"&&<>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1,marginBottom:4}}>{t("hist_title")}</div>
            <div style={{fontSize:13,color:C.textSub}}>{t("hist_sub")}</div>
          </div>
          {allMonths.length===0?<div style={{textAlign:"center",padding:60,color:C.textFaint}}>{t("no_data")}</div>
            :<div style={{display:"grid",gridTemplateColumns:mob?"1fr":w<800?"1fr 1fr":"repeat(3,1fr)",gap:14}}>
              {allMonths.map(ym=><MonthCard key={ym} ym={ym} days={days} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} isCurrent={ym===nowYM()} onClick={()=>{setViewMonth(ym);setTab("tracker");}} />)}
            </div>}
        </>}

        {/* ══ DJINN ══ */}
        {tab==="djinn"&&<DjinnTab mob={mob}/>}

        {/* ══ META DIÁRIA ══ */}
        {tab==="meta"&&<MetaTab days={days} gpPerTc={gpPerTc} viewMonth={viewMonth}/>}

        {/* ══ COLAR SESSÃO ══ */}
        {tab==="paste"&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:17,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:4}}>{t("paste_title")}</div>
            <div style={{fontSize:12,color:C.textSub,marginBottom:14}}>{t("paste_sub")}</div>
            <textarea style={{width:"100%",minHeight:mob?160:200,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,color:C.text,fontSize:mob?12:13,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5}}
              placeholder={"Session data: From 2026-05-01, 19:36:27 to ...\nSession: 01:37h\nLoot: 8,784,927\nSupplies: 3,319,100\nBalance: 5,465,827\n..."}
              value={clip} onChange={e=>handlePaste(e.target.value)}/>
            {parseErr&&<div style={{color:C.red,background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 14px",fontSize:13,marginTop:10}}>⚠️ {parseErr}</div>}
            {parsed&&(
              <div style={{background:"#0a1808",border:"1px solid #d4a85566",borderRadius:14,padding:mob?14:20,marginTop:14}}>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:C.green,fontSize:15,marginBottom:14}}>{t("sess_ok")}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
                  {[[t("s_date"),parsed.date],[t("s_dur"),parsed.session],[t("s_loot"),fmt(parsed.loot)+" gp"],[t("s_supp"),fmt(parsed.supplies)+" gp"],[t("s_bal"),fmt(parsed.balance)+" gp"],[t("s_tc"),`~${Math.round(toTC(parsed.balance,gpPerTc)).toLocaleString()} TC`]].map(([k,v])=>(
                    <div key={k} style={{background:"#0a1808",borderRadius:8,padding:"9px 12px"}}>
                      <div style={{fontSize:10,color:C.textFaint}}>{k}</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:mob?13:15,color:k.includes("Balance")?(parsed.balance>=0?C.green:C.red):C.text}}>{v}</div>
                    </div>
                  ))}
                </div>
                {parsed.players.length>0&&(<div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:C.textFaint,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{t("s_players")}</div>
                  {parsed.players.map(p=>(
                    <div key={p.name} style={{display:"flex",justifyContent:"space-between",background:"#0a1808",borderRadius:8,padding:"7px 12px",fontSize:13,marginBottom:4}}>
                      <span style={{color:C.text,fontWeight:600}}>{p.name}</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:p.balance>=0?C.green:C.red}}>{p.balance>=0?"+":""}{fmt(p.balance)} gp</span>
                    </div>
                  ))}
                </div>)}
                <div style={{display:"flex",gap:10}}>
                  <button style={btnPrimary} onClick={confirmHunt}>{t("save_hunt")}</button>
                  <button style={btnGhost} onClick={()=>{setClip("");setParsed(null);setErr("");}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="about"&&<AboutTab mob={mob}/>}

        {tab==="config"&&(
          <div>
            <CurrencyConfig state={state} setState={setState}/>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:16}}>{t("cfg_player")}</div>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14,marginBottom:20}}>
                {[[t("cfg_name"),"text","playerName","Ex: Czar Malta"],[t("cfg_gp"),"number","gpPerTc","Ex: 41000"]].map(([label,type,key,ph])=>(
                  <div key={key}>
                    <label style={S.lbl}>{label}</label>
                    <input style={S.inp} type={type} value={state[key]} placeholder={ph}
                      onChange={e=>setState(p=>({...p,[key]:type==="number"?Number(e.target.value):e.target.value}))}/>
                  </div>
                ))}
              </div>
              <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontSize:12,color:C.textSub,lineHeight:1.8,marginBottom:16}}>
                ℹ️ Os dados são salvos <strong style={{color:C.text}}>automaticamente</strong> no navegador (localStorage).<br/>
                Use o backup abaixo para não perder dados ao trocar de dispositivo ou limpar o navegador.
              </div>
              <div style={{marginBottom:14}}>
                <label style={S.lbl}>{t("cfg_backup")}</label>
                <textarea style={{...S.inp,minHeight:70,fontSize:11,resize:"vertical"}} readOnly value={JSON.stringify(state)}/>
              </div>
              <div>
                <label style={S.lbl}>{t("cfg_restore")}</label>
                <div style={{display:"flex",gap:8}}>
                  <textarea id="rb" style={{...S.inp,minHeight:60,fontSize:11,flex:1,resize:"vertical"}} placeholder={t("cfg_restore_ph")}/>
                  <button style={{...btnPrimary,alignSelf:"flex-end",whiteSpace:"nowrap"}}
                    onClick={()=>{try{const d=JSON.parse(document.getElementById("rb").value);setState(d);showFlash("✅ Backup restaurado!");}catch{alert("Dados inválidos.");}}}>
                    Restaurar
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ══ FOOTER ══ */}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
