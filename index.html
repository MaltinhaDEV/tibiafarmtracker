<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { background:#f5f0e8; font-family:'Fira Code',monospace; }
html { background:#f5f0e8; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#d4a855; border-radius:99px; opacity:.5; }

input[type=month]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator  { filter:invert(0.4); cursor:pointer; }
input[type=number]::-webkit-inner-spin-button        { opacity:0.3; }

/* ── Animações ── */
@keyframes fadeIn   { from{opacity:0}           to{opacity:1} }
@keyframes slideUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes rashidBob{ 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-4px)} }
@keyframes rashidBlink{ 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.1)} }
@keyframes torchFlicker { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.7;transform:scaleY(.9)} 75%{opacity:.9;transform:scaleY(1.05)} }
@keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
@keyframes starPulse{ 0%,100%{opacity:.2} 50%{opacity:.8} }
@keyframes borderGlow{ 0%,100%{box-shadow:0 0 10px #c8a83c22} 50%{box-shadow:0 0 28px #c8a83c55} }

.modal-overlay { position:fixed;inset:0;background:rgba(30,10,0,.7);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;backdrop-filter:blur(8px);animation:fadeIn .15s ease; }
.slide-up      { animation:slideUp .2s ease; }
.bar-cell      { display:flex;align-items:center;gap:6px; }
.bar-track     { flex:1;height:4px;background:#e8dcc8;border-radius:2px;overflow:hidden; }
.bar-fill      { height:100%;border-radius:2px;transition:width .4s ease; }
.row-hover:hover   { background:rgba(179,90,0,.05)!important; }
.card-hover        { transition:border-color .2s,box-shadow .2s; }
.card-hover:hover  { border-color:#b35a0055!important;box-shadow:0 2px 12px rgba(179,90,0,.12); }
.cur-btn           { transition:all .15s; }
.cur-btn:hover     { border-color:#c8a83c88!important; }
button:active      { transform:scale(.97); }

/* ── Tibia-style 3D panel effects ── */

/* Background texture on body */
body {
  background-color:#e8dcc8 !important;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(180,140,80,.04) 2px,
      rgba(180,140,80,.04) 4px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 24px,
      rgba(180,140,80,.02) 24px,
      rgba(180,140,80,.02) 25px
    );
}

/* Raised panel — main cards */
.panel-raised {
  background: linear-gradient(180deg, #fdfaf4 0%, #faf6ee 60%, #f0e8d8 100%) !important;
  border: 1px solid #c8a050 !important;
  border-top: 2px solid #e8c870 !important;
  border-bottom: 2px solid #9a7030 !important;
  box-shadow:
    0 1px 0 #f5e8c0 inset,
    0 -1px 0 #8a6020 inset,
    2px 0 0 #e0c060 inset,
    -2px 0 0 #e0c060 inset,
    0 4px 12px rgba(100,60,0,.18),
    0 8px 24px rgba(100,60,0,.10),
    0 2px 4px rgba(0,0,0,.12) !important;
  border-radius:8px !important;
}

/* Inner bevel on headers */
.panel-header {
  background: linear-gradient(180deg, #d4a850 0%, #c89840 40%, #a87830 100%) !important;
  border-bottom: 1px solid #8a6020 !important;
  border-top: 1px solid #e8c860 !important;
  box-shadow: 0 2px 4px rgba(0,0,0,.2), 0 1px 0 #f0d870 inset !important;
  color: #fff8e0 !important;
  text-shadow: 0 1px 2px rgba(0,0,0,.5) !important;
}

/* Ornamental divider */
.ornament-divider {
  height: 3px;
  background: linear-gradient(90deg, transparent, #c8a050, #e8c860, #c8a050, transparent);
  margin: 0;
  box-shadow: 0 1px 3px rgba(150,100,0,.3);
}

/* Table 3D effect */
.table-3d {
  box-shadow:
    0 4px 16px rgba(100,60,0,.18),
    0 8px 32px rgba(100,60,0,.10),
    0 1px 0 #f5e8c0 inset,
    0 -1px 0 #a07830 inset !important;
}

/* KPI card 3D */
.kpi-3d {
  background: linear-gradient(180deg, #fdfaf4 0%, #f5edd8 100%) !important;
  border: 1px solid #c8a050 !important;
  border-top: 2px solid #e8c870 !important;
  border-bottom: 2px solid #9a7030 !important;
  box-shadow:
    0 1px 0 rgba(255,240,180,.8) inset,
    0 4px 10px rgba(100,60,0,.15),
    0 2px 4px rgba(0,0,0,.10) !important;
}

/* Stars no hero */
.star { position:absolute;border-radius:50%;background:#d4a855;animation:starPulse 3s ease-in-out infinite;box-shadow:none; }

/* ── Título com shimmer ── */
.hero-title {
  font-family:'Cinzel',serif;
  font-weight:700;
  background:linear-gradient(90deg,#8a4400,#d4780a,#b35a00,#e8a040,#b35a00,#d4780a,#8a4400);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite;
}

/* ── Rashid sprite ── */
.rashid-sprite { animation:rashidBob 1.6s ease-in-out infinite; image-rendering:pixelated; }
.rashid-eyes   { animation:rashidBlink 4s ease-in-out infinite; transform-origin:center; }

/* ── Footer ── */
.footer-link { color:#6b3a10;text-decoration:none;transition:color .2s;font-weight:600; }
.footer-link:hover { color:#b35a00; }
</style>

// ── Lang state ───────────────────────────────────────────────────────────
function detectLang(){
  const saved = localStorage.getItem("tft_lang");
  if(saved && TR[saved]) return saved;
  const nav = (navigator.language||"pt").slice(0,2).toLowerCase();
  return TR[nav] ? nav : "pt";
}

// _lang é global lido por t() durante render
let _lang = detectLang();

// t() lê _lang no momento do render — sempre atualizado
function t(k){ return (TR[_lang]||TR["pt"])[k] ?? (TR["pt"])[k] ?? k; }

// Setter global — atualiza _lang E o estado React do App
let _setAppLang = null;
function setGlobalLang(code){
  if(!TR[code]) return;
  _lang = code;
  localStorage.setItem("tft_lang", code);
  document.documentElement.lang = code==="pt"?"pt-BR":code;
  if(_setAppLang) _setAppLang(code);   // força re-render do App
}

// ── useLang hook ─────────────────────────────────────────────────────────
function useLang(){
  const [lang, setLang] = useState(_lang);
  useEffect(()=>{
    // Registra este setter como o responsável por re-renderizar o App
    _setAppLang = setLang;
    return ()=>{ if(_setAppLang===setLang) _setAppLang=null; };
  },[]);
  return lang;
}

function LangSelector({ mob }){
  const lang = useLang();
  return (
    <div style={{
      position:"fixed", top:mob?8:14, right:mob?8:16, zIndex:999,
      display:"flex", alignItems:"center", gap:mob?4:6,
      background:"rgba(245,240,232,0.95)", backdropFilter:"blur(10px)",
      border:"1px solid #d4a85555", borderRadius:12,
      padding:mob?"5px 8px":"7px 12px",
      boxShadow:"0 4px 20px #000a",
    }}>
      {Object.entries(TR).map(([code,tr])=>{
        const active = code===lang;
        return (
          <button key={code} onClick={()=>setGlobalLang(code)} title={tr.name}
            style={{
              background:"none", border:"none", padding:0,
              cursor:"pointer", outline:"none",
              borderRadius:5, overflow:"hidden",
              opacity: active ? 1 : 0.35,
              transform: active ? "scale(1.18)" : "scale(1)",
              transition:"all .18s",
              boxShadow: active ? "0 0 0 2px #c8a83c, 0 0 10px #c8a83c66" : "none",
              display:"block",
            }}
            onMouseEnter={e=>{ if(!active){ e.currentTarget.style.opacity="0.75"; e.currentTarget.style.transform="scale(1.08)"; }}}
            onMouseLeave={e=>{ if(!active){ e.currentTarget.style.opacity="0.35"; e.currentTarget.style.transform="scale(1)"; }}}>
            <img
              src={FLAG_IMGS[code]}
              alt={tr.name}
              width={mob?26:30}
              height={mob?17:20}
              style={{display:"block", objectFit:"cover", borderRadius:3, imageRendering:"auto"}}
              onError={e=>{ e.target.style.display="none"; e.target.nextSibling.style.display="inline"; }}
            />
            <span style={{display:"none", fontSize:mob?16:18}}>{tr.flag}</span>
          </button>
        );
      })}
    </div>
  );
}

function parseClip(text) {
  if(!text) return null;
  const dM=text.match(/From (\d{4}-\d{2}-\d{2})/),sM=text.match(/Session:\s*([\d:]+h)/),
        lM=text.match(/^Loot:\s*([\d,]+)/m),spM=text.match(/^Supplies:\s*([\d,]+)/m),
        bM=text.match(/^Balance:\s*(-?[\d,]+)/m);
  if(!bM) return null;
  const n=s=>parseInt(s.replace(/,/g,""),10);
  const players=[]; const re=/^(.+?)\n\s+Loot:\s*([\d,]+)\n\s+Supplies:\s*([\d,]+)\n\s+Balance:\s*(-?[\d,]+)\n\s+Damage:\s*([\d,]+)\n\s+Healing:\s*([\d,]+)/gm;
  let m; while((m=re.exec(text))!==null) players.push({name:m[1].trim(),loot:n(m[2]),supplies:n(m[3]),balance:n(m[4]),damage:n(m[5]),healing:n(m[6])});
  return { date:dM?dM[1]:new Date().toISOString().slice(0,10), session:sM?sM[1]:"?", loot:lM?n(lM[1]):0, supplies:spM?n(spM[1]):0, balance:n(bM[1]), players };
}

/* ══ HOOK: busca Boosted Creature + Boss ═════════════════════════════════════ */
function useBoosted() {
  const [creature, setCreature] = useState(null);
  const [boss,     setBoss]     = useState(null);

  useEffect(()=>{
    const tryFetch = async (path) => {
      const bases = [
        "https://api.tibiadata.com/v4/",
        "https://corsproxy.io/?https://api.tibiadata.com/v4/",
      ];
      for(const base of bases){
        try{
          const r = await fetch(base+path, {signal:AbortSignal.timeout(7000)});
          if(!r.ok) continue;
          return await r.json();
        }catch{}
      }
      return null;
    };

    // Endpoint correto: /v4/creatures — estrutura: { creatures: { boosted: { name, race, image_url } } }
    tryFetch("creatures").then(d=>{
      const c = d?.creatures?.boosted;
      if(c?.name) setCreature(c);
    });

    // Boss boostado: /v4/boostablebosses — estrutura: { boostable_bosses: { boosted: { name, race, image_url } } }
    tryFetch("boostablebosses").then(d=>{
      const b = d?.boostable_bosses?.boosted;
      if(b?.name) setBoss(b);
    });
  },[]);

  return {creature, boss};
}

// Helper: monta URL de imagem da criatura com fallback
function creatureImgUrl(nameOrRace, race) {
  // Usa image_url do static.tibia.com se disponível via race
  if(race) return `https://static.tibia.com/images/global/header/monsters/${race.toLowerCase()}.gif`;
  if(!nameOrRace) return "";
  // Fallback: fandom wiki
  return `https://tibia.fandom.com/wiki/Special:FilePath/${nameOrRace.replace(/ /g,"_")}.gif`;
}

/* ══ HOOK: busca de personagem ═══════════════════════════════════════════════ */
function useCharSearch() {
  const [name,   setName]   = useState("");
  const [result, setResult] = useState(null);
  const [loading,setLoading]= useState(false);
  const [err,    setErr]    = useState("");
  async function search() {
    if(!name.trim()) return;
    setLoading(true); setResult(null); setErr("");
    const enc=encodeURIComponent(name.trim());
    const urls=[`https://api.tibiadata.com/v4/character/${enc}`,`https://corsproxy.io/?https://api.tibiadata.com/v4/character/${enc}`];
    let data=null;
    for(const url of urls){ try{ const r=await fetch(url,{signal:AbortSignal.timeout(6000)}); const d=await r.json(); if(d?.character?.character?.name){data=d.character.character;break;} }catch{} }
    if(data) setResult(data); else setErr("Personagem não encontrado.");
    setLoading(false);
  }
  return {name, setName, result, loading, err, search};
}

function getRashidDay() {
  // Rashid muda às 10h AM horário da Alemanha (Server Save do Tibia)
  // CET = UTC+1 (inverno), CEST = UTC+2 (verão) — Intl API lida automaticamente
  const germanyTime = new Date(new Date().toLocaleString("en-US", {timeZone:"Europe/Berlin"}));
  const hour = germanyTime.getHours();
  const day  = germanyTime.getDay();
  // Antes das 10h AM (hora alemã), o Rashid ainda é do dia anterior
  return hour < 10 ? (day + 6) % 7 : day;
}

/* ══ MINI BAR ═══════════════════════════════════════════════════════════════ */
function MiniBar({ value, max }) {
  const pct=max>0?Math.min(100,(Math.abs(value)/Math.abs(max))*100):0;
  return <div className="bar-track"><div className="bar-fill" style={{width:`${pct}%`,background:value>=0?C.green:C.red}}/></div>;
}

/* ══ MODAL ENTRADA MANUAL ═══════════════════════════════════════════════════ */
function ManualModal({ dateKey, dayNum, existingHunts, gpPerTc, curSym, curRate, onSave, onRemove, onClose }) {
  const [bal,setBal]=useState(""), [note,setNote]=useState(""), [editIdx,setEdit]=useState(null);
  const ref=useRef(null);
  useEffect(()=>{ setTimeout(()=>ref.current?.focus(),60); },[]);
  const num=Number(bal)||0, tc=toTC(num,gpPerTc), cur=toCur(tc,curRate);
  function startEdit(h,i){ setBal(String(h.balance)); setNote(h.note||""); setEdit(i); setTimeout(()=>ref.current?.focus(),30); }
  function clear(){ setBal(""); setNote(""); setEdit(null); }
  function handleSave(){ if(bal==="") return; onSave(dateKey,{balance:num,note,session:"manual",loot:0,supplies:0,players:[],manual:true,ts:Date.now()},editIdx); clear(); }
  function onKey(e){ if(e.key==="Enter") handleSave(); if(e.key==="Escape") onClose(); }
  const manuals=existingHunts.filter(h=>h.manual);
  const inp={ background:C.bg2, border:`1.5px solid ${editIdx!==null?C.accent:C.border}`, borderRadius:10, padding:"11px 14px", color:C.text, fontSize:15, width:"100%", outline:"none", fontFamily:"'Cinzel',serif", transition:"border-color .2s" };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="slide-up" style={{background:C.card,border:`1px solid ${C.borderHi}`,borderRadius:18,padding:24,width:"100%",maxWidth:440,boxShadow:`0 24px 80px #000d`}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1}}>{t("manual_title")}</div>
            <div style={{fontSize:12,color:C.textFaint,marginTop:3}}>{t("day")} {dayNum} · {dateKey}</div>
          </div>
          <button style={{background:"none",border:"none",color:C.textFaint,cursor:"pointer",fontSize:22,lineHeight:1}} onClick={onClose}>×</button>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Profit / Balance (gp)</div>
          <input ref={ref} style={inp} type="number" placeholder={t("manual_gp_ph")} value={bal} onChange={e=>setBal(e.target.value)} onKeyDown={onKey}/>
          {bal!==""&&(
            <div style={{display:"flex",gap:8,marginTop:8}}>
              {[[`~${Math.round(tc).toLocaleString()} TC`,C.goldLight],[fmtMoney(cur,curSym),num>=0?C.green:C.red]].map(([v,col])=>(
                <div key={v} style={{flex:1,background:C.bg2,borderRadius:8,padding:"7px 10px",textAlign:"center"}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,color:col}}>{v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:C.textSub,marginBottom:6,letterSpacing:.5,textTransform:"uppercase"}}>Observação (opcional)</div>
          <input style={inp} type="text" placeholder={t("manual_note_ph")} value={note} onChange={e=>setNote(e.target.value)} onKeyDown={onKey}/>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:manuals.length>0?20:0}}>
          <button disabled={bal===""} onClick={handleSave}
            style={{flex:1,padding:12,borderRadius:10,border:"none",cursor:bal===""?"not-allowed":"pointer",fontWeight:700,fontSize:14,opacity:bal===""?.4:1,
              background:editIdx!==null?`linear-gradient(135deg,${C.accent},#3a5aaa)`:`linear-gradient(135deg,${C.gold},${C.goldDim})`,color:editIdx!==null?"#fafaf8":"#0a0804"}}>
            {editIdx!==null?t("manual_upd"):t("manual_save")}
          </button>
          {editIdx!==null&&<button onClick={clear} style={{padding:"12px 16px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13}}>Cancelar</button>}
        </div>
        {manuals.length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>{t("manual_entries")}</div>
            {existingHunts.map((h,i)=>!h.manual?null:(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:editIdx===i?C.cardHi:C.bg2,border:`1px solid ${editIdx===i?C.accent:C.border}`,borderRadius:10,padding:"9px 12px",marginBottom:6}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</div>
                  {h.note&&<div style={{fontSize:11,color:C.textSub,marginTop:1}}>{h.note}</div>}

                </div>
                <button style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onClick={()=>startEdit(h,i)}>✏️</button>
                <button style={{background:"none",border:"none",color:C.red,cursor:"pointer",fontSize:16,padding:"2px 5px"}} onClick={()=>{onRemove(dateKey,i);clear();}}>🗑</button>
              </div>
            ))}
          </div>
        )}
        {existingHunts.filter(h=>!h.manual).length>0&&(
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:manuals.length>0?14:0}}>
            <div style={{fontSize:11,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>{t("manual_copy")}</div>
            {existingHunts.map((h,i)=>h.manual?null:(
              <div key={i} style={{display:"flex",justifyContent:"space-between",background:C.bg2,borderRadius:8,padding:"6px 12px",marginBottom:4,fontSize:12}}>
                <span style={{color:C.textSub}}>Hunt {i+1} · {h.session}</span>
                <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:h.balance>=0?C.green:C.red}}>{h.balance>=0?"+":""}{fmt(h.balance)} gp</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ══ MONTH CARD ══════════════════════════════════════════════════════════════ */
function MonthCard({ ym, days, gpPerTc, curSym, curRate, onClick, isCurrent }) {
  const prefix=ym+"-";
  const entries=Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const totalGP=entries.reduce((s,[,v])=>s+v.totalBalance,0);
  const totalCur=toCur(toTC(totalGP,gpPerTc),curRate);
  const daysOk=entries.length;
  const bestDay=entries.reduce((b,[k,v])=>v.totalBalance>b.val?{key:k,val:v.totalBalance}:b,{key:null,val:-Infinity});
  const maxGP=Math.max(...entries.map(([,v])=>Math.abs(v.totalBalance)),1);
  const total=daysInMonth(ym);
  const bars=Array.from({length:total},(_,i)=>{const key=`${ym}-${String(i+1).padStart(2,"0")}`; return days[key]?.totalBalance||0;});
  return (
    <div className="card-hover" onClick={onClick} style={{background:C.card,border:`1px solid ${isCurrent?C.gold+"55":C.border}`,borderRadius:16,padding:20,cursor:"pointer",boxShadow:isCurrent?`0 0 30px ${C.gold}18`:"none",transition:"all .2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>

const SK_DJINN = "tibia_djinn_v2";
const loadDjinn = () => { try{ const d=JSON.parse(localStorage.getItem(SK_DJINN)); return d&&typeof d==="object"?d:{}; }catch{ return {}; } };
const saveDjinn = d => { try{ localStorage.setItem(SK_DJINN,JSON.stringify(d)); }catch{} };

/* ══ DJINN TAB ═══════════════════════════════════════════════════════════════ */
function DjinnTab({ mob }) {
  const [djinnType, setDjinnType] = useState("blue");
  const [lists, setLists]         = useState(()=>{ const d=loadDjinn(); return {blue:d.blue||[],green:d.green||[]}; });
  const [search, setSearch]       = useState("");
  const [qty, setQty]             = useState("");
  const [suggestions, setSugg]    = useState([]);
  const [selected, setSelected]   = useState(null); // {name, price}
  const [editIdx, setEditIdx]     = useState(null);
  const searchRef = useRef(null);
  const qtyRef    = useRef(null);

  useEffect(()=>{ saveDjinn(lists); },[lists]);

  const djinn = DJINN_ITEMS[djinnType];
  const list  = lists[djinnType]||[];

  function handleSearchChange(val) {
    setSearch(val); setSelected(null);
    if(val.length<1){ setSugg([]); return; }
    const q=val.toLowerCase();
    const matches=Object.entries(djinn.items)
      .filter(([name])=>name.toLowerCase().includes(q))
      .sort(([a],[b])=>a.toLowerCase().startsWith(q)?-1:b.toLowerCase().startsWith(q)?1:0)
      .slice(0,8);
    setSugg(matches);
  }

  function selectItem(name, price) {
    setSearch(name); setSelected({name,price}); setSugg([]);
    setTimeout(()=>qtyRef.current?.focus(),30);
  }

  function addItem() {
    if(!selected || !qty || parseInt(qty)<=0) return;
    const num = parseInt(qty);
    if(editIdx!==null){
      setLists(p=>{ const l=[...p[djinnType]]; l[editIdx]={...l[editIdx],qty:num,total:num*selected.price}; return{...p,[djinnType]:l}; });
      setEditIdx(null);
    } else {
      // merge if item already exists
      setLists(p=>{
        const l=[...p[djinnType]];
        const existing=l.findIndex(i=>i.name===selected.name);
        if(existing>=0){ l[existing]={...l[existing],qty:l[existing].qty+num,total:(l[existing].qty+num)*selected.price}; }
        else l.push({name:selected.name,price:selected.price,qty:num,total:num*selected.price});
        return{...p,[djinnType]:l};
      });
    }
    setSearch(""); setQty(""); setSelected(null);
    setTimeout(()=>searchRef.current?.focus(),30);
  }

  function removeItem(idx) {
    setLists(p=>{ const l=[...p[djinnType]]; l.splice(idx,1); return{...p,[djinnType]:l}; });
  }

  function startEdit(idx) {
    const item=list[idx];
    setSearch(item.name); setSelected({name:item.name,price:item.price}); setQty(String(item.qty));
    setEditIdx(idx); setSugg([]);
    setTimeout(()=>qtyRef.current?.focus(),30);
  }

  function clearList() {
    if(!confirm(`t("djinn_clear")+" " ${djinn.name}?`)) return;
    setLists(p=>({...p,[djinnType]:[]}));
  }

  function onKey(e) {
    if(e.key==="Enter") addItem();
    if(e.key==="Escape"){ setSugg([]); setSearch(""); setSelected(null); setQty(""); setEditIdx(null); }
    if(e.key==="ArrowDown"&&suggestions.length>0){ e.preventDefault(); document.querySelector(".sugg-item")?.focus(); }
  }

  const totalGP    = list.reduce((s,i)=>s+i.total,0);
  const blueTotal  = (lists.blue||[]).reduce((s,i)=>s+i.total,0);
  const greenTotal = (lists.green||[]).reduce((s,i)=>s+i.total,0);
  const grand      = blueTotal+greenTotal;

  const inp={background:C.bg2,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"'Cinzel',serif",width:"100%",transition:"border-color .2s"};

  return (
    <div style={{maxWidth:900,margin:"0 auto"}}>

      {/* Totais superiores */}
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:10,marginBottom:18}}>
        {[
          {key:"blue",  d:DJINN_ITEMS.blue,  val:blueTotal },
          {key:"green", d:DJINN_ITEMS.green, val:greenTotal},
          {key:"grand", d:{name:"Total Geral",color:C.goldLight,icon:"💰"}, val:grand},
        ].map(({key,d,val})=>(
          <div key={key} onClick={()=>key!=="grand"&&setDjinnType(key)}
            style={{background:C.card,border:`1px solid ${key===djinnType||key==="grand"?d.color+"44":C.border}`,borderRadius:14,padding:"14px 18px",
              cursor:key!=="grand"?"pointer":"default",transition:"all .2s",boxShadow:key===djinnType||key==="grand"?`0 0 20px ${d.color}22`:"none"}}>
            <div style={{fontSize:10,color:d.color,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{d.icon} {d.name}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:mob?20:26,color:val>0?d.color:C.textFaint}}>{fmt(val)} gp</div>
            {key!=="grand"&&<div style={{fontSize:10,color:C.textFaint,marginTop:2}}>{(lists[key]||[]).length} itens na lista</div>}
          </div>
        ))}
      </div>

      {/* Seletor Blue / Green */}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {["blue","green"].map(k=>{
          const d=DJINN_ITEMS[k];
          return(
            <button key={k} onClick={()=>{ setDjinnType(k); setSearch(""); setQty(""); setSelected(null); setSugg([]); setEditIdx(null); }}
              style={{padding:"9px 22px",borderRadius:10,border:`1.5px solid ${djinnType===k?d.color:C.border}`,cursor:"pointer",fontWeight:700,fontSize:13,
                background:djinnType===k?`${d.border}33`:"transparent",color:djinnType===k?d.color:C.textSub,transition:"all .15s",display:"flex",flexDirection:"column",alignItems:"flex-start",gap:2}}>
              <span>{d.icon} {d.name}</span>
              <span style={{fontSize:9,color:djinnType===k?d.color+"99":C.textFaint,fontWeight:400}}>{d.npcs} · {d.local}</span>
            </button>
          );
        })}
      </div>

      {/* Card principal */}
      <div style={{background:C.card,border:`1px solid ${djinn.border}44`,borderRadius:18,overflow:"hidden",boxShadow:`0 0 30px ${djinn.border}22`}}>

        {/* Header */}
        <div style={{background:djinn.bg,padding:"16px 20px",borderBottom:`1px solid ${djinn.border}44`,display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:36}}>{djinn.icon}</div>
          <div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:djinn.color,letterSpacing:1}}>{djinn.name.toUpperCase()}</div>
            <div style={{fontSize:11,color:C.textFaint}}>NPC {djinn.npc} · {djinn.local}</div>
          </div>
        </div>

        {/* Input de adicionar */}
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${djinn.border}22`,background:`${djinn.border}08`}}>
          <div style={{fontSize:10,color:djinn.color,letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>
            {editIdx!==null?"✏️ Editando item":"➕ Adicionar item"}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:mob?"wrap":"nowrap"}}>
            {/* Busca com autocomplete */}
            <div style={{position:"relative",flex:2,minWidth:mob?"100%":180}}>
              <input ref={searchRef} value={search} onChange={e=>handleSearchChange(e.target.value)} onKeyDown={onKey}
                placeholder={`Buscar item do ${djinn.name}...`}
                style={{...inp,borderColor:selected?djinn.color:search.length>0?djinn.border:C.border,paddingRight:selected?36:14}}/>
              {selected&&<div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:djinn.color,fontSize:16}}>✓</div>}
              {/* Suggestions */}
              {suggestions.length>0&&(
                <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.cardHi,border:`1px solid ${djinn.border}66`,borderRadius:10,zIndex:50,overflow:"hidden",boxShadow:"0 8px 24px #000a"}}>
                  {suggestions.map(([name,price])=>(
                    <button key={name} className="sugg-item" onClick={()=>selectItem(name,price)}
                      style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 14px",background:"none",border:"none",cursor:"pointer",color:C.text,fontSize:13,textAlign:"left",borderBottom:`1px solid ${C.border}33`,transition:"background .1s"}}
                      onMouseEnter={e=>e.currentTarget.style.background=`${djinn.border}22`}
                      onMouseLeave={e=>e.currentTarget.style.background="none"}>
                      <span>{name}</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:djinn.color,fontSize:13}}>{fmt(price)} gp</span>
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* Quantidade */}
            <input ref={qtyRef} type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)} onKeyDown={onKey}
              placeholder="Qtd" style={{...inp,width:mob?"100%":90,textAlign:"center",fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,borderColor:qty?djinn.border:C.border}}/>

            {/* Preview do total */}
            {selected&&qty&&parseInt(qty)>0&&(
              <div style={{display:"flex",alignItems:"center",background:`${djinn.border}22`,border:`1px solid ${djinn.border}44`,borderRadius:10,padding:"0 14px",whiteSpace:"nowrap",minWidth:120}}>
                <div>
                  <div style={{fontSize:9,color:djinn.color,letterSpacing:.5}}>{t("total")}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:C.text}}>{fmt(parseInt(qty)*selected.price)} gp</div>
                </div>
              </div>
            )}

            {/* Botão adicionar */}
            <button onClick={addItem} disabled={!selected||!qty||parseInt(qty)<=0}
              style={{padding:"10px 20px",borderRadius:10,border:"none",cursor:(!selected||!qty)?"not-allowed":"pointer",fontWeight:700,fontSize:14,whiteSpace:"nowrap",
                background:editIdx!==null?`linear-gradient(135deg,${C.accent},#3a5aaa)`:`linear-gradient(135deg,${djinn.color},${djinn.border})`,
                color:"#0a0a0a",opacity:(!selected||!qty||parseInt(qty)<=0)?.4:1,transition:"opacity .2s"}}>
              {editIdx!==null?"💾 Atualizar":"➕ Adicionar"}
            </button>
            {editIdx!==null&&(
              <button onClick={()=>{setSearch("");setQty("");setSelected(null);setEditIdx(null);setSugg([]);}}
                style={{padding:"10px 14px",borderRadius:10,border:`1px solid ${C.border}`,cursor:"pointer",fontWeight:600,background:"transparent",color:C.textSub,fontSize:13}}>
                Cancelar
              </button>
            )}
          </div>
        </div>

        {/* Lista de itens adicionados */}
        {list.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px",color:C.textFaint}}>
            <div style={{fontSize:36,marginBottom:8}}>📦</div>
            <div style={{fontSize:13}}>Nenhum item adicionado ainda.<br/>Use o campo acima para começar.</div>
          </div>
        ):(
          <>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:C.bg2}}>

/* ══ META DIÁRIA ════════════════════════════════════════════════════════════ */
const SK_META = "tibia_meta_v1";
function loadMeta(){ try{ return JSON.parse(localStorage.getItem(SK_META)||"null"); }catch{return null;} }
function saveMeta(d){ try{ localStorage.setItem(SK_META,JSON.stringify(d)); }catch{} }

function MetaTab({ days, gpPerTc, viewMonth }) {
  const [meta, setMeta] = useState(()=>loadMeta()||{goal:5000000, name:"Meta Diária"});
  const [inputGoal, setInputGoal] = useState(String(meta.goal));
  const [inputName, setInputName] = useState(meta.name);
  const [saved, setSaved] = useState(false);

  function saveGoal(){
    const g = parseInt(inputGoal.replace(/[^0-9]/g,""),10);
    if(!g||g<=0) return;
    const m = {goal:g, name:inputName||"Meta Diária"};
    setMeta(m); saveMeta(m); setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  }

  const prefix = viewMonth+"-";
  const entries = Object.entries(days).filter(([k])=>k.startsWith(prefix));
  const total = new Date(+viewMonth.split("-")[0], +viewMonth.split("-")[1], 0).getDate();

  // build day map
  const dayMap = {};
  entries.forEach(([k,v])=>{ const d=+k.split("-")[2]; dayMap[d]=v.totalBalance; });

  const today = new Date();
  const isCurrentMonth = viewMonth === nowYM();
  const todayDay = isCurrentMonth ? today.getDate() : null;
  const todayGP = todayDay ? (dayMap[todayDay]||0) : 0;
  const todayPct = Math.min(200, Math.round((todayGP/meta.goal)*100));
  const todayHit = todayGP >= meta.goal;

  const farmDays = Object.values(dayMap).filter(v=>v>0);
  const hitDays = farmDays.filter(v=>v>=meta.goal).length;
  const missDays = farmDays.filter(v=>v>0&&v<meta.goal).length;
  const successRate = farmDays.length>0 ? Math.round((hitDays/farmDays.length)*100) : 0;

  const cardBase = {background:C.card,border:`1px solid ${C.border}44`,borderRadius:14,padding:"18px 20px",marginBottom:14,boxShadow:"0 2px 8px rgba(179,90,0,.07)"};
  const secTitle = {display:"flex",alignItems:"center",gap:8,marginBottom:14,paddingBottom:12,borderBottom:`1px solid ${C.border}33`};
  const gem = {width:5,height:5,background:C.gold,transform:"rotate(45deg)",flexShrink:0};
  const lbl = {fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textFaint,letterSpacing:1,textTransform:"uppercase",marginBottom:6,display:"block"};

  return (
    <div style={{maxWidth:860,margin:"0 auto"}}>

      {/* DEFINIR META */}
      <div style={cardBase}>
        <div style={secTitle}>
          <div style={gem}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold,letterSpacing:2,fontWeight:700,textTransform:"uppercase"}}>{t("meta_goal_lbl")}</span>
        </div>

        <div style={{display:"flex",gap:12,alignItems:"flex-end",marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:160}}>
            <label style={lbl}>{t("meta_goal_lbl")}</label>
            <input value={inputGoal} onChange={e=>setInputGoal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()}
              placeholder="Ex: 5000000" type="number"
              style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:15,width:"100%",outline:"none",fontFamily:"'Fira Code',monospace",fontWeight:700}}/>
          </div>
          <div style={{flex:1,minWidth:140}}>
            <label style={lbl}>{t("meta_name_lbl")}</label>
            <input value={inputName} onChange={e=>setInputName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveGoal()}
              placeholder="Ex: Meta Rashid"
              style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,width:"100%",outline:"none",fontFamily:"'Fira Code',monospace"}}/>
          </div>
          <button onClick={saveGoal}
            style={{padding:"11px 20px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:700,fontSize:10,letterSpacing:1.5,whiteSpace:"nowrap",flexShrink:0,color:"#fafaf8",
              background:saved?"linear-gradient(135deg,#1a6a3a,#0d4a27)":"linear-gradient(135deg,#b35a00,#8a4400)"}}>
            {saved?t("meta_saved"):t("meta_save")}
          </button>
        </div>

        {/* Progresso hoje */}
        {isCurrentMonth&&(
          <>
            <label style={lbl}>{t("meta_progress")} — Dia {todayDay}</label>
            <div style={{background:C.bg2,borderRadius:10,padding:"14px 16px",marginBottom:14,border:`1px solid ${C.border}22`}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontFamily:"'Cinzel',serif",fontSize:14,fontWeight:700,color:todayHit?C.green:todayGP>0?C.red:C.textFaint}}>{fmt(todayGP)} gp</span>
                <span style={{fontFamily:"'Fira Code',monospace",fontSize:11,color:C.textFaint}}>Meta: {fmt(meta.goal)} gp</span>
              </div>
              <div style={{height:10,background:C.muted,borderRadius:99,overflow:"hidden",marginBottom:6}}>
                <div style={{height:"100%",width:`${Math.min(100,todayPct)}%`,borderRadius:99,
                  background:todayHit?"linear-gradient(90deg,#1a6a3a,#3dbb6a)":"linear-gradient(90deg,#cc2200,#ff4422)",
                  transition:"width .4s ease"}}/>
              </div>
              <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:C.textFaint,textAlign:"right"}}>{todayPct}% {todayPct>=100?"✅":"da meta"}</div>
            </div>

            {/* Badge status */}
            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1,background:todayHit?"#d4f0e0":"#fde8e8",
                border:`1px solid ${todayHit?"#1a6a3a":"#cc2200"}44`,borderRadius:10,
                padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:22}}>{todayHit?"🟢":"🔴"}</span>
                <div>
                  <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:todayHit?C.green:C.red}}>
                    {todayHit?t("meta_hit"):todayGP>0?t("meta_miss"):t("meta_no_data")}
                  </div>
                  {todayGP>0&&<div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:todayHit?"#1a6a3a":"#cc2200",marginTop:2,opacity:.8}}>
                    {todayHit?`+${fmt(todayGP-meta.goal)} ${t("meta_above")}`:`${t("meta_left")} ${fmt(meta.goal-todayGP)} gp`}
                  </div>}
                </div>
              </div>
              <div style={{background:C.bg2,border:`1px solid ${C.border}33`,borderRadius:10,padding:"12px 16px",textAlign:"center",minWidth:90}}>
                <div style={{fontFamily:"'Fira Code',monospace",fontSize:8,color:C.textFaint,marginBottom:4}}>{t("meta_days_hit")}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:20,fontWeight:700,color:C.green}}>{hitDays}/{farmDays.length}</div>
              </div>
            </div>
          </>
        )}
      </div>

      {/* CALENDÁRIO */}
      <div style={cardBase}>
        <div style={secTitle}>
          <div style={gem}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold,letterSpacing:2,fontWeight:700,textTransform:"uppercase"}}>📅 {mmLabel(viewMonth)} — Visão Geral</span>
        </div>

        {/* Legenda */}
        <div style={{display:"flex",gap:16,marginBottom:14,flexWrap:"wrap"}}>
          {[["#d4f0e0","#1a6a3a","✅ Meta atingida"],["#fde8e8","#cc2200","❌ Abaixo da meta"],["#f5f0e8","#c8a870","— Sem registro"]].map(([bg,col,txt])=>(
            <div key={txt} style={{display:"flex",alignItems:"center",gap:6,fontFamily:"'Fira Code',monospace",fontSize:10,color:C.textSub}}>
              <div style={{width:12,height:12,borderRadius:3,background:bg,border:`1px solid ${col}44`,flexShrink:0}}/>
              {txt}
            </div>
          ))}
        </div>

        {/* Grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
          {Array.from({length:total},(_,i)=>{
            const d = i+1;
            const gp = dayMap[d]||0;
            const hasData = gp!==0;
            const hit = hasData && gp>=meta.goal;
            const miss = hasData && gp<meta.goal;
            const isToday = todayDay===d && isCurrentMonth;
            return (
              <div key={d} style={{
                borderRadius:8,padding:"8px 4px",textAlign:"center",
                background:hit?"#d4f0e0":miss?"#fde8e8":"#f5f0e8",
                border:`1px solid ${hit?"#1a6a3a44":miss?"#cc220044":"#e8dcc8"}`,
                boxShadow:isToday?`0 0 0 2px ${C.gold}`:"none",
                transition:"all .2s",
              }}>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:11,fontWeight:700,
                  color:hit?C.green:miss?C.red:C.textFaint,marginBottom:2}}>{d}</div>
                <div style={{fontFamily:"'Fira Code',monospace",fontSize:7,
                  color:hit?"#1a6a3a":miss?"#cc2200":C.muted,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                  {hasData?`${(gp/1000000).toFixed(1)}M`:"—"}
                </div>
                {hasData&&<div style={{fontSize:9,marginTop:1}}>{hit?"✅":"❌"}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* RESUMO */}
      <div style={cardBase}>
        <div style={secTitle}>
          <div style={gem}/>
          <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold,letterSpacing:2,fontWeight:700,textTransform:"uppercase"}}>📊 Resumo da Meta</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {lbl:t("meta_hit_days"),val:`${hitDays} dias`,color:C.green},
            {lbl:t("meta_miss_days"), val:`${missDays} dias`,color:C.red},
            {lbl:t("meta_rate"),val:`${successRate}%`,color:C.gold},
          ].map(({lbl,val,color})=>(
            <div key={lbl} style={{background:C.bg2,border:`1px solid ${C.border}22`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontFamily:"'Fira Code',monospace",fontSize:8,color:C.textFaint,marginBottom:5,letterSpacing:.5}}>{lbl}</div>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color}}>{val}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

    localStorage.setItem(SK_POPUP, Date.now().toString());

      {/* FOOTER */}
      <div style={{padding:"13px 22px",background:"#f0e8d4",borderTop:"1px solid #c8a05033",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>

          {[0,1,2,3].map(i=>(

              width:step===i?20:7,
            }}/>
          ))}
        </div>
        <div style={{fontFamily:"'Fira Code',monospace",fontSize:9,color:"#c8a870"}}>aparece 1× por dia</div>
        <div style={{display:"flex",gap:8}}>
          {step>0&&<button onClick={prev} style={{background:"none",border:"1px solid #c8a05055",borderRadius:8,padding:"10px 16px",color:"#9a6630",fontFamily:"'Fira Code',monospace",fontSize:11,cursor:"pointer"}}>← Anterior</button>}

            {step===total-1?"✅ Entrar no site":"Próximo →"}
          </button>
        </div>
      </div>

    </div>
    </div>
  );
}

/* ══ APP ══════════════════════════════════════════════════════════════════════ */
function App() {
  const [state,setState] = useState(()=>{
    const d=load()||initState();
    if(!d.currency) d.currency="BRL";
    if(!d.rates)    d.rates={BRL:d.brlPerTc||0.216,USD:0.040,EUR:0.037,GBP:0.032,CAD:0.055};
    return d;
  });
  const _appLang = useLang(); // lang reativo — força re-render do App inteiro
  const [viewMonth,setViewMonth]=useState(nowYM());
  const [clip,setClip]=useState("");
  const [parsed,setParsed]=useState(null);
  const [parseErr,setErr]=useState("");
  const [tab,setTab]=useState("tracker");
  const [flash,setFlash]=useState(null);
  const [showPopup,setShowPopup]=useState(()=>{
    const last = localStorage.getItem("tibia_popup_v1");
    if(!last) return true;
    // Mostra 1× por dia — compara apenas a data, não a hora
    const lastDate = new Date(parseInt(last,10)).toDateString();
    const today    = new Date().toDateString();
    return lastDate !== today;
  });
  const [modal,setModal]=useState(null);
  const w=useW(); const mob=w<600;
  const boostedData = useBoosted();

  useEffect(()=>{ save(state); },[state]);

  const curObj=getCur(state), curRate=getRate(state), curSym=curObj.sym;

  function showFlash(msg){ setFlash(msg); setTimeout(()=>setFlash(null),3200); }
  function handlePaste(t){ setClip(t); const r=parseClip(t); r?(setErr(""),setParsed(r)):(setErr(t("paste_err")),setParsed(null)); }

  function confirmHunt(){
    if(!parsed) return;
    const {date,balance,session,loot,supplies,players}=parsed;
    setState(p=>{ const days={...p.days}; if(!days[date]) days[date]={hunts:[],totalBalance:0}; days[date]={hunts:[...days[date].hunts,{balance,session,loot,supplies,players,ts:Date.now()}],totalBalance:days[date].totalBalance+balance}; return{...p,days}; });
    showFlash(`✅ Hunt de ${fmt(parsed.balance)} gp salva!`);
    setClip(""); setParsed(null); setErr(""); setTab("tracker");
    setViewMonth(parsed.date.slice(0,7));
  }

  function removeHunt(dateKey,idx){
    setState(p=>{ const days={...p.days},hunts=[...days[dateKey].hunts]; const rem=hunts.splice(idx,1)[0]; days[dateKey]={hunts,totalBalance:days[dateKey].totalBalance-rem.balance}; if(!hunts.length) delete days[dateKey]; return{...p,days}; });
  }

  function saveManual(dateKey,entry,editIdx){
    setState(p=>{ const days={...p.days}; if(!days[dateKey]) days[dateKey]={hunts:[],totalBalance:0}; let h=[...days[dateKey].hunts],t=days[dateKey].totalBalance; if(editIdx!==null){t-=h[editIdx].balance;h[editIdx]=entry;}else h.push(entry); t+=entry.balance; days[dateKey]={hunts:h,totalBalance:t}; return{...p,days}; });
    showFlash(editIdx!==null?"💾 Entrada atualizada!":`✅ ${fmt(entry.balance)} gp salvo!`);
  }

  function clearMonth(){ if(!confirm(`Apagar todos os dados de ${mmLabel(viewMonth)}?`)) return; setState(p=>{ const days={...p.days}; Object.keys(days).filter(k=>k.startsWith(viewMonth+"-")).forEach(k=>delete days[k]); return{...p,days}; }); }

  const {playerName,gpPerTc,days}=state;
  const allMonths=useMemo(()=>{ const s=new Set(Object.keys(days).map(k=>k.slice(0,7))); s.add(nowYM()); return Array.from(s).sort().reverse(); },[days]);

  const total=daysInMonth(viewMonth);
  let cum=0;
  const rows=Array.from({length:total},(_,i)=>{
    const d=i+1,key=`${viewMonth}-${String(d).padStart(2,"0")}`,day=days[key];
    const gp=day?day.totalBalance:0,tc=toTC(gp,gpPerTc),cur=toCur(tc,curRate);
    cum+=day?cur:0;
    return {d,key,gp,tc,cur,cumulative:cum,hunts:day?.hunts||[],hasData:!!day};
  });

  const maxGP=Math.max(...rows.map(r=>Math.abs(r.gp)),1);
  const totalGP=rows.reduce((s,r)=>s+r.gp,0);
  const totalTC=toTC(totalGP,gpPerTc);
  const totalCur=toCur(totalTC,curRate);
  const daysOk=rows.filter(r=>r.hasData).length;

  const px=mob?12:24;

    th:  {background:"linear-gradient(180deg,#c8a040,#a87830)",color:"#fff8e0",textShadow:"0 1px 2px rgba(0,0,0,.4)",padding:mob?"8px 8px":"11px 14px",textAlign:"right",fontFamily:"'Cinzel',serif",fontSize:mob?11:14,letterSpacing:1.2,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,fontWeight:700},
    inp: {background:C.bg2,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,width:"100%",outline:"none",fontFamily:"'Cinzel',serif"},
    lbl: {fontSize:11,color:C.textSub,marginBottom:5,display:"block",letterSpacing:.5,textTransform:"uppercase"},

                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,paddingBottom:10,borderBottom:"1px solid #c8a05044"}}>
                  <div style={{width:6,height:6,background:C.gold,transform:"rotate(45deg)",flexShrink:0,boxShadow:`0 0 6px ${C.gold}88`}}/>
                  <span style={{fontFamily:"'Cinzel',serif",fontSize:11,color:C.gold,letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>{t("analysis")} · {mmLabel(viewMonth)}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(4,1fr)",gap:10}}>

                  {/* Melhor Dia */}
                  <div style={{background:"#fafaf8",borderRadius:10,padding:"14px 14px",
                    border:"1px solid #c8a05033",
                    borderTop:"2px solid #1a6a3a44",
                    boxShadow:"0 2px 6px rgba(26,106,58,.08)"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:"#1a6a3a",marginBottom:6,fontWeight:600}}>{t("best_day")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:"#1a6a3a",lineHeight:1.1}}>Dia {bestDay.d}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:"#1a6a3a",marginTop:5,fontWeight:500}}>{fmt(bestDay.gp)} gp</div>
                  </div>

                  {/* Pior Dia */}
                  <div style={{background:"#fafaf8",borderRadius:10,padding:"14px 14px",
                    border:"1px solid #c8a05033",
                    borderTop:`2px solid ${worstDay.gp<0?"#cc220044":"#9a703044"}`,
                    boxShadow:"0 2px 6px rgba(100,60,0,.08)"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:worstDay.gp<0?C.red:C.textSub,marginBottom:6,fontWeight:600}}>{t("worst_day")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:worstDay.gp<0?C.red:"#6b3a10",lineHeight:1.1}}>Dia {worstDay.d}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:worstDay.gp<0?C.red:C.textSub,marginTop:5,fontWeight:500}}>{fmt(worstDay.gp)} gp</div>
                  </div>

                  {/* Dias Acima da Média */}
                  <div style={{background:"#fafaf8",borderRadius:10,padding:"14px 14px",
                    border:"1px solid #c8a05033",
                    borderTop:"2px solid #b35a0044",
                    boxShadow:"0 2px 6px rgba(179,90,0,.08)"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.gold,marginBottom:6,fontWeight:600}}>{t("above_avg")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:C.gold,lineHeight:1.1}}>{daysAbove} de {daysOk}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textSub,marginTop:5,fontWeight:500}}>{fmt(Math.round(avgGP))} gp/dia</div>
                  </div>

                  {/* Maior Sequência */}
                  <div style={{background:"#fafaf8",borderRadius:10,padding:"14px 14px",
                    border:"1px solid #c8a05033",
                    borderTop:"2px solid #b35a0044",
                    boxShadow:"0 2px 6px rgba(179,90,0,.08)"}}>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:10,color:C.accent,marginBottom:6,fontWeight:600}}>{t("streak")}</div>
                    <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:C.accent,lineHeight:1.1}}>{streak} {streak===1?"dia":"dias"}</div>
                    <div style={{fontFamily:"'Fira Code',monospace",fontSize:12,color:C.textSub,marginTop:5,fontWeight:500}}>{t("days_streak")}</div>
                  </div>

                </div>
              </div>
            );
          })()}
        </>}

          </div>{/* fim conteudo central */}

          {/* SIDEBAR DIREITA */}
          {tab==="tracker"&&!mob&&<RightSidebar creature={boostedData.creature} boss={boostedData.boss} mob={mob}/>}

        </div>{/* fim flex 3col */}

        {/* ══ HISTÓRICO ══ */}
        {tab==="history"&&<>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.gold,letterSpacing:1,marginBottom:4}}>{t("hist_title")}</div>
            <div style={{fontSize:13,color:C.textSub}}>{t("hist_sub")}</div>
          </div>
          {allMonths.length===0?<div style={{textAlign:"center",padding:60,color:C.textFaint}}>{t("no_data")}</div>
            :<div style={{display:"grid",gridTemplateColumns:mob?"1fr":w<800?"1fr 1fr":"repeat(3,1fr)",gap:14}}>
              {allMonths.map(ym=><MonthCard key={ym} ym={ym} days={days} gpPerTc={gpPerTc} curSym={curSym} curRate={curRate} isCurrent={ym===nowYM()} onClick={()=>{setViewMonth(ym);setTab("tracker");}} />)}
            </div>}
        </>}

        {/* ══ DJINN ══ */}
        {tab==="djinn"&&<DjinnTab mob={mob}/>}

        {/* ══ META DIÁRIA ══ */}
        {tab==="meta"&&<MetaTab days={days} gpPerTc={gpPerTc} viewMonth={viewMonth}/>}

        {/* ══ COLAR SESSÃO ══ */}
        {tab==="paste"&&(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:17,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:4}}>{t("paste_title")}</div>
            <div style={{fontSize:12,color:C.textSub,marginBottom:14}}>{t("paste_sub")}</div>
            <textarea style={{width:"100%",minHeight:mob?160:200,background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,color:C.text,fontSize:mob?12:13,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5}}
              placeholder={"Session data: From 2026-05-01, 19:36:27 to ...\nSession: 01:37h\nLoot: 8,784,927\nSupplies: 3,319,100\nBalance: 5,465,827\n..."}
              value={clip} onChange={e=>handlePaste(e.target.value)}/>
            {parseErr&&<div style={{color:C.red,background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:8,padding:"10px 14px",fontSize:13,marginTop:10}}>⚠️ {parseErr}</div>}
            {parsed&&(
              <div style={{background:"#0b1a0b",border:"1px solid #d4a85566",borderRadius:14,padding:mob?14:20,marginTop:14}}>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:C.green,fontSize:15,marginBottom:14}}>{t("sess_ok")}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:14}}>
                  {[[t("s_date"),parsed.date],[t("s_dur"),parsed.session],[t("s_loot"),fmt(parsed.loot)+" gp"],[t("s_supp"),fmt(parsed.supplies)+" gp"],[t("s_bal"),fmt(parsed.balance)+" gp"],[t("s_tc"),`~${Math.round(toTC(parsed.balance,gpPerTc)).toLocaleString()} TC`]].map(([k,v])=>(
                    <div key={k} style={{background:"#0a160a",borderRadius:8,padding:"9px 12px"}}>
                      <div style={{fontSize:10,color:C.textFaint}}>{k}</div>
                      <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:mob?13:15,color:k.includes("Balance")?(parsed.balance>=0?C.green:C.red):C.text}}>{v}</div>
                    </div>
                  ))}
                </div>
                {parsed.players.length>0&&(<div style={{marginBottom:14}}>
                  <div style={{fontSize:11,color:C.textFaint,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>{t("s_players")}</div>
                  {parsed.players.map(p=>(
                    <div key={p.name} style={{display:"flex",justifyContent:"space-between",background:"#0a160a",borderRadius:8,padding:"7px 12px",fontSize:13,marginBottom:4}}>
                      <span style={{color:C.text,fontWeight:600}}>{p.name}</span>
                      <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:p.balance>=0?C.green:C.red}}>{p.balance>=0?"+":""}{fmt(p.balance)} gp</span>
                    </div>
                  ))}
                </div>)}
                <div style={{display:"flex",gap:10}}>
                  <button style={btnPrimary} onClick={confirmHunt}>{t("save_hunt")}</button>
                  <button style={btnGhost} onClick={()=>{setClip("");setParsed(null);setErr("");}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="config"&&(
          <div>
            <CurrencyConfig state={state} setState={setState}/>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:mob?16:24}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:15,fontWeight:700,color:C.gold,letterSpacing:.5,marginBottom:16}}>{t("cfg_player")}</div>
              <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:14,marginBottom:20}}>
                {[[t("cfg_name"),"text","playerName","Ex: Czar Malta"],[t("cfg_gp"),"number","gpPerTc","Ex: 41000"]].map(([label,type,key,ph])=>(
                  <div key={key}>
                    <label style={S.lbl}>{label}</label>
                    <input style={S.inp} type={type} value={state[key]} placeholder={ph}
                      onChange={e=>setState(p=>({...p,[key]:type==="number"?Number(e.target.value):e.target.value}))}/>
                  </div>
                ))}
              </div>
              <div style={{background:C.bg2,border:`1px solid ${C.border}`,borderRadius:10,padding:14,fontSize:12,color:C.textSub,lineHeight:1.8,marginBottom:16}}>
                ℹ️ Os dados são salvos <strong style={{color:C.text}}>automaticamente</strong> no navegador (localStorage).<br/>
                Use o backup abaixo para não perder dados ao trocar de dispositivo ou limpar o navegador.
              </div>
              <div style={{marginBottom:14}}>
                <label style={S.lbl}>{t("cfg_backup")}</label>
                <textarea style={{...S.inp,minHeight:70,fontSize:11,resize:"vertical"}} readOnly value={JSON.stringify(state)}/>
              </div>
              <div>
                <label style={S.lbl}>{t("cfg_restore")}</label>
                <div style={{display:"flex",gap:8}}>
                  <textarea id="rb" style={{...S.inp,minHeight:60,fontSize:11,flex:1,resize:"vertical"}} placeholder={t("cfg_restore_ph")}/>
                  <button style={{...btnPrimary,alignSelf:"flex-end",whiteSpace:"nowrap"}}
                    onClick={()=>{try{const d=JSON.parse(document.getElementById("rb").value);setState(d);showFlash("✅ Backup restaurado!");}catch{alert("Dados inválidos.");}}}>
                    Restaurar
                  </button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ══ FOOTER ══ */}
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
